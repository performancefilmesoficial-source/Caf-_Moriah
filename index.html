<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moriah Café - PDV & Gestão</title>
    <link rel=icon type=image/png href=favicon.png>
    <link rel=apple-touch-icon href=favicon.png>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        moriah: {
                            brown: '#4A3728',
                            dark: '#2D1E15',
                            cream: '#F5F5DC',
                            teal: '#004D40',
                            green: '#123930',
                            gray: '#212121',
                            black: '#1a1817',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html,
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            overflow-x: hidden;
            max-width: 100vw;
            -webkit-text-size-adjust: 100%;
        }

        /* Corrige toque em botões no iOS — sem delay de 300ms */
        button,
        [role="button"],
        a {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .pt-safe {
            padding-top: env(safe-area-inset-top, 0);
        }

        .pb-32 {
            padding-bottom: 8rem;
        }

        /* Garante que nenhum elemento estoure a largura da tela */
        *,
        *::before,
        *::after {
            max-width: 100%;
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }

        @media (max-width: 640px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }
        }

        @media (min-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }

        .mobile-nav-shadow {
            box-shadow: 0 -4px 20px -5px rgba(0, 0, 0, 0.1);
        }

        @media print {
            .no-print {
                display: none !important;
            }

            aside {
                display: none !important;
            }

            main {
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
            }

            .print-only {
                display: block !important;
            }

            .bg-stone-50 {
                background: white !important;
            }

            .shadow-sm,
            .shadow-lg,
            .shadow-2xl {
                box-shadow: none !important;
                border: 1px solid #eee !important;
            }
        }
    </style>
</head>

<body class="bg-stone-50 text-stone-900">
    <div id="root" class="flex items-center justify-center h-screen bg-stone-50 w-full">
        <div class="text-center">
            <div
                class="w-12 h-12 border-4 border-moriah-brown border-t-transparent rounded-full animate-spin mx-auto mb-4">
            </div>
            <p class="text-stone-500 font-medium animate-pulse">Carregando Moriah Café...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const apiFetch = async (url, options = {}) => {
            const token = localStorage.getItem('moriah_jwt');
            const headers = { ...options.headers };
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            const res = await window.fetch(url, { ...options, headers });
            if ((res.status === 401 || res.status === 403) && !url.includes('/api/auth/login')) {
                const hadToken = !!token;
                localStorage.removeItem('moriah_jwt');
                localStorage.removeItem('moriah_current_user');
                if (hadToken) {
                    alert('Sessão expirada ou acesso negado. Faça login novamente.');
                    window.location.reload();
                }
            }
            return res;
        };


        const initialProducts = [
            { id: 1, name: 'Café Espresso', category: 'Café', cost: 2.5, price: 7.0, stock: 50, minStock: 10, sku: 'C001' },
            { id: 2, name: 'Cappuccino', category: 'Café', cost: 4.0, price: 12.0, stock: 30, minStock: 10, sku: 'C002' },
            { id: 3, name: 'Módulo V60 Moriah', category: 'Acessórios', cost: 85.0, price: 145.0, stock: 4, minStock: 5, sku: 'A001' },
            { id: 4, name: 'Água Mineral', category: 'Bebidas Prontas', cost: 1.2, price: 4.5, stock: 100, minStock: 20, sku: 'B001' },
        ];

        const LucideIcon = ({ name, className }) => {
            const [mounted, setMounted] = React.useState(false);
            React.useEffect(() => setMounted(true), []);
            if (!mounted || typeof lucide === 'undefined') return <span className={`inline-block ${className || 'w-5 h-5'}`} />;

            const icons = lucide.icons || lucide;
            const pascalName = name.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join('');
            const iconData = icons[pascalName] || icons[name] || icons['HelpCircle'] || icons['help-circle'];

            if (!iconData || !Array.isArray(iconData)) return <span className={`inline-block ${className || 'w-5 h-5'}`}>?</span>;

            try {
                const paths = iconData.map(([tag, attrs]) => {
                    const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                    return `<${tag} ${attrStr}></${tag}>`;
                }).join('');
                const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-${name}">${paths}</svg>`;
                return <span className={`inline-flex items-center justify-center shrink-0 ${className || 'w-5 h-5'}`} dangerouslySetInnerHTML={{ __html: svg }} />;
            } catch (e) {
                return <span className={className || 'w-5 h-5'}>!</span>;
            }
        };

        const SidebarItem = ({ icon: Icon, label, active, onClick }) => (
            <button onClick={onClick} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${active ? 'bg-moriah-brown text-white' : 'text-stone-500 hover:bg-stone-100'}`}>
                <LucideIcon name={Icon} className="w-5 h-5" />
                <span class="font-medium">{label}</span>
            </button>
        );

        const ProductForm = ({ isEdit, editingProduct, setProducts, setEditingProduct, setView }) => {
            // Lógica para carregar imagens antigas de DB como array
            const loadImages = (urlData) => {
                if (!urlData) return [];
                try {
                    const parsed = JSON.parse(urlData);
                    if (Array.isArray(parsed)) return parsed;
                    return [urlData];
                } catch (e) {
                    return [urlData];
                }
            };

            const [formData, setFormData] = React.useState(isEdit && editingProduct ? {
                ...editingProduct,
                image_url: loadImages(editingProduct.image_url) // Agora image_url é sempre Array aqui dentro
            } : {
                name: '', category: 'Café Grão', cost: '', price: '', price_moido: '', stock: '', minStock: '5',
                sku: '', image_url: [], description: '', weight_grams: 250, sell_online: 1
            });
            const [isGeneratingAI, setIsGeneratingAI] = React.useState(false);
            const [isUploading, setIsUploading] = React.useState(false);

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: type === 'checkbox' ? (checked ? 1 : 0) : value
                }));
            };

            const generateWithAI = async (field) => {
                if (!formData.name) {
                    alert('Digite o nome do produto primeiro (ex: "Café Especial Torra Clara")');
                    return;
                }
                setIsGeneratingAI(field);
                try {
                    const res = await apiFetch('/api/generate-ai', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ productName: formData.name })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setFormData(prev => ({
                            ...prev,
                            sku: field === 'sku' ? data.sku : prev.sku,
                            description: field === 'description' ? data.description : prev.description
                        }));
                    } else throw new Error(data.error);
                } catch (e) {
                    alert('Erro na IA: ' + e.message);
                }
                setIsGeneratingAI(false);
            };

            const handleImageUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (!files || files.length === 0) return;
                setIsUploading(true);

                // Criar array para múltiplas URLs enviadas de uma vez
                const newUrls = [];

                for (const file of files) {
                    const uploadData = new FormData();
                    uploadData.append('image', file);
                    try {
                        const res = await apiFetch('/api/upload', {
                            method: 'POST',
                            body: uploadData
                        });
                        const data = await res.json();
                        if (res.ok) {
                            newUrls.push(`${data.imageUrl}`);
                        } else throw new Error(data.error);
                    } catch (e) {
                        alert(`Erro ao enviar imagem ${file.name}: ` + e.message);
                    }
                }

                if (newUrls.length > 0) {
                    setFormData(prev => ({ ...prev, image_url: [...prev.image_url, ...newUrls] }));
                }

                setIsUploading(false);
                // Reseta input de file
                e.target.value = null;
            };

            const removeImage = (indexToRemove) => {
                setFormData(prev => ({
                    ...prev,
                    image_url: prev.image_url.filter((_, idx) => idx !== indexToRemove)
                }));
            };

            return (
                <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-lg border border-stone-100 animate-in zoom-in-95 duration-300 mb-20 md:mb-0">
                    <h2 class="text-2xl font-bold mb-6">{isEdit ? 'Editar Produto' : 'Novo Produto'}</h2>
                    <div class="grid grid-cols-1 gap-8">
                        <form class="space-y-6" onSubmit={async (e) => {
                            e.preventDefault();
                            const productData = {
                                name: formData.name,
                                category: formData.category,
                                cost: parseFloat(formData.cost),
                                price: parseFloat(formData.price),
                                stock: parseInt(formData.stock),
                                minStock: parseInt(formData.minStock),
                                sku: formData.sku,
                                image_url: Array.isArray(formData.image_url) ? JSON.stringify(formData.image_url) : formData.image_url, // fallback seguro
                                description: formData.description,
                                weight_grams: parseInt(formData.weight_grams) || 250,
                                sell_online: formData.sell_online,
                                price_moido: parseFloat(formData.price_moido) || null
                            };

                            try {
                                let res;
                                if (isEdit) {
                                    res = await apiFetch(`/api/products/${editingProduct.id}`, {
                                        method: 'PUT',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify(productData)
                                    });
                                } else {
                                    res = await apiFetch('/api/products', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify(productData)
                                    });
                                }

                                if (res.ok) {
                                    const reload = await apiFetch('/api/products');
                                    const newData = await reload.json();
                                    setProducts(newData);
                                    setEditingProduct(null);
                                    setView('inventory');
                                } else {
                                    alert("Erro ao salvar o produto.");
                                }
                            } catch (error) {
                                console.error("Erro no processamento:", error);
                                alert("Erro de conexão com o servidor.");
                            }
                        }}>
                            <div>
                                <label class="block text-sm font-medium text-stone-500 mb-1">Nome do Produto</label>
                                <input name="name" value={formData.name} onChange={handleChange} required class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl focus:ring-2 focus:ring-moriah-brown/50 outline-none font-bold text-lg" placeholder="Ex: Café Especial Torra Média" />
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <div class="flex items-center justify-between mb-1">
                                        <label class="block text-sm font-medium text-stone-500">SKU / Barcode</label>
                                        <button type="button" onClick={() => generateWithAI('sku')} class="text-[10px] bg-indigo-50 text-indigo-600 font-bold px-2 py-1 rounded hover:bg-indigo-100 flex items-center gap-1">
                                            {isGeneratingAI === 'sku' ? '⏳ Gerando...' : '✨ Gerador IA'}
                                        </button>
                                    </div>
                                    <input name="sku" value={formData.sku} onChange={handleChange} required class="w-full px-4 py-2 bg-stone-50 border border-stone-200 rounded-xl outline-none uppercase font-mono" placeholder="Ex: CAFE-ESP-250G" />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-stone-500 mb-1">Categoria</label>
                                    <select name="category" value={formData.category} onChange={handleChange} class="w-full px-4 py-2 bg-stone-50 border border-stone-200 rounded-xl outline-none">
                                        <option>Café Grão</option>
                                        <option>Café Moído</option>
                                        <option>Acessórios</option>
                                    </select>
                                </div>
                            </div>

                            <div class="bg-stone-50 p-4 rounded-2xl border border-stone-200">
                                <div class="flex items-center justify-between mb-3">
                                    <label class="font-bold text-stone-700">Fotos do Produto (Site & PDV)</label>
                                    <div class="text-xs text-stone-500 font-medium bg-white px-2 py-1 rounded-md border border-stone-200">
                                        {formData.image_url?.length || 0} foto(s)
                                    </div>
                                </div>
                                <div class="space-y-4">
                                    <div class="flex items-center gap-3 overflow-x-auto pb-2">
                                        {formData.image_url && formData.image_url.length > 0 ? (
                                            formData.image_url.map((url, idx) => (
                                                <div key={idx} class="relative w-20 h-20 rounded-xl overflow-hidden border border-stone-200 bg-white shrink-0 group">
                                                    <img src={url} class="w-full h-full object-cover" />
                                                    <button type="button" onClick={() => removeImage(idx)} class="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 hover:bg-red-600 shadow opacity-0 group-hover:opacity-100 transition-opacity"><LucideIcon name="x" className="w-3 h-3" /></button>
                                                    {idx === 0 && <div class="absolute bottom-0 inset-x-0 bg-moriah-brown/90 text-white text-[9px] font-bold text-center py-0.5">PRINCIPAL</div>}
                                                </div>
                                            ))
                                        ) : (
                                            <div class="w-20 h-20 rounded-xl border-2 border-dashed border-stone-300 flex items-center justify-center bg-white text-stone-400 shrink-0">
                                                <LucideIcon name="image" className="w-8 h-8 opacity-40 mb-1" />
                                            </div>
                                        )}
                                    </div>

                                    <div class="bg-white border border-stone-200 rounded-xl p-3 flex flex-col md:flex-row items-center justify-between gap-3 shadow-sm">
                                        <div class="flex items-center gap-3 pl-2">
                                            <div class="bg-stone-50 p-2 rounded-lg text-moriah-brown">
                                                <LucideIcon name="images" className="w-5 h-5" />
                                            </div>
                                            <div>
                                                <p class="text-xs font-bold text-stone-700">Adicionar mais fotos</p>
                                                <p class="text-[10px] text-stone-500">Selecione imagens .JPG, .PNG ou .WEBP</p>
                                            </div>
                                        </div>
                                        <label class="cursor-pointer bg-moriah-brown text-white px-4 py-2 rounded-xl hover:bg-moriah-dark transition-all font-bold text-sm flex items-center gap-2 shadow w-full md:w-auto justify-center">
                                            {isUploading ? <><div className="w-4 h-4 border-2 border-stone-300 border-t-white rounded-full animate-spin"></div> Enviando...</> : <><LucideIcon name="upload-cloud" className="w-4 h-4" /> Selecionar Fotos</>}
                                            <input type="file" accept="image/*" multiple className="hidden" onChange={handleImageUpload} disabled={isUploading} />
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <div class="flex items-center justify-between mb-1">
                                    <label class="block text-sm font-medium text-stone-500">Descrição do Produto (Site)</label>
                                    <button type="button" onClick={() => generateWithAI('description')} class="text-xs bg-indigo-50 text-indigo-600 font-bold px-3 py-1.5 rounded-lg border border-indigo-100 hover:bg-indigo-100 flex items-center gap-1 shadow-sm transition-all hover:scale-105 active:scale-95">
                                        {isGeneratingAI === 'description' ? <span class="animate-pulse">⏳ Escrevendo texto vendedor...</span> : <><LucideIcon name="sparkles" className="w-3.5 h-3.5" /> Escrever com Inteligência Artificial</>}
                                    </button>
                                </div>
                                <textarea name="description" value={formData.description} onChange={handleChange} rows="4" class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl focus:ring-2 focus:ring-moriah-brown/50 outline-none leading-relaxed" placeholder="Descreva os sabores, origem e experiência do café... (Ou clique em Gerar com IA acima)"></textarea>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-stone-500 mb-1">Custo (R$)</label>
                                    <input type="number" step="0.01" name="cost" value={formData.cost} onChange={handleChange} required class="w-full px-4 py-2 bg-stone-50 border border-stone-200 rounded-xl outline-none" placeholder="Ex: 15.00" />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-stone-500 mb-1 text-moriah-green font-bold">{(formData.category === 'Café Grão' || formData.category === 'Café Moído') ? 'Preço Grão (R$)' : 'Venda (R$)'}</label>
                                    <input type="number" step="0.01" name="price" value={formData.price} onChange={handleChange} required class="w-full px-4 py-2 bg-stone-50 border border-emerald-200 bg-emerald-50 rounded-xl outline-none text-emerald-900 font-bold text-lg" placeholder="Ex: 45.00" />
                                </div>
                            </div>
                            {(formData.category === 'Café Grão' || formData.category === 'Café Moído') && (
                                <div>
                                    <label class="block text-sm font-medium text-amber-700 mb-1 font-bold">Preço Pó/Moído (R$) <span class="text-stone-400 text-xs font-normal">— deixe vazio se não tiver variação</span></label>
                                    <input type="number" step="0.01" name="price_moido" value={formData.price_moido || ''} onChange={handleChange} class="w-full px-4 py-2 border border-amber-200 bg-amber-50 rounded-xl outline-none text-amber-900 font-bold text-lg" placeholder="Ex: 40.00" />
                                </div>
                            )}
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-stone-500 mb-1">Estoque Físico</label>
                                    <input type="number" name="stock" value={formData.stock} onChange={handleChange} required class="w-full px-4 py-2 bg-stone-50 border border-stone-200 rounded-xl outline-none" />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-stone-500 mb-1">Estoque Min.</label>
                                    <input type="number" name="minStock" value={formData.minStock} onChange={handleChange} required class="w-full px-4 py-2 bg-stone-50 border border-stone-200 rounded-xl outline-none" />
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4 border-t border-stone-100 pt-4">
                                <div>
                                    <label class="block text-sm font-medium text-stone-500 mb-1">Peso (Gramas)</label>
                                    <input type="number" name="weight_grams" placeholder="Ex: 250" value={formData.weight_grams} onChange={handleChange} class="w-full px-4 py-2 bg-stone-50 border border-stone-200 rounded-xl outline-none" />
                                </div>
                                <div class="flex items-center mt-4 text-left">
                                    <label class="flex items-center gap-3 cursor-pointer p-2 bg-stone-50 border border-stone-100 rounded-xl w-full">
                                        <input type="checkbox" name="sell_online" checked={formData.sell_online === 1} onChange={handleChange} class="w-5 h-5 text-moriah-brown bg-white border-stone-300 rounded focus:ring-moriah-brown" />
                                        <span class="text-sm font-bold text-stone-700">Vender no E-commerce? <br /><span class="text-[10px] font-normal text-stone-400">Ative para aparecer na loja online</span></span>
                                    </label>
                                </div>
                            </div>
                            <div class="flex gap-4 pt-4">
                                <button type="button" onClick={() => { setEditingProduct(null); setView('inventory'); }} class="flex-1 py-3 text-stone-500 font-bold hover:bg-stone-50 rounded-2xl transition-all border border-stone-200">Cancelar</button>
                                <button type="submit" class="flex-1 py-3 bg-moriah-brown text-white font-bold rounded-2xl shadow-lg hover:shadow-xl transition-all">{isEdit ? 'Salvar' : 'Cadastrar'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('pos');
            const [products, setProducts] = useState([]);
            // Carrega produtos da API no Mount
            useEffect(() => {
                const fetchProducts = async () => {
                    try {
                        const res = await apiFetch('/api/products');
                        if (res.ok) {
                            const data = await res.json();
                            setProducts(data);
                        }
                    } catch (err) {
                        console.error("Erro ao carregar produtos:", err);
                    }
                };
                fetchProducts();
            }, []);
            const [sales, setSales] = useState([]);
            const [isLoadingSales, setIsLoadingSales] = useState(false);

            const fetchSales = async () => {
                setIsLoadingSales(true);
                try {
                    const res = await apiFetch('/api/sales');
                    if (res.ok) {
                        const data = await res.json();
                        setSales(data);
                    }
                } catch (err) {
                    console.error('Erro ao carregar vendas:', err);
                } finally {
                    setIsLoadingSales(false);
                }
            };
            const [loginLoading, setLoginLoading] = useState(false);
            const [loginError, setLoginError] = useState('');
            const [cart, setCart] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
            const [isPixModalOpen, setIsPixModalOpen] = useState(false);
            const [isSuccessModalOpen, setIsSuccessModalOpen] = useState(false);
            const [discount, setDiscount] = useState(0);
            const [currentPixData, setCurrentPixData] = useState({ payload: '', total: 0 });
            const [lastSale, setLastSale] = useState(null);
            const [customerPhone, setCustomerPhone] = useState('');
            const [editingProduct, setEditingProduct] = useState(null);
            const [periodFilter, setPeriodFilter] = useState('always');
            const [originFilter, setOriginFilter] = useState('all'); // all, fisico, online
            const [isMobileCartOpen, setIsMobileCartOpen] = useState(false);
            const [grindPickerProduct, setGrindPickerProduct] = useState(null);
            const [dashData, setDashData] = useState(null);
            const [dashLoading, setDashLoading] = useState(false);
            const [isAsaasModalOpen, setIsAsaasModalOpen] = useState(false);
            const [currentAsaasCharge, setCurrentAsaasCharge] = useState(null); // { payment_id, invoiceUrl, total, label }
            const [asaasPolling, setAsaasPolling] = useState(null); // interval ref
            const [asaasPaid, setAsaasPaid] = useState(false);
            const [showMachineSubmenu, setShowMachineSubmenu] = useState(false);
            const [siteSettings, setSiteSettings] = useState({
                hero_title: '', hero_subtitle: '', hero_text: '', hero_video: '',
                about_title: '', about_subtitle: '', about_text_1: '', about_text_2: '', about_image: ''
            });
            const [videoFile, setVideoFile] = useState(null);
            const [imageFile, setImageFile] = useState(null);

            // Carrega configurações do site ao abrir a aba (ou no início)
            useEffect(() => {
                apiFetch('/api/site-settings')
                    .then(res => res.json())
                    .then(data => {
                        const sanitizedAdminData = {};
                        if (data) {
                            Object.keys(data).forEach(key => {
                                sanitizedAdminData[key] = data[key] || '';
                            });
                            setSiteSettings(sanitizedAdminData);
                        }
                    })
                    .catch(err => console.error("Erro config site:", err));
            }, []);

            // Usuários vêm do banco via API — não do localStorage
            const [users, setUsers] = useState([]);

            const [currentUser, setCurrentUser] = useState(() => {
                try { return JSON.parse(localStorage.getItem('moriah_current_user')); } catch { return null; }
            });

            const [customers, setCustomers] = useState(() => {
                const saved = localStorage.getItem('moriah_customers');
                return saved ? JSON.parse(saved) : [];
            });

            // Persiste sessão local (só o objeto do usuário, sem senha)
            useEffect(() => {
                if (currentUser) localStorage.setItem('moriah_current_user', JSON.stringify(currentUser));
                else localStorage.removeItem('moriah_current_user');
            }, [currentUser]);
            useEffect(() => { localStorage.setItem('moriah_customers', JSON.stringify(customers)); }, [customers]);

            // Busca vendas do banco de dados ao abrir a aba de vendas
            // Auto-refresh a cada 30s para capturar pedidos online automaticamente
            useEffect(() => {
                if (view === 'sales') {
                    fetchSales();
                    const interval = setInterval(() => fetchSales(), 30000);
                    return () => clearInterval(interval);
                }
            }, [view]);

            // Busca usuários do banco ao abrir as configurações
            useEffect(() => {
                if (view !== 'settings') return;
                apiFetch('/api/users').then(r => r.json()).then(data => setUsers(Array.isArray(data) ? data : [])).catch(() => { });
            }, [view]);

            // Busca dados do dashboard ao abrir o painel
            useEffect(() => {
                if (view !== 'dashboard') return;
                setDashLoading(true);
                apiFetch('/api/dashboard')
                    .then(r => r.json())
                    .then(d => { setDashData(d); setDashLoading(false); })
                    .catch(() => setDashLoading(false));
            }, [view]);

            const logoUrl = 'Verde.png';

            const stats = useMemo(() => {
                const today = new Date().toLocaleDateString();
                const todaySales = sales.filter(s => new Date(s.created_at || s.date).toLocaleDateString() === today);
                const revenue = todaySales.reduce((acc, curr) => acc + curr.total, 0);
                const lowStock = products.filter(p => p.stock < p.minStock);
                return { revenue, lowStockCount: lowStock.length };
            }, [sales, products]);

            const addToCart = (product, grind = null) => {
                if (product.stock <= 0) return;
                const price = grind === 'moido' && parseFloat(product.price_moido) > 0
                    ? parseFloat(product.price_moido)
                    : parseFloat(product.price);
                const cartKey = grind ? `${product.id}-${grind}` : String(product.id);
                const displayName = grind === 'moido'
                    ? `${product.name} (Pó/Moído)`
                    : grind === 'grao'
                        ? `${product.name} (Grão)`
                        : product.name;
                setCart(curr => {
                    const existing = curr.find(i => i.cartKey === cartKey);
                    if (existing) return curr.map(i => i.cartKey === cartKey ? { ...i, quantity: i.quantity + 1 } : i);
                    return [...curr, { ...product, cartKey, price, name: displayName, quantity: 1 }];
                });
            };

            const removeFromCart = (cartKey) => setCart(curr => curr.filter(i => i.cartKey !== cartKey));
            const updateCartQuantity = (cartKey, delta) => {
                setCart(curr => curr.map(i => {
                    if (i.cartKey === cartKey) {
                        const newQty = Math.max(1, i.quantity + delta);
                        return { ...i, quantity: newQty };
                    }
                    return i;
                }));
            };

            const generatePixPayload = (amount) => {
                const pad = (n) => n.toString().padStart(2, '0');
                const key = "63644739000156";
                const name = "MORIAH CAFE";
                const city = "SAO PAULO";

                let payload = "000201";
                let merchantInfo = "0014br.gov.bcb.pix" + "0114" + key;
                payload += "26" + pad(merchantInfo.length) + merchantInfo;
                payload += "520400005303986";
                let amtStr = amount.toFixed(2);
                payload += "54" + pad(amtStr.length) + amtStr;
                payload += "5802BR";
                payload += "59" + pad(name.length) + name;
                payload += "60" + pad(city.length) + city;
                payload += "62070503***6304";

                let crc = 0xFFFF;
                for (let i = 0; i < payload.length; i++) {
                    crc ^= (payload.charCodeAt(i) << 8);
                    for (let j = 0; j < 8; j++) {
                        crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : (crc << 1);
                    }
                }
                const crcHex = (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
                return payload + crcHex;
            };

            const finalizeSale = async (method) => {
                const subtotal = cart.reduce((acc, curr) => acc + (curr.price * curr.quantity), 0);
                const total = parseFloat((subtotal * (1 - (discount / 100))).toFixed(2));

                if (method === 'PIX' && !isPixModalOpen) {
                    const payload = generatePixPayload(total);
                    setCurrentPixData({ payload, total });
                    setIsPixModalOpen(true);
                    return;
                }

                try {
                    const res = await apiFetch('/api/sales', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            seller: currentUser?.name || currentUser?.username || 'PDV',
                            items: cart.map(i => ({ id: i.id, name: i.name, quantity: i.quantity, price: i.price })),
                            subtotal,
                            discount,
                            total,
                            method,
                            origin: 'Físico'
                        })
                    });

                    if (!res.ok) {
                        const err = await res.json();
                        alert('Erro ao salvar venda: ' + (err.error || 'Tente novamente'));
                        return;
                    }

                    // Atualiza o estoque localmente para feedback imediato
                    setProducts(curr => curr.map(p => {
                        const totalQty = cart.filter(ci => ci.id === p.id).reduce((sum, ci) => sum + ci.quantity, 0);
                        return totalQty > 0 ? { ...p, stock: p.stock - totalQty } : p;
                    }));

                    setCart([]);
                    setDiscount(0);
                    setIsCheckoutOpen(false);
                    setIsPixModalOpen(false);
                    setLastSale({ total, method, items: cart });
                    setIsSuccessModalOpen(true);

                } catch (error) {
                    console.error('Erro ao finalizar venda:', error);
                    alert('Falha de conexão com o servidor. Verifique sua rede.');
                }
            };

            const sendWhatsAppReceipt = () => {
                if (!customerPhone) return;
                let message = `Obrigado por escolher o Café Moriah!\nFicamos felizes em fazer parte da sua rotina.\n\nPara acompanhar as novidades, siga a gente no Instagram: @cafemoriah__`;

                const cleanPhone = customerPhone.replace(/\D/g, '');
                const url = `https://wa.me/55${cleanPhone}?text=${encodeURIComponent(message)}`;
                window.open(url, '_blank');
                setIsSuccessModalOpen(false);
                setCustomerPhone('');
                setView('pos');
            };

            const deleteProduct = async (id) => {
                if (confirm('Tem certeza que deseja excluir este produto?')) {
                    try {
                        const res = await apiFetch(`/api/products/${id}`, { method: 'DELETE' });
                        if (res.ok) {
                            setProducts(curr => curr.filter(p => p.id !== id));
                        }
                    } catch (error) {
                        console.error('Erro ao excluir:', error);
                        alert('Erro ao excluir produto.');
                    }
                }
            };

            const generateLabel = async (sale_id) => {
                if (!confirm('Confirmar Geração de Etiqueta Logística? As taxas poderão ser cobradas do Saldo da Conta de Envios.')) return;
                try {
                    const res = await apiFetch('/api/shipping/generate-label', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sale_id })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        const msg = data.simulated
                            ? `Etiqueta SIMULADA (sem endereço completo ou token ME).\nRastreio: ${data.tracking_code}\n\nPara etiqueta real: configure MELHORENVIO_TOKEN e garanta que o cliente preencheu o endereço completo.`
                            : `✅ Etiqueta Melhor Envio gerada!\nRastreio: ${data.tracking_code}\n\nA etiqueta será baixada agora.`;
                        alert(msg);
                        if (data.label_url) window.open(data.label_url, '_blank');
                        // Força a atualização da lista para exibir as vendas da DB SQLite real, incluindo status de envio novo
                        const reload = await apiFetch('/api/sales');
                        const salesData = await reload.json();
                        setSales(salesData);
                    } else {
                        alert('Logística (' + data.error + ')');
                    }
                } catch (err) {
                    alert('Falha de Integração com Gateway Logístico.');
                }
            };

            const finalizeAsaasCharge = async (billingType) => {
                const subtotal = cart.reduce((acc, curr) => acc + (curr.price * curr.quantity), 0);
                const total = parseFloat((subtotal * (1 - (discount / 100))).toFixed(2));
                const label = billingType === 'CREDIT_CARD' ? 'Crédito Asaas' : billingType === 'DEBIT_CARD' ? 'Débito Asaas' : 'Cartão Asaas';
                setIsCheckoutOpen(false);
                setAsaasPaid(false);
                try {
                    const res = await apiFetch('/api/pdv/charge', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ customerName: 'Cliente PDV', total, billingType })
                    });
                    const data = await res.json();
                    if (!res.ok) { alert(data.error || 'Erro ao criar cobrança.'); setIsCheckoutOpen(true); return; }
                    setCurrentAsaasCharge({ payment_id: data.payment_id, invoiceUrl: data.invoiceUrl, total, label });
                    setIsAsaasModalOpen(true);
                    // Polling a cada 5s por até 10 minutos
                    let attempts = 0;
                    const maxAttempts = 120;
                    const interval = setInterval(async () => {
                        attempts++;
                        if (attempts > maxAttempts) {
                            clearInterval(interval);
                            setAsaasPolling(null);
                            alert('Tempo esgotado. Confirme manualmente se o cliente pagou.');
                            return;
                        }
                        try {
                            const sr = await apiFetch(`/api/pdv/payment-status/${data.payment_id}`);
                            const sd = await sr.json();
                            if (sd.paid) {
                                clearInterval(interval);
                                setAsaasPolling(null);
                                setAsaasPaid(true);
                            }
                        } catch (e) { /* ignora erro de rede no polling */ }
                    }, 5000);
                    setAsaasPolling(interval);
                } catch (err) {
                    alert('Falha ao conectar com servidor.');
                    setIsCheckoutOpen(true);
                }
            };

            const confirmAsaasPayment = async (label) => {
                if (asaasPolling) { clearInterval(asaasPolling); setAsaasPolling(null); }
                setIsAsaasModalOpen(false);
                await finalizeSale(label || currentAsaasCharge?.label || 'Cartão Asaas');
            };

            const renderView = (overrideView) => {
                const currentView = overrideView || view;
                switch (currentView) {
                    case 'dashboard': {
                        const fmtR = v => `R$ ${parseFloat(v || 0).toFixed(2).replace('.', ',')}`;
                        const fmtDt = dt => { const d = new Date(dt); return isNaN(d) ? '—' : d.toLocaleDateString('pt-BR'); };
                        return (
                            <div class="space-y-4 animate-in fade-in duration-500">
                                <h2 class="text-xl font-bold text-stone-900">Dashboard</h2>
                                {dashLoading && <div class="flex items-center gap-3 py-8 text-stone-500"><div class="w-5 h-5 border-2 border-moriah-brown border-t-transparent rounded-full animate-spin"></div>Carregando dados...</div>}
                                {dashData && !dashLoading && (
                                    <div class="space-y-4">
                                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                                            <div class="bg-white rounded-2xl p-4 shadow-sm border border-stone-100">
                                                <p class="text-[10px] text-stone-400 uppercase tracking-wider mb-1">Hoje</p>
                                                <p class="text-lg font-bold text-emerald-600 truncate">{fmtR(dashData.revenue?.today)}</p>
                                            </div>
                                            <div class="bg-white rounded-2xl p-4 shadow-sm border border-stone-100">
                                                <p class="text-[10px] text-stone-400 uppercase tracking-wider mb-1">Este Mês</p>
                                                <p class="text-lg font-bold text-moriah-brown truncate">{fmtR(dashData.revenue?.month)}</p>
                                            </div>
                                            <div class="bg-white rounded-2xl p-4 shadow-sm border border-stone-100">
                                                <p class="text-[10px] text-stone-400 uppercase tracking-wider mb-1">Aguardando</p>
                                                <p class="text-lg font-bold text-amber-500">{dashData.pending?.count || 0} pedido{dashData.pending?.count !== 1 ? 's' : ''}</p>
                                                <p class="text-[10px] text-stone-400 mt-0.5 truncate">{fmtR(dashData.pending?.total)}</p>
                                            </div>
                                            <div class="bg-white rounded-2xl p-4 shadow-sm border border-stone-100">
                                                <p class="text-[10px] text-stone-400 uppercase tracking-wider mb-1">Estoque Baixo</p>
                                                <p class="text-lg font-bold text-red-500">{(dashData.lowStock || []).length} produto{(dashData.lowStock || []).length !== 1 ? 's' : ''}</p>
                                            </div>
                                        </div>
                                        {(dashData.pending?.sales || []).length > 0 && (
                                            <div class="bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden">
                                                <div class="px-4 py-3 border-b border-stone-100 flex items-center gap-2">
                                                    <LucideIcon name="clock" className="w-4 h-4 text-amber-500" />
                                                    <h3 class="font-bold text-sm text-stone-800">Aguardando Pagamento</h3>
                                                </div>
                                                <div class="divide-y divide-stone-50">
                                                    {(dashData.pending?.sales || []).map(s => (
                                                        <div key={s.id} class="px-4 py-3 flex items-center justify-between gap-2">
                                                            <div class="min-w-0">
                                                                <p class="font-medium text-sm text-stone-800 truncate">{s.customer_name}</p>
                                                                <p class="text-xs text-stone-400">{fmtDt(s.created_at)}</p>
                                                            </div>
                                                            <div class="text-right shrink-0">
                                                                <p class="font-bold text-sm text-moriah-brown">{fmtR(s.total)}</p>
                                                                <span class="text-[10px] px-2 py-0.5 bg-amber-100 text-amber-700 rounded-full">{s.status}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        {(dashData.lowStock || []).length > 0 && (
                                            <div class="bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden">
                                                <div class="px-4 py-3 border-b border-stone-100 flex items-center gap-2">
                                                    <LucideIcon name="alert-triangle" className="w-4 h-4 text-red-500" />
                                                    <h3 class="font-bold text-sm text-stone-800">Estoque Crítico</h3>
                                                </div>
                                                <div class="divide-y divide-stone-50">
                                                    {(dashData.lowStock || []).map(p => (
                                                        <div key={p.id} class="px-4 py-3 flex items-center justify-between gap-2">
                                                            <div class="min-w-0">
                                                                <p class="font-medium text-sm text-stone-800 truncate">{p.name}</p>
                                                                <p class="text-[10px] text-stone-400">{p.category}</p>
                                                            </div>
                                                            <span class={`text-sm font-bold px-3 py-1 rounded-full shrink-0 ${p.stock === 0 ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-600'}`}>
                                                                {p.stock === 0 ? 'Esgotado' : `${p.stock} un.`}
                                                            </span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        {(dashData.recentSales || []).length > 0 && (
                                            <div class="bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden">
                                                <div class="px-4 py-3 border-b border-stone-100 flex items-center gap-2">
                                                    <LucideIcon name="check-circle" className="w-4 h-4 text-emerald-500" />
                                                    <h3 class="font-bold text-sm text-stone-800">Últimas Vendas Pagas</h3>
                                                </div>
                                                <div class="divide-y divide-stone-50">
                                                    {(dashData.recentSales || []).map(s => (
                                                        <div key={s.id} class="px-4 py-3 flex items-center justify-between gap-2">
                                                            <div class="min-w-0">
                                                                <p class="font-medium text-sm text-stone-800 truncate">{s.customer_name || 'Cliente PDV'}</p>
                                                                <p class="text-xs text-stone-400">{fmtDt(s.created_at)} · {s.method || '—'}</p>
                                                            </div>
                                                            <p class="font-bold text-sm text-emerald-600 shrink-0">{fmtR(s.total)}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        );
                    }

                    case 'pos': return (
                        <div class="flex flex-col lg:flex-row gap-6 h-[calc(100dvh-180px)] md:h-[calc(100dvh-96px)] animate-in fade-in duration-500 relative">
                            {cart.length > 0 && (
                                <button onClick={() => setIsMobileCartOpen(true)} class="lg:hidden fixed bottom-24 right-6 z-40 bg-moriah-brown text-white p-4 rounded-full shadow-2xl flex items-center gap-2 animate-bounce">
                                    <LucideIcon name="shopping-cart" className="w-6 h-6" />
                                    <span class="font-bold">{cart.reduce((acc, curr) => acc + curr.quantity, 0)}</span>
                                </button>
                            )}
                            <div class="flex-1 space-y-4 overflow-y-auto pr-2">
                                <div class="relative">
                                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"><LucideIcon name="search" className="w-5 h-5" /></div>
                                    <input type="text" placeholder="Buscar produto por nome ou SKU..." class="w-full pl-12 pr-4 py-3 bg-white border border-stone-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                </div>
                                <div class="product-grid">
                                    {products.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()) || p.sku.toLowerCase().includes(searchTerm.toLowerCase())).map(p => {
                                        const hasTwoGrinds = (p.category === 'Café Grão' || p.category === 'Café Moído') && parseFloat(p.price_moido) > 0;
                                        const handleTap = () => {
                                            if (p.stock <= 0) return;
                                            if (hasTwoGrinds) setGrindPickerProduct(p);
                                            else addToCart(p);
                                        };
                                        return (
                                            <div key={p.id}
                                                role="button"
                                                onPointerUp={handleTap}
                                                class={`flex flex-col justify-between bg-white p-4 rounded-2xl shadow-sm border border-stone-100 active:border-moriah-brown active:bg-stone-50 transition-all h-32 select-none ${p.stock <= 0 ? 'opacity-40 pointer-events-none' : 'cursor-pointer'}`}
                                            >
                                                <div class="flex justify-between items-start gap-1 w-full">
                                                    <p class="font-bold text-sm text-stone-900 leading-tight flex-1 line-clamp-2">{p.name}</p>
                                                    {hasTwoGrinds && <span class="text-[9px] px-1.5 py-0.5 bg-amber-100 text-amber-700 rounded-full shrink-0 font-bold">☕</span>}
                                                </div>
                                                <div class="flex justify-between items-center mt-1 w-full">
                                                    <span class="text-moriah-brown font-bold text-base">R$ {parseFloat(p.price).toFixed(2)}</span>
                                                    <span class={`text-[11px] px-2.5 py-1 rounded-full font-black ${p.stock < p.minStock ? 'bg-red-500 text-white ring-4 ring-red-500/10' : 'bg-emerald-50 text-emerald-700 ring-4 ring-emerald-500/10'}`}>Estoque: {p.stock} {p.stock <= 0 ? '(ESGOTADO)' : ''}</span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            <div class={`fixed lg:static inset-0 lg:inset-auto z-[60] lg:z-0 w-full lg:w-96 bg-white ${isMobileCartOpen ? 'translate-y-0' : 'translate-y-full lg:translate-y-0'} transition-transform duration-300 ease-in-out rounded-t-3xl lg:rounded-3xl shadow-2xl lg:shadow-lg border-t lg:border border-stone-100 flex flex-col overflow-hidden text-stone-900`}>
                                <div class="p-6 border-b border-stone-50 flex justify-between items-center bg-stone-50 md:bg-white">
                                    <div class="flex items-center gap-2 text-stone-900">
                                        <button onClick={() => setIsMobileCartOpen(false)} class="lg:hidden p-2 -ml-2 text-stone-400 hover:text-stone-600"><LucideIcon name="chevron-down" className="w-6 h-6" /></button>
                                        <h3 class="font-bold text-xl">Carrinho</h3>
                                    </div>
                                    <button onClick={() => setCart([])} class="p-2 text-stone-400 hover:text-red-500 transition-colors"><LucideIcon name="trash-2" className="w-5 h-5" /></button>
                                </div>
                                <div class="flex-1 overflow-y-auto p-6 space-y-4">
                                    {cart.map(item => (
                                        <div key={item.cartKey || item.id} class="flex gap-3 items-center">
                                            <div class="flex-1 text-left">
                                                <p class="font-bold text-sm">{item.name}</p>
                                                <p class="text-xs text-stone-400">R$ {parseFloat(item.price).toFixed(2)} un.</p>
                                            </div>
                                            <div class="flex items-center gap-3 bg-stone-100 rounded-full px-2 py-1">
                                                <button onClick={() => updateCartQuantity(item.cartKey || String(item.id), -1)} class="w-6 h-6 flex items-center justify-center font-bold">-</button>
                                                <span class="font-bold text-sm">{item.quantity}</span>
                                                <button onClick={() => updateCartQuantity(item.cartKey || String(item.id), 1)} class="w-6 h-6 flex items-center justify-center font-bold">+</button>
                                            </div>
                                            <p class="font-bold w-20 text-right">R$ {(parseFloat(item.price) * item.quantity).toFixed(2)}</p>
                                        </div>
                                    ))}
                                    {cart.length === 0 && (
                                        <div class="text-center py-12 text-stone-300 flex flex-col items-center">
                                            <LucideIcon name="shopping-cart" className="w-12 h-12 mb-2 opacity-20" />
                                            <p>Carrinho vazio</p>
                                        </div>
                                    )}
                                </div>
                                <div class="p-6 bg-stone-50 border-t border-stone-100 space-y-4">
                                    <div class="flex justify-between items-center text-xl font-bold">
                                        <span>Total</span>
                                        <span class="text-moriah-brown">R$ {cart.reduce((acc, curr) => acc + (curr.price * curr.quantity), 0).toFixed(2)}</span>
                                    </div>

                            const now = new Date();

                            // Filtro de Data (usa created_at do banco ou date do localStorage)
                            let dateMatch = true;
                            if (periodFilter === 'day') dateMatch = saleDate.toDateString() === now.toDateString();
                            else if (periodFilter === 'week') { const diff = now - saleDate; dateMatch = diff <= 7 * 24 * 60 * 60 * 1000; }
                            else if (periodFilter === 'month') dateMatch = saleDate.getMonth() === now.getMonth() && saleDate.getFullYear() === now.getFullYear();

                            // Filtro de Origem — normaliza com/sem acento em Fisico/Físico
                            let originMatch = true;
                            const saleOrigin = s.origin || 'Físico';
                            const isOnline = saleOrigin === 'Online';
                            if (originFilter === 'fisico') originMatch = !isOnline;
                            else if (originFilter === 'online') originMatch = isOnline;

                            return dateMatch && originMatch;
                        });
                        return (
                            <div class="space-y-6 animate-in fade-in duration-500 text-stone-900">
                                {isLoadingSales && <div class="flex items-center justify-center gap-3 py-4 text-stone-500"><div class="w-5 h-5 border-2 border-moriah-brown border-t-transparent rounded-full animate-spin"></div>Carregando vendas...</div>}

                                                <button onClick={() => setPeriodFilter('month')} class={`px-4 py-2 rounded-lg text-xs font-bold transition-all whitespace-nowrap ${periodFilter === 'month' ? 'bg-white shadow-sm text-moriah-brown' : 'text-stone-400'}`}>Mês</button>
                                                <button onClick={() => setPeriodFilter('always')} class={`px-4 py-2 rounded-lg text-xs font-bold transition-all whitespace-nowrap ${periodFilter === 'always' ? 'bg-white shadow-sm text-moriah-brown' : 'text-stone-400'}`}>Tudo</button>

                                        </div>
                                        <div class="flex flex-wrap gap-2">
                                            <div class="flex bg-stone-100 p-1 rounded-xl overflow-x-auto no-scrollbar">

                                    </div>
                                </div>
                                <div class="print-only hidden py-8 border-b-2 border-stone-200 mb-8">
                                    <h1 class="text-3xl font-black text-stone-900">Moriah Café - Relatório de Vendas</h1>

                                    <p class="text-stone-500 font-bold uppercase tracking-widest mt-2">Filtro: {periodFilter === 'always' ? 'Todos os Registros' : periodFilter === 'day' ? 'Vendas de Hoje' : periodFilter === 'week' ? 'Últimos 7 dias' : 'Vendas do Mês'}</p>

                                            const statusColor = (s.tracking_code || s.status === 'Enviado' || s.status === 'Etiqueta Gerada') ? 'bg-indigo-100 text-indigo-700' : (s.status === 'Pago' || s.status === 'Concluído') ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700';

                                                        </div>
                                                        <p class="font-black text-moriah-brown text-base shrink-0">R$ {parseFloat(s.total).toFixed(2)}</p>

                                                    <div class="flex items-center gap-2 flex-wrap">

                                                                <LucideIcon name={s.origin === 'Online' ? 'globe' : 'store'} className="w-3 h-3" /> {s.origin === 'Online' ? 'Online' : 'Físico'}
                                                            </span>
                                                        </td>
                                                        <td class="px-6 py-4">
                                                            <span class={`px-2 py-1 rounded text-[10px] font-bold uppercase ${(s.tracking_code || s.status === 'Enviado' || s.status === 'Etiqueta Gerada') ? 'bg-indigo-100 text-indigo-700' : (s.status === 'Pago' || s.status === 'Concluído') ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>{s.tracking_code ? 'Enviado' : (s.status || 'Concluído')}</span>

                                                        <td class="px-6 py-4 hidden md:table-cell text-xs text-stone-600 max-w-[200px] truncate">{(s.items || []).map(i => `${i.quantity}x ${(i.product_name || i.name)}`).join(', ') || '-'}</td>
                                                        <td class="px-6 py-4 text-right font-bold text-base whitespace-nowrap">R$ {parseFloat(s.total).toFixed(2)}</td>

                                                                <span class="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">{s.tracking_code}</span>

                                                                <span class="text-[10px] font-bold text-amber-700 bg-amber-50 px-2 py-1 rounded">Retirada</span>

                                                                <span class="text-[10px] font-bold text-orange-700 bg-orange-50 px-2 py-1 rounded">Entrega Local</span>
                                                            ) : s.origin === 'Online' && s.shipping_service && s.customer_cep ? (
                                                                <button onClick={() => generateLabel(s.id)} class="text-xs bg-moriah-brown hover:bg-moriah-dark px-3 py-1.5 rounded-lg text-white font-bold transition-all shadow-sm whitespace-nowrap">Gerar Etiqueta</button>
                                                            ) : (
                                                                <span class="text-xs text-stone-300">-</span>
                                                            )}
                                                        </td>
                                                    </tr>
                                                ))}
                                                {filteredSales.length === 0 && (<tr><td colSpan="6" class="px-6 py-12 text-center text-stone-400">Nenhuma venda registrada neste período.</td></tr>)}
                                            </tbody>
                                            {filteredSales.length > 0 && (
                                                <tfoot class="bg-stone-50 border-t border-stone-100">
                                                    <tr class="font-black text-base"><td colSpan="4" class="px-6 py-4 text-right">TOTAL ACUMULADO</td><td class="px-6 py-4 text-right text-moriah-brown">R$ {filteredSales.reduce((acc, curr) => acc + parseFloat(curr.total), 0).toFixed(2)}</td><td></td></tr>
                                                </tfoot>
                                            )}
                                        </table>
                                    </div>
                                </div>
                            </div>
                        );
                    }
                    case 'add_product':
                    case 'edit_product':
                        return <ProductForm
                            isEdit={view === 'edit_product'}
                            editingProduct={editingProduct}
                            setProducts={setProducts}
                            setEditingProduct={setEditingProduct}
                            setView={setView}
                        />;

                    case 'login': {
                        const handleLogin = async (e) => {
                            e.preventDefault();
                            setLoginError('');
                            setLoginLoading(true);
                            const fd = new FormData(e.target);
                            try {
                                const res = await apiFetch('/api/auth/login', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ username: fd.get('username'), password: fd.get('password') })
                                });
                                const data = await res.json();
                                if (!res.ok) { setLoginError(data.error || 'Erro ao fazer login.'); return; }
                                localStorage.setItem('moriah_jwt', data.token);
                                setCurrentUser(data);
                            } catch {
                                setLoginError('Sem conexão com o servidor.');
                            } finally {
                                setLoginLoading(false);
                            }
                        };
                        return (
                            <div class="fixed inset-0 bg-stone-50 flex items-center justify-center p-4">
                                <div class="bg-white w-full max-w-md rounded-[40px] shadow-2xl overflow-hidden p-10 flex flex-col items-center">

                                    <form class="w-full space-y-4" onSubmit={handleLogin}>
                                        <div>
                                            <label class="text-[10px] uppercase font-bold text-stone-400 ml-4 mb-1 block">Usuário</label>
                                            <input name="username" required autoCapitalize="none" class="w-full px-6 py-4 bg-stone-50 border border-stone-100 rounded-2xl font-bold focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" placeholder="admin" />
                                        </div>
                                        <div>
                                            <label class="text-[10px] uppercase font-bold text-stone-400 ml-4 mb-1 block">Senha</label>

                                        {loginError && <p class="text-red-500 text-sm text-center font-medium">{loginError}</p>}
                                        <button type="submit" disabled={loginLoading} class="w-full py-5 bg-moriah-brown text-white rounded-2xl font-black text-xl hover:bg-moriah-dark transition-all shadow-xl shadow-stone-200 mt-4 disabled:opacity-60 flex items-center justify-center gap-3">

                            </div>

                                    e.preventDefault();

                                    Object.keys(siteSettings).forEach(key => formData.append(key, siteSettings[key] || ''));

                                    if (imageFile) formData.append('about_image_file', imageFile);

                                    try {

                                            method: 'PUT',
                                            body: formData
                                        });

                                            alert('Conteúdo atualizado com sucesso no site!');

                                                    <span class="font-black text-xl text-stone-800">{parseFloat(grindPickerProduct.price_moido || 0).toFixed(2)}</span>
                                                </div>
                                            </button>
                                        </div>
                                        <div class="px-8 pb-6 flex justify-center">
                                            <p class="text-[9px] text-stone-400 font-medium">Toque para selecionar e adicionar ao carrinho</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    );

                    case 'inventory': return (
                        <div class="space-y-4 animate-in fade-in duration-500">
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 text-stone-900">
                                <h2 class="text-xl md:text-2xl font-bold">Inventário</h2>
                                <div class="flex flex-wrap items-center gap-2">
                                    <label class="cursor-pointer bg-stone-100 text-stone-600 px-3 py-2 rounded-xl hover:bg-stone-200 transition-all font-bold text-xs sm:text-sm flex items-center gap-1.5 shadow-sm border border-stone-200">
                                        <LucideIcon name="download-cloud" className="w-4 h-4" /> <span class="hidden sm:inline">Nuvemshop</span> CSV
                                        <input type="file" accept=".csv" className="hidden" onChange={async (e) => {
                                            const file = e.target.files[0];
                                            if (!file) return;

                                            const formData = new FormData();
                                            formData.append('file', file);

                                            // Loading states could be added here
                                            alert('Importando produtos, aguarde...');
                                            try {
                                                const res = await apiFetch('/api/products/import', { method: 'POST', body: formData });
                                                const data = await res.json();

                                                alert(data.message || data.error || 'Erro desconhecido');

                                                if (res.ok) {
                                                    // Atualiza a tabela chamando a API de produtos novamente
                                                    const reload = await apiFetch('/api/products');
                                                    setProducts(await reload.json());
                                                }
                                            } catch (err) {
                                                console.error(err);
                                                alert('Falha na comunicação com o servidor.');
                                            }
                                        }} />
                                    </label>
                                    <button onClick={() => { setView('add_product'); }} class="flex items-center gap-1.5 bg-moriah-teal text-white px-4 py-2 rounded-xl hover:bg-emerald-900 transition-all shadow-md text-sm font-bold">
                                        <LucideIcon name="plus" className="w-4 h-4" />Novo Produto
                                    </button>
                                </div>
                            </div>
                            <div class="bg-white rounded-3xl shadow-sm border border-stone-100 overflow-hidden">
                                {/* Mobile: cards (sem scroll horizontal) */}
                                <div class="sm:hidden divide-y divide-stone-100">
                                    {products.map(p => (
                                        <div key={p.id} class="flex items-center gap-3 px-4 py-3">
                                            <div class="flex-1 min-w-0">
                                                <p class="font-bold text-sm text-stone-900 truncate">{p.name}</p>
                                                <p class="text-xs text-stone-400">
                                                    {p.category} ·
                                                    {(p.category === 'Café' || p.stock_grao > 0 || p.stock_moido > 0) ? (
                                                        <span class="ml-1 space-x-1">
                                                            <span class="bg-amber-100 text-amber-700 px-1 rounded text-[10px]">G: {p.stock_grao || 0}</span>
                                                            <span class="bg-stone-100 text-stone-700 px-1 rounded text-[10px]">P: {p.stock_moido || 0}</span>
                                                        </span>
                                                    ) : (
                                                        <span class={`font-black px-1.5 py-0.5 rounded text-[10px] ${p.stock < p.minStock ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`}>Estoque: {p.stock}</span>
                                                    )}
                                                </p>
                                                <div class="flex items-center gap-2">
                                                    {p.category === 'Café' ? (
                                                        <>
                                                            {parseFloat(p.price_moido) > 0 && parseFloat(p.price) !== parseFloat(p.price_moido) ? (
                                                                <p class="text-xs font-bold text-stone-700">G: {fmtR(p.price)} | P: {fmtR(p.price_moido)}</p>
                                                            ) : (
                                                                <p class="text-sm font-bold text-moriah-brown">{fmtR(p.price || p.price_moido)}</p>
                                                            )}
                                                        </>
                                                    ) : (
                                                        <p class="text-sm font-bold text-moriah-brown">{fmtR(p.price)}</p>
                                                    )}
                                                </div>
                                            </div>
                                            <div class="flex gap-1 shrink-0">
                                                <button onClick={() => { setEditingProduct(p); setView('edit_product'); }} class="p-2.5 rounded-xl bg-stone-50 text-stone-500 active:bg-moriah-brown active:text-white transition-colors"><LucideIcon name="pencil" className="w-4 h-4" /></button>
                                                <button onClick={() => deleteProduct(p.id)} class="p-2.5 rounded-xl bg-stone-50 text-stone-400 active:bg-red-500 active:text-white transition-colors"><LucideIcon name="trash-2" className="w-4 h-4" /></button>
                                            </div>
                                        </div>
                                    ))}
                                    {products.length === 0 && <p class="px-4 py-8 text-center text-stone-300 italic">Nenhum produto cadastrado.</p>}
                                </div>
                                {/* Desktop: tabela completa */}
                                <div class="hidden sm:block overflow-x-auto">
                                    <table class="w-full text-left">
                                        <thead class="bg-stone-50 border-b border-stone-100 text-stone-500 text-xs font-medium uppercase tracking-wider">
                                            <tr>
                                                <th class="px-6 py-4">Produto</th><th class="px-6 py-4 hidden md:table-cell">Categoria</th><th class="px-6 py-4">Estoque</th>
                                                <th class="px-6 py-4 hidden md:table-cell">Custo</th><th class="px-6 py-4">Venda</th><th class="px-6 py-4 hidden lg:table-cell">Ganhos</th>
                                                <th class="px-6 py-4 text-right">Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-stone-50 text-stone-900">
                                            {products.map(p => (
                                                <tr key={p.id} class="hover:bg-stone-50 transition-colors">
                                                    <td class="px-6 py-4"><p class="font-bold">{p.name}</p><p class="text-xs text-stone-400">{p.sku}</p></td>
                                                    <td class="px-6 py-4 hidden md:table-cell"><span class="px-2 py-1 bg-stone-100 rounded text-xs text-stone-600">{p.category}</span></td>
                                                    <td class="px-6 py-4">
                                                        {(p.category === 'Café' || p.stock_grao > 0 || p.stock_moido > 0) ? (
                                                            <div class="flex flex-col gap-1">
                                                                <span class="text-[10px] font-bold text-amber-700 bg-amber-50 px-2 py-0.5 rounded w-max">G: {p.stock_grao || 0}</span>
                                                                <span class="text-[10px] font-bold text-stone-700 bg-stone-50 px-2 py-0.5 rounded w-max">P: {p.stock_moido || 0}</span>
                                                            </div>
                                                        ) : (
                                                            <span class={`font-bold ${p.stock < p.minStock ? 'text-red-500' : 'text-stone-700'}`}>{p.stock}</span>
                                                        )}
                                                    </td>
                                                    <td class="px-6 py-4 text-stone-500 hidden md:table-cell">R$ {p.cost.toFixed(2)}</td>
                                                    <td class="px-6 py-4 font-bold text-moriah-brown whitespace-nowrap">R$ {p.price.toFixed(2)}</td>
                                                    <td class="px-6 py-4 hidden lg:table-cell whitespace-nowrap"><span class="text-emerald-600 font-medium">R$ {(p.price - p.cost).toFixed(2)}</span><span class="text-[10px] text-emerald-500 ml-1">{p.cost > 0 ? `(${(((p.price - p.cost) / p.cost) * 100).toFixed(0)}%)` : ''}</span></td>
                                                    <td class="px-6 py-4 text-right">
                                                        <div class="flex justify-end gap-2">
                                                            <button onClick={() => { setEditingProduct(p); setView('edit_product'); }} class="p-2 text-stone-400 hover:text-moriah-brown transition-colors hover:bg-stone-100 rounded-lg" title="Editar"><LucideIcon name="pencil" className="w-4 h-4" /></button>
                                                            <button onClick={() => deleteProduct(p.id)} class="p-2 text-stone-300 hover:text-red-500 transition-colors hover:bg-stone-50 rounded-lg" title="Excluir"><LucideIcon name="trash-2" className="w-4 h-4" /></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    );

                    case 'sales': {
                        const filteredSales = sales.filter(s => {
                            const saleDate = new Date(s.created_at || s.date);
                            const now = new Date();

                            // Filtro de Data (usa created_at do banco ou date do localStorage)
                            let dateMatch = true;
                            if (periodFilter === 'day') dateMatch = saleDate.toDateString() === now.toDateString();
                            else if (periodFilter === 'week') { const diff = now - saleDate; dateMatch = diff <= 7 * 24 * 60 * 60 * 1000; }
                            else if (periodFilter === 'month') dateMatch = saleDate.getMonth() === now.getMonth() && saleDate.getFullYear() === now.getFullYear();

                            // Filtro de Origem — normaliza com/sem acento em Fisico/Físico
                            let originMatch = true;
                            const saleOrigin = s.origin || 'Físico';
                            const isOnline = saleOrigin === 'Online';
                            if (originFilter === 'fisico') originMatch = !isOnline;
                            else if (originFilter === 'online') originMatch = isOnline;

                            return dateMatch && originMatch;
                        });
                        return (
                            <div class="space-y-6 animate-in fade-in duration-500 text-stone-900">
                                {isLoadingSales && <div class="flex items-center justify-center gap-3 py-4 text-stone-500"><div class="w-5 h-5 border-2 border-moriah-brown border-t-transparent rounded-full animate-spin"></div>Carregando vendas...</div>}
                                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 no-print">
                                    <h2 class="text-2xl font-bold">Relatório de Vendas</h2>
                                    <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
                                        <div class="flex flex-wrap gap-2">
                                            <div class="flex bg-stone-100 p-1 rounded-xl overflow-x-auto no-scrollbar">
                                                <button onClick={() => setPeriodFilter('day')} class={`px-4 py-2 rounded-lg text-xs font-bold transition-all whitespace-nowrap ${periodFilter === 'day' ? 'bg-white shadow-sm text-moriah-brown' : 'text-stone-400'}`}>Hoje</button>
                                                <button onClick={() => setPeriodFilter('week')} class={`px-4 py-2 rounded-lg text-xs font-bold transition-all whitespace-nowrap ${periodFilter === 'week' ? 'bg-white shadow-sm text-moriah-brown' : 'text-stone-400'}`}>Semana</button>
                                                <button onClick={() => setPeriodFilter('month')} class={`px-4 py-2 rounded-lg text-xs font-bold transition-all whitespace-nowrap ${periodFilter === 'month' ? 'bg-white shadow-sm text-moriah-brown' : 'text-stone-400'}`}>Mês</button>
                                                <button onClick={() => setPeriodFilter('always')} class={`px-4 py-2 rounded-lg text-xs font-bold transition-all whitespace-nowrap ${periodFilter === 'always' ? 'bg-white shadow-sm text-moriah-brown' : 'text-stone-400'}`}>Tudo</button>
                                            </div>
                                        </div>
                                        <div class="flex flex-wrap gap-2">
                                            <div class="flex bg-stone-100 p-1 rounded-xl overflow-x-auto no-scrollbar">
                                                <button onClick={() => setOriginFilter('all')} class={`px-4 py-2 rounded-lg text-xs font-bold transition-all whitespace-nowrap ${originFilter === 'all' ? 'bg-white shadow-sm text-moriah-brown' : 'text-stone-400'}`}>Todas Origens</button>
                                                <button onClick={() => setOriginFilter('fisico')} class={`px-4 py-2 rounded-lg text-xs font-bold transition-all whitespace-nowrap flex items-center gap-1 ${originFilter === 'fisico' ? 'bg-white shadow-sm text-moriah-brown' : 'text-stone-400'}`}><LucideIcon name="store" className="w-3 h-3" />Físico</button>
                                                <button onClick={() => setOriginFilter('online')} class={`px-4 py-2 rounded-lg text-xs font-bold transition-all whitespace-nowrap flex items-center gap-1 ${originFilter === 'online' ? 'bg-white shadow-sm text-moriah-brown' : 'text-stone-400'}`}><LucideIcon name="globe" className="w-3 h-3" />Online</button>
                                            </div>
                                        </div>
                                        <button onClick={() => window.print()} class="flex items-center justify-center gap-2 bg-moriah-brown text-white px-6 py-2 rounded-xl hover:bg-moriah-dark transition-all shadow-lg hidden md:flex"><LucideIcon name="printer" className="w-4 h-4" />Imprimir</button>
                                        <button onClick={fetchSales} disabled={isLoadingSales} class="flex items-center justify-center gap-2 bg-emerald-600 text-white px-4 py-2 rounded-xl hover:bg-emerald-700 transition-all shadow-sm text-sm font-bold disabled:opacity-50"><LucideIcon name="refresh-cw" className="w-4 h-4" />Atualizar</button>
                                    </div>
                                </div>
                                <div class="print-only hidden py-8 border-b-2 border-stone-200 mb-8">
                                    <h1 class="text-3xl font-black text-stone-900">Moriah Café - Relatório de Vendas</h1>
                                    <p class="text-stone-500">Gerado em: {new Date().toLocaleString()}</p>
                                    <p class="text-stone-500 font-bold uppercase tracking-widest mt-2">Filtro: {periodFilter === 'always' ? 'Todos os Registros' : periodFilter === 'day' ? 'Vendas de Hoje' : periodFilter === 'week' ? 'Últimos 7 dias' : 'Vendas do Mês'}</p>
                                </div>
                                <div class="bg-white rounded-3xl shadow-sm border border-stone-100 overflow-hidden text-sm">
                                    {/* Mobile: cards de venda (sem scroll horizontal) */}
                                    <div class="sm:hidden divide-y divide-stone-100">
                                        {filteredSales.map(s => {
                                            const statusColor = (s.tracking_code || s.status === 'Enviado' || s.status === 'Etiqueta Gerada') ? 'bg-indigo-100 text-indigo-700' : (s.status === 'Pago' || s.status === 'Concluído') ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700';
                                            return (
                                                <div key={s.id} class="px-4 py-3 space-y-1">
                                                    <div class="flex items-start justify-between gap-2">
                                                        <div class="min-w-0">
                                                            <p class="font-bold text-stone-900 text-sm truncate">{s.customer_name || s.seller || 'PDV'}</p>
                                                            <p class="text-xs text-stone-400">{new Date(s.created_at || s.date).toLocaleString('pt-BR')}</p>
                                                        </div>
                                                        <p class="font-black text-moriah-brown text-base shrink-0">R$ {parseFloat(s.total).toFixed(2)}</p>
                                                    </div>
                                                    <div class="flex items-center gap-2 flex-wrap">
                                                        <span class={`text-[10px] font-bold px-2 py-0.5 rounded-full ${s.origin === 'Online' ? 'bg-emerald-100 text-emerald-700' : 'bg-stone-100 text-stone-600'}`}>{s.origin === 'Online' ? 'Online' : 'Físico'}</span>
                                                        <span class={`text-[10px] font-bold px-2 py-0.5 rounded-full ${statusColor}`}>{s.tracking_code ? 'Enviado' : (s.status || 'Concluído')}</span>
                                                        {!s.tracking_code && s.origin === 'Online' && s.shipping_service && s.customer_cep && s.shipping_service !== 'RETIRADA' && !['Expressa Moriah ☕', 'Entrega Padrão Feira'].includes(s.shipping_service) && (
                                                            <button onClick={() => generateLabel(s.id)} class="text-[10px] bg-moriah-brown px-3 py-1 rounded-lg text-white font-bold">Gerar Etiqueta</button>
                                                        )}
                                                        {s.tracking_code && <span class="text-[10px] font-mono text-indigo-600 truncate max-w-[120px]">{s.tracking_code}</span>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {filteredSales.length === 0 && <p class="px-4 py-8 text-center text-stone-400">Nenhuma venda neste período.</p>}
                                        {filteredSales.length > 0 && (
                                            <div class="px-4 py-3 bg-stone-50 flex justify-between items-center font-black">
                                                <span class="text-stone-500 text-xs uppercase tracking-wider">Total acumulado</span>
                                                <span class="text-moriah-brown">R$ {filteredSales.reduce((acc, curr) => acc + parseFloat(curr.total), 0).toFixed(2)}</span>
                                            </div>
                                        )}
                                    </div>
                                    {/* Desktop: tabela completa */}
                                    <div class="hidden sm:block overflow-x-auto">
                                        <table class="w-full text-left">
                                            <thead class="bg-stone-50 border-b border-stone-100 text-stone-500 text-xs font-medium uppercase tracking-wider">
                                                <tr><th class="px-6 py-3">Data</th><th class="px-6 py-3">Origem</th><th class="px-6 py-3">Status</th><th class="px-6 py-3 hidden md:table-cell">Itens</th><th class="px-6 py-3 text-right">Total</th><th class="px-6 py-3 text-center">Ações</th></tr>
                                            </thead>
                                            <tbody class="divide-y divide-stone-50 text-sm">
                                                {filteredSales.map(s => (
                                                    <tr key={s.id} class="hover:bg-stone-50 transition-colors">
                                                        <td class="px-6 py-4">
                                                            <p class="font-bold">{s.customer_name || s.seller || 'PDV'}</p><p class="text-xs text-stone-400">{new Date(s.created_at || s.date).toLocaleString('pt-BR')}</p>
                                                        </td>
                                                        <td class="px-6 py-4">
                                                            <span class={`flex items-center gap-1 w-max px-2 py-1 rounded-md text-[10px] font-bold uppercase ${s.origin === 'Online' ? 'bg-emerald-100 text-emerald-700' : 'bg-stone-100 text-stone-600'}`}>
                                                                <LucideIcon name={s.origin === 'Online' ? 'globe' : 'store'} className="w-3 h-3" /> {s.origin === 'Online' ? 'Online' : 'Físico'}
                                                            </span>
                                                        </td>
                                                        <td class="px-6 py-4">
                                                            <span class={`px-2 py-1 rounded text-[10px] font-bold uppercase ${(s.tracking_code || s.status === 'Enviado' || s.status === 'Etiqueta Gerada') ? 'bg-indigo-100 text-indigo-700' : (s.status === 'Pago' || s.status === 'Concluído') ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>{s.tracking_code ? 'Enviado' : (s.status || 'Concluído')}</span>
                                                        </td>
                                                        <td class="px-6 py-4 hidden md:table-cell text-xs text-stone-600 max-w-[200px] truncate">{(s.items || []).map(i => `${i.quantity}x ${(i.product_name || i.name)}`).join(', ') || '-'}</td>
                                                        <td class="px-6 py-4 text-right font-bold text-base whitespace-nowrap">R$ {parseFloat(s.total).toFixed(2)}</td>
                                                        <td class="px-6 py-4 text-center">
                                                            {s.tracking_code ? (
                                                                <span class="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">{s.tracking_code}</span>
                                                            ) : s.origin === 'Online' && s.shipping_service === 'RETIRADA' ? (
                                                                <span class="text-[10px] font-bold text-amber-700 bg-amber-50 px-2 py-1 rounded">Retirada</span>
                                                            ) : s.origin === 'Online' && ['Expressa Moriah ☕', 'Entrega Padrão Feira'].includes(s.shipping_service) ? (
                                                                <span class="text-[10px] font-bold text-orange-700 bg-orange-50 px-2 py-1 rounded">Entrega Local</span>
                                                            ) : s.origin === 'Online' && s.shipping_service && s.customer_cep ? (
                                                                <button onClick={() => generateLabel(s.id)} class="text-xs bg-moriah-brown hover:bg-moriah-dark px-3 py-1.5 rounded-lg text-white font-bold transition-all shadow-sm whitespace-nowrap">Gerar Etiqueta</button>
                                                            ) : (
                                                                <span class="text-xs text-stone-300">-</span>
                                                            )}
                                                        </td>
                                                    </tr>
                                                ))}
                                                {filteredSales.length === 0 && (<tr><td colSpan="6" class="px-6 py-12 text-center text-stone-400">Nenhuma venda registrada neste período.</td></tr>)}
                                            </tbody>
                                            {filteredSales.length > 0 && (
                                                <tfoot class="bg-stone-50 border-t border-stone-100">
                                                    <tr class="font-black text-base"><td colSpan="4" class="px-6 py-4 text-right">TOTAL ACUMULADO</td><td class="px-6 py-4 text-right text-moriah-brown">R$ {filteredSales.reduce((acc, curr) => acc + parseFloat(curr.total), 0).toFixed(2)}</td><td></td></tr>
                                                </tfoot>
                                            )}
                                        </table>
                                    </div>
                                </div>
                            </div>
                        );
                    }
                    case 'add_product':
                    case 'edit_product':
                        return <ProductForm
                            isEdit={view === 'edit_product'}
                            editingProduct={editingProduct}
                            setProducts={setProducts}
                            setEditingProduct={setEditingProduct}
                            setView={setView}
                        />;

                    case 'login': {
                        const handleLogin = async (e) => {
                            e.preventDefault();
                            setLoginError('');
                            setLoginLoading(true);
                            const fd = new FormData(e.target);
                            try {
                                const res = await apiFetch('/api/auth/login', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ username: fd.get('username'), password: fd.get('password') })
                                });
                                const data = await res.json();
                                if (!res.ok) { setLoginError(data.error || 'Erro ao fazer login.'); return; }
                                localStorage.setItem('moriah_jwt', data.token);
                                setCurrentUser(data);
                            } catch {
                                setLoginError('Sem conexão com o servidor.');
                            } finally {
                                setLoginLoading(false);
                            }
                        };
                        return (
                            <div class="fixed inset-0 bg-stone-50 flex items-center justify-center p-4">
                                <div class="bg-white w-full max-w-md rounded-[40px] shadow-2xl overflow-hidden p-10 flex flex-col items-center">
                                    <img src={logoUrl} class="w-40 h-auto mb-10 object-contain" />
                                    
                                    <form class="w-full space-y-6" onSubmit={handleLogin}>
                                        <div class="relative">
                                            <label class="text-[10px] uppercase font-bold text-stone-400 ml-4 mb-1 block">Usuário</label>
                                            <div class="relative">
                                                <div class="absolute left-6 top-1/2 -translate-y-1/2 text-stone-400">
                                                    <LucideIcon name="user" className="w-5 h-5" />
                                                </div>
                                                <input name="username" required autoCapitalize="none" class="w-full pl-14 pr-6 py-4 bg-stone-50 border border-stone-100 rounded-2xl font-bold focus:outline-none focus:ring-2 focus:ring-moriah-brown/50 transition-all" placeholder="Digite seu usuário" />
                                            </div>
                                        </div>
                                        <div class="relative">
                                            <label class="text-[10px] uppercase font-bold text-stone-400 ml-4 mb-1 block">Senha</label>
                                            <div class="relative">
                                                <div class="absolute left-6 top-1/2 -translate-y-1/2 text-stone-400">
                                                    <LucideIcon name="lock" className="w-5 h-5" />
                                                </div>
                                                <input name="password" type="password" required class="w-full pl-14 pr-6 py-4 bg-stone-50 border border-stone-100 rounded-2xl font-bold focus:outline-none focus:ring-2 focus:ring-moriah-brown/50 transition-all" placeholder="••••••••" />
                                            </div>
                                        </div>
                                        {loginError && <p class="text-red-500 text-sm text-center font-medium bg-red-50 py-2 rounded-xl border border-red-100">{loginError}</p>}
                                        <button type="submit" disabled={loginLoading} class="w-full py-5 bg-moriah-brown text-white rounded-2xl font-black text-xl hover:bg-moriah-dark transition-all shadow-xl shadow-stone-200 mt-4 disabled:opacity-60 flex items-center justify-center gap-3">
                                            {loginLoading ? <><div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>Entrando...</> : (
                                                <>
                                                    <LucideIcon name="log-in" className="w-6 h-6" />
                                                    Entrar no Sistema

                    return (
                        <div class="flex items-center justify-center h-screen bg-stone-50 w-full">
                            <div class="text-center p-8 bg-white rounded-3xl shadow-xl border border-stone-100">
                                <div class="w-12 h-12 border-4 border-moriah-brown border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                                <h2 class="text-xl font-bold text-stone-800 mb-2">Restaurando Sessão</h2>
                                <p class="text-stone-500 text-sm">Validando seu pagamento com a InfinitePay...</p>
                                <p class="text-[10px] text-stone-300 mt-4">Por favor, aguarde alguns segundos.</p>
                            </div>
                        </div>
                    );
                }
                return renderView('login');
            }

            // Primeiro login: força troca de senha
            if (currentUser.must_change_password) {
                const handleFirstPassword = async (e) => {
                    e.preventDefault();
                    const fd = new FormData(e.target);
                    const nova = fd.get('nova');
                    const conf = fd.get('confirma');
                    if (nova !== conf) { alert('As senhas não coincidem.'); return; }
                    if (nova.length < 4) { alert('A senha deve ter ao menos 4 caracteres.'); return; }
                    const res = await apiFetch(`/api/users/${currentUser.id}/first-password`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: nova })
                    });
                    if (res.ok) {
                        const updated = { ...currentUser, must_change_password: 0 };
                        setCurrentUser(updated);
                    } else {
                        const d = await res.json();
                        alert(d.error || 'Erro ao alterar senha.');
                    }
                };
                return (
                    <div class="fixed inset-0 bg-stone-50 flex items-center justify-center p-4">
                        <div class="bg-white w-full max-w-md rounded-[40px] shadow-2xl overflow-hidden p-10 flex flex-col items-center">
                            <img src={logoUrl} class="h-12 w-auto mb-8 object-contain" />
                            <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mb-4 text-amber-600"><LucideIcon name="lock" className="w-8 h-8" /></div>
                            <h2 class="text-2xl font-black text-stone-900 mb-1">Bem-vindo, {currentUser.name}!</h2>
                            <p class="text-stone-400 text-sm mb-8 text-center">Por segurança, defina uma senha pessoal antes de continuar.</p>
                            <form class="w-full space-y-4" onSubmit={handleFirstPassword}>
                                <div>
                                    <label class="text-[10px] uppercase font-bold text-stone-400 ml-4 mb-1 block">Nova Senha</label>
                                    <input name="nova" type="password" required minLength="4" class="w-full px-6 py-4 bg-stone-50 border border-stone-100 rounded-2xl font-bold focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" placeholder="Mínimo 4 caracteres" />
                                </div>
                                <div>
                                    <label class="text-[10px] uppercase font-bold text-stone-400 ml-4 mb-1 block">Confirmar Senha</label>
                                    <input name="confirma" type="password" required minLength="4" class="w-full px-6 py-4 bg-stone-50 border border-stone-100 rounded-2xl font-bold focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" placeholder="Repita a senha" />
                                </div>
                                <button type="submit" class="w-full py-5 bg-moriah-brown text-white rounded-2xl font-black text-xl hover:bg-moriah-dark transition-all shadow-xl shadow-stone-200 mt-4 flex items-center justify-center gap-3">
                                    <LucideIcon name="check-circle" className="w-6 h-6" />Definir Senha e Entrar
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const MobileNavItem = ({ icon, label, active, onClick }) => (
                <button onClick={onClick} class={`flex flex-col items-center justify-center flex-1 py-2 transition-all ${active ? 'text-white' : 'text-stone-400/80 hover:text-stone-300'}`}>
                    <LucideIcon name={icon} className={`w-5 h-5 ${active ? 'fill-white/10 text-white' : ''}`} />
                    <span class={`text-[10px] font-bold mt-1 uppercase tracking-tighter ${active ? 'text-white' : 'text-stone-400'}`}>{label}</span>
                </button>
            );

            return (
                <div class="flex flex-col md:flex-row h-screen overflow-hidden bg-stone-50 w-full">
                    <aside class="hidden md:flex w-72 bg-white border-r border-stone-100 flex-col p-6 space-y-8 no-print">
                        <div class="flex items-center justify-between py-2 mb-2">
                            <img src={logoUrl} class="h-8 w-auto max-w-[150px] object-contain" />
                            <div class="relative">
                                <button onClick={(e) => { e.stopPropagation(); setIsNotificationsOpen(!isNotificationsOpen); }} class={`p-2 rounded-xl transition-all ${isNotificationsOpen ? 'bg-moriah-brown text-white shadow-lg' : 'bg-stone-50 text-stone-400 hover:text-moriah-brown'}`}>
                                    <div class="relative">
                                        <LucideIcon name="bell" className="w-5 h-5" />
                                        {notifications.some(n => !n.read) && <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full"></span>}
                                    </div>
                                </button>

                                {isNotificationsOpen && (
                                    <div class="absolute left-0 top-12 w-80 bg-white rounded-2xl shadow-2xl border border-stone-100 overflow-hidden z-50 animate-in zoom-in-95 duration-200 origin-top-left">
                                        <div class="p-4 border-b border-stone-100 flex items-center justify-between bg-stone-50/50">
                                            <h4 class="font-bold text-sm text-stone-900">Notificações</h4>
                                            <button onClick={() => { setNotifications(notifications.map(n => ({ ...n, read: true }))); }} class="text-[10px] font-bold text-moriah-brown hover:underline">Marcar todas</button>
                                        </div>
                                        <div class="max-h-80 overflow-y-auto divide-y divide-stone-50">
                                            {notifications.length > 0 ? notifications.map(n => (
                                                <div key={n.id} class={`p-4 hover:bg-stone-50 transition-colors ${!n.read ? 'bg-moriah-brown/5' : ''}`}>
                                                    <div class="flex gap-3">
                                                        <div class={`w-2 h-2 rounded-full mt-1.5 shrink-0 ${n.type === 'success' ? 'bg-emerald-500' : n.type === 'warning' ? 'bg-amber-500' : n.type === 'error' ? 'bg-red-500' : 'bg-blue-500'}`}></div>
                                                        <div>
                                                            <p class="text-xs font-bold text-stone-900">{n.title}</p>
                                                            <p class="text-[11px] text-stone-500 leading-tight mt-0.5">{n.message}</p>
                                                            <p class="text-[9px] text-stone-400 mt-1">{new Date(n.date).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )) : (
                                                <div class="p-8 text-center text-stone-400">
                                                    <LucideIcon name="bell-off" className="w-8 h-8 mx-auto mb-2 opacity-20" />
                                                    <p class="text-xs">Silêncio por aqui...</p>
                                                </div>
                                            )}
                                        </div>
                                        {notifications.length > 0 && (
                                            <button onClick={() => setNotifications([])} class="w-full py-3 text-center text-xs font-bold text-stone-400 hover:text-red-500 transition-colors bg-stone-50/50 border-t border-stone-50">Limpar histórico</button>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                        <nav class="flex-1 space-y-2">
                            <SidebarItem onClick={() => setView('dashboard')} active={view === 'dashboard'} icon="layout-dashboard" label="Dashboard" />
                            <SidebarItem onClick={() => setView('pos')} active={view === 'pos'} icon="shopping-bag" label="Ponto de Venda" />
                            <SidebarItem onClick={() => setView('inventory')} active={view === 'inventory'} icon="package" label="Inventário" />
                            <SidebarItem onClick={() => setView('customers')} active={view === 'customers'} icon="users-round" label="Clientes" />
                            <SidebarItem onClick={() => setView('sales')} active={view === 'sales'} icon="file-text" label="Relatórios" />
                            <SidebarItem onClick={() => setView('site_settings')} active={view === 'site_settings'} icon="store" label="Ecommerce CMS" />
                            <SidebarItem onClick={() => setView('settings')} active={view === 'settings'} icon="settings" label="Sistema" />
                        </nav>
                        <div class="space-y-4">
                            <div class="p-4 bg-stone-50 rounded-2xl border border-stone-100">
                                <p class="text-[10px] font-bold text-stone-400 mb-1 uppercase">Logado como</p>
                                <p class="text-sm font-black text-stone-900 truncate">{currentUser.name || currentUser.username}</p>
                                <button onClick={() => { localStorage.removeItem('moriah_jwt'); setCurrentUser(null); }} class="text-[10px] text-moriah-brown font-bold mt-2 hover:underline">Sair do Sistema</button>
                            </div>
                        </div>
                    </aside>
                    <header class="md:hidden sticky top-0 z-40 bg-white border-b border-stone-100 px-4 py-3 flex items-center justify-between no-print w-full">
                        <img src={logoUrl} class="h-7 w-auto max-w-[120px] object-contain" />
                        <div class="flex items-center gap-3">
                            <div class="relative">
                                <button onClick={() => setIsNotificationsOpen(!isNotificationsOpen)} class="p-2 bg-stone-50 rounded-lg text-stone-600 relative">
                                    <LucideIcon name="bell" className="w-5 h-5" />
                                    {notifications.filter(n => !n.read).length > 0 && (
                                        <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-bold w-4 h-4 rounded-full flex items-center justify-center border-2 border-white">
                                            {notifications.filter(n => !n.read).length}
                                        </span>
                                    )}
                                </button>
                                {isNotificationsOpen && (
                                    <div class="absolute right-0 mt-2 w-72 bg-white rounded-2xl shadow-2xl border border-stone-100 z-50 overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                                        <div class="p-4 border-b border-stone-50 flex justify-between items-center bg-stone-50/50">
                                            <h4 class="font-bold text-sm text-stone-900">Notificações</h4>
                                            <button onClick={() => { setNotifications(notifications.map(n => ({ ...n, read: true }))); }} class="text-[10px] font-bold text-moriah-brown hover:underline">Marcar todas como lidas</button>
                                        </div>
                                        <div class="max-h-80 overflow-y-auto divide-y divide-stone-50">
                                            {notifications.length > 0 ? notifications.map(n => (
                                                <div key={n.id} class={`p-4 hover:bg-stone-50 transition-colors ${!n.read ? 'bg-moriah-brown/5' : ''}`}>
                                                    <div class="flex gap-3">
                                                        <div class={`w-2 h-2 rounded-full mt-1.5 shrink-0 ${n.type === 'success' ? 'bg-emerald-500' : n.type === 'warning' ? 'bg-amber-500' : n.type === 'error' ? 'bg-red-500' : 'bg-blue-500'}`}></div>
                                                        <div>
                                                            <p class="text-xs font-bold text-stone-900">{n.title}</p>
                                                            <p class="text-[11px] text-stone-500 leading-tight mt-0.5">{n.message}</p>
                                                            <p class="text-[9px] text-stone-400 mt-1">{new Date(n.date).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )) : (
                                                <div class="p-8 text-center text-stone-400">
                                                    <LucideIcon name="bell-off" className="w-8 h-8 mx-auto mb-2 opacity-20" />
                                                    <p class="text-xs">Nenhuma notificação</p>
                                                </div>
                                            )}
                                        </div>
                                        {notifications.length > 0 && (
                                            <button onClick={() => setNotifications([])} class="w-full py-3 text-center text-xs font-bold text-stone-400 hover:text-red-500 transition-colors bg-stone-50/50 border-t border-stone-50">Limpar histórico</button>
                                        )}
                                    </div>
                                )}
                            </div>
                            <div class="text-right"><p class="text-[8px] font-bold text-stone-400 uppercase leading-none">Vendedor</p><p class="text-xs font-black text-stone-900 leading-none mt-0.5">{currentUser.username}</p></div>
                            <button onClick={() => { localStorage.removeItem('moriah_jwt'); setCurrentUser(null); }} class="p-2 bg-stone-50 rounded-lg text-moriah-brown p-2"><LucideIcon name="log-out" className="w-4 h-4" /></button>
                        </div>
                    </header>
                    <main class="flex-1 p-4 md:p-8 overflow-y-auto pb-32 md:pb-8">{renderView()}</main>
                    <nav class="md:hidden fixed bottom-0 left-0 right-0 w-full h-[72px] bg-moriah-black border-t border-white/5 flex items-center px-0 no-print z-60 shadow-[0_-8px_30px_rgb(0,0,0,0.4)] pb-safe">
                        <MobileNavItem onClick={() => setView('dashboard')} active={view === 'dashboard'} icon="layout-dashboard" label="Painel" />
                        <MobileNavItem onClick={() => setView('pos')} active={view === 'pos'} icon="shopping-bag" label="Venda" />
                        <MobileNavItem onClick={() => setView('inventory')} active={view === 'inventory'} icon="package" label="Estoque" />
                        <MobileNavItem onClick={() => setView('customers')} active={view === 'customers'} icon="users-round" label="Clientes" />
                        <MobileNavItem onClick={() => setView('sales')} active={view === 'sales' || view === 'settings'} icon="more-horizontal" label="Mais" />
                    </nav>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>

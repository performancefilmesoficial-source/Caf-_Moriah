<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moriah Café - PDV & Gestão</title>
    <link rel=icon type=image/png href=favicon.png>
    <link rel=apple-touch-icon href=favicon.png>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Remove qualquer Service Worker antigo que possa estar causando loops -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
                regs.forEach(function (r) { r.unregister(); });
            });
        }
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        moriah: {
                            brown: '#4A3728',
                            dark: '#2D1E15',
                            cream: '#F5F5DC',
                            teal: '#004D40',
                            green: '#123930',
                            gray: '#212121',
                            black: '#1a1817',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html,
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            overflow-x: hidden;
            max-width: 100vw;
            -webkit-text-size-adjust: 100%;
        }

        /* Corrige toque em botões no iOS — sem delay de 300ms */
        button,
        [role="button"],
        a {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .pt-safe {
            padding-top: env(safe-area-inset-top, 0);
        }

        .pb-32 {
            padding-bottom: 8rem;
        }

        /* Garante que nenhum elemento estoure a largura da tela */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }

        @media (max-width: 640px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }
        }

        @media (min-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }

        .mobile-nav-shadow {
            box-shadow: 0 -4px 20px -5px rgba(0, 0, 0, 0.1);
        }

        @media print {
            .no-print {
                display: none !important;
            }

            aside {
                display: none !important;
            }

            main {
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
            }

            .print-only {
                display: block !important;
            }

            .bg-stone-50 {
                background: white !important;
            }

            .shadow-sm,
            .shadow-lg,
            .shadow-2xl {
                box-shadow: none !important;
                border: 1px solid #eee !important;
            }
        }
    </style>
</head>

<body class="bg-stone-50 text-stone-900">
    <div id="root" class="flex items-center justify-center h-screen bg-stone-50 w-full">
        <div class="text-center">
            <div
                class="w-12 h-12 border-4 border-moriah-brown border-t-transparent rounded-full animate-spin mx-auto mb-4">
            </div>
            <p class="text-stone-500 font-medium animate-pulse">Carregando Moriah Café...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const apiFetch = async (url, options = {}) => {
            const token = localStorage.getItem('moriah_jwt');
            const headers = { ...options.headers };
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            const res = await window.fetch(url, { ...options, headers });
            if ((res.status === 401 || res.status === 403) && !url.includes('/api/auth/login')) {
                const hadToken = !!token;
                localStorage.removeItem('moriah_jwt');
                localStorage.removeItem('moriah_current_user');
                if (hadToken) {
                    alert('Sessão expirada ou acesso negado. Faça login novamente.');
                    window.location.reload();
                }
            }
            return res;
        };

        const fmtR = (val) => {
            const num = parseFloat(val) || 0;
            return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        };


        const initialProducts = [
            { id: 1, name: 'Café Espresso', category: 'Café', cost: 2.5, price: 7.0, stock: 50, minStock: 10, sku: 'C001' },
            { id: 2, name: 'Cappuccino', category: 'Café', cost: 4.0, price: 12.0, stock: 30, minStock: 10, sku: 'C002' },
            { id: 3, name: 'Módulo V60 Moriah', category: 'Acessórios', cost: 85.0, price: 145.0, stock: 4, minStock: 5, sku: 'A001' },
            { id: 4, name: 'Água Mineral', category: 'Bebidas Prontas', cost: 1.2, price: 4.5, stock: 100, minStock: 20, sku: 'B001' },
        ];

        const LucideIcon = ({ name, className }) => {
            const [mounted, setMounted] = React.useState(false);
            React.useEffect(() => setMounted(true), []);
            if (!mounted || typeof lucide === 'undefined') return <span className={`inline-block ${className || 'w-5 h-5'}`} />;

            const icons = lucide.icons || lucide;
            const pascalName = name.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join('');
            const iconData = icons[pascalName] || icons[name] || icons['HelpCircle'] || icons['help-circle'];

            if (!iconData || !Array.isArray(iconData)) return <span className={`inline-block ${className || 'w-5 h-5'}`}>?</span>;

            try {
                const paths = iconData.map(([tag, attrs]) => {
                    const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                    return `<${tag} ${attrStr}></${tag}>`;
                }).join('');
                const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-${name}">${paths}</svg>`;
                return <span className={`inline-flex items-center justify-center shrink-0 ${className || 'w-5 h-5'}`} dangerouslySetInnerHTML={{ __html: svg }} />;
            } catch (e) {
                return <span className={className || 'w-5 h-5'}>!</span>;
            }
        };

        const SidebarItem = ({ icon: Icon, label, active, onClick }) => (
            <button onClick={onClick} class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${active ? 'bg-moriah-brown text-white' : 'text-stone-500 hover:bg-stone-100'}`}>
                <LucideIcon name={Icon} className="w-5 h-5" />
                <span class="font-medium">{label}</span>
            </button>
        );

        const ProductForm = ({ isEdit, editingProduct, setProducts, setEditingProduct, setView }) => {
            // Lógica para carregar imagens antigas de DB como array
            const loadImages = (urlData) => {
                if (!urlData) return [];
                try {
                    const parsed = JSON.parse(urlData);
                    if (Array.isArray(parsed)) return parsed;
                    return [urlData];
                } catch (e) {
                    return [urlData];
                }
            };

            const [formData, setFormData] = React.useState(isEdit && editingProduct ? {
                ...editingProduct,
                image_url: loadImages(editingProduct.image_url) // Agora image_url é sempre Array aqui dentro
            } : {
                name: '', category: 'Café', cost: '', price: '', price_moido: '', cost_moido: '', stock: '', stock_moido: '', stock_grao: '',
                sku: '', image_url: [], description: '', weight_grams: 250, sell_online: 1
            });
            const [isGeneratingAI, setIsGeneratingAI] = React.useState(false);
            const [isUploading, setIsUploading] = React.useState(false);

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: type === 'checkbox' ? (checked ? 1 : 0) : value
                }));
              const generateWithAI = async (field) => {
                const isSite = field.startsWith('hero_');
                const referenceValue = isSite ? 'Moriah' : formData.name;

                if (!referenceValue && !isSite) {
                    alert('Digite o nome do produto primeiro (ex: "Café Especial Torra Clara")');
                    return;
                }
                setIsGeneratingAI(field);
                try {
                    const res = await apiFetch('/api/generate-ai', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ productName: referenceValue, field })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        if (isSite) {
                            setSiteSettings(prev => ({ ...prev, [field]: data[field] || data.description }));
                        } else {
                            setFormData(prev => ({
                                ...prev,
                                name: field === 'name' ? data.name : prev.name,
                                sku: field === 'sku' ? data.sku : prev.sku,
                                description: field === 'description' ? data.description : prev.description
                            }));
                        }
                    } else throw new Error(data.error);
                } catch (e) {
                    alert('Erro na IA: ' + e.message);
                }
                setIsGeneratingAI(false);
            };

            };

            const handleImageUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (!files || files.length === 0) return;
                setIsUploading(true);

                // Criar array para múltiplas URLs enviadas de uma vez
                const newUrls = [];

                for (const file of files) {
                    const uploadData = new FormData();
                    uploadData.append('image', file);
                    try {
                        const res = await apiFetch('/api/upload', {
                            method: 'POST',
                            body: uploadData
                        });
                        const data = await res.json();
                        if (res.ok) {
                            newUrls.push(`${data.imageUrl}`);
                        } else throw new Error(data.error);
                    } catch (e) {
                        alert(`Erro ao enviar imagem ${file.name}: ` + e.message);
                    }
                }

                if (newUrls.length > 0) {
                    setFormData(prev => ({ ...prev, image_url: [...prev.image_url, ...newUrls] }));
                }

                setIsUploading(false);
                // Reseta input de file
                e.target.value = null;
            };

            const removeImage = (indexToRemove) => {
                setFormData(prev => ({
                    ...prev,
                    image_url: prev.image_url.filter((_, idx) => idx !== indexToRemove)
                }));
            };

            return (
                <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-lg border border-stone-100 animate-in zoom-in-95 duration-300 mb-20 md:mb-0">
                    <h2 class="text-2xl font-bold mb-6">{isEdit ? 'Editar Produto' : 'Novo Produto'}</h2>
                    <div class="grid grid-cols-1 gap-8">
                        <form class="space-y-6" onSubmit={async (e) => {
                            e.preventDefault();
                            const productData = {
                                name: formData.name,
                                category: formData.category,
                                ...(formData.category === 'Café' ? {
                                    cost: parseFloat(formData.cost) || 0,
                                    cost_moido: parseFloat(formData.cost_moido) || 0,
                                    price: parseFloat(formData.price) || 0,
                                    price_moido: parseFloat(formData.price_moido) || 0,
                                    stock_grao: parseInt(formData.stock_grao) || 0,
                                    stock_moido: parseInt(formData.stock_moido) || 0,
                                    weight_grams: parseInt(formData.weight_grams) || 250,
                                } : {
                                    cost: parseFloat(formData.cost) || 0,
                                    price: parseFloat(formData.price) || 0,
                                    stock: parseInt(formData.stock) || 0,
                                    minStock: parseInt(formData.minStock) || 5,
                                    weight_grams: parseInt(formData.weight_grams) || 250,
                                }),
                                sku: formData.sku,
                                image_url: Array.isArray(formData.image_url) ? JSON.stringify(formData.image_url) : formData.image_url, // fallback seguro
                                description: formData.description,
                                sell_online: formData.sell_online
                            };

                            try {
                                let res;
                                if (isEdit) {
                                    res = await apiFetch(`/api/products/${editingProduct.id}`, {
                                        method: 'PUT',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify(productData)
                                    });
                                } else {
                                    res = await apiFetch('/api/products', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify(productData)
                                    });
                                }

                                if (res.ok) {
                                    const reload = await apiFetch('/api/products');
                                    const newData = await reload.json();
                                    setProducts(newData);
                                    setEditingProduct(null);
                                    setView('inventory');
                                } else {
                                    alert("Erro ao salvar o produto.");
                                }
                            } catch (error) {
                                console.error("Erro no processamento:", error);
                                alert("Erro de conexão com o servidor.");
                            }
                        }}>
                            <div>
                                <div class="flex items-center justify-between mb-1">
                                    <label class="block text-sm font-medium text-stone-500">Nome do Produto</label>
                                    <button type="button" onClick={() => generateWithAI('name')} class="text-[10px] bg-moriah-brown/10 text-moriah-brown font-bold px-2 py-1 rounded hover:bg-moriah-brown/20 flex items-center gap-1 transition-all">
                                        {isGeneratingAI === 'name' ? '⏳ Melhorando...' : <><LucideIcon name="wand-2" className="w-3 h-3" /> Melhorar Título</>}
                                    </button>
                                </div>
                                <input name="name" value={formData.name} onChange={handleChange} required class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl focus:ring-2 focus:ring-moriah-brown/50 outline-none font-bold text-lg" placeholder="Ex: Café Especial Torra Média" />
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <div class="flex items-center justify-between mb-1">
                                        <label class="block text-sm font-medium text-stone-500">SKU / Barcode</label>
                                        <button type="button" onClick={() => generateWithAI('sku')} class="text-[10px] bg-indigo-50 text-indigo-600 font-bold px-2 py-1 rounded hover:bg-indigo-100 flex items-center gap-1">
                                            {isGeneratingAI === 'sku' ? '⏳ Gerando...' : '✨ Gerador IA'}
                                        </button>
                                    </div>
                                    <input name="sku" value={formData.sku} onChange={handleChange} required class="w-full px-4 py-2 bg-stone-50 border border-stone-200 rounded-xl outline-none uppercase font-mono" placeholder="Ex: CAFE-ESP-250G" />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-stone-500 mb-1">Categoria</label>
                                    <select name="category" value={formData.category} onChange={handleChange} class="w-full px-4 py-2 bg-stone-50 border border-stone-200 rounded-xl outline-none">
                                        <option value="Café">Café</option>
                                        <option value="Acessórios">Acessórios</option>
                                    </select>
                                </div>
                            </div>

                            <div class="bg-stone-50 p-4 rounded-2xl border border-stone-200">
                                <div class="flex items-center justify-between mb-3">
                                    <label class="font-bold text-stone-700">Fotos do Produto (Site & PDV)</label>
                                    <div class="text-xs text-stone-500 font-medium bg-white px-2 py-1 rounded-md border border-stone-200">
                                        {formData.image_url?.length || 0} foto(s)
                                    </div>
                                </div>
                                <div class="space-y-4">
                                    <div class="flex items-center gap-3 overflow-x-auto pb-2">
                                        {formData.image_url && formData.image_url.length > 0 ? (
                                            formData.image_url.map((url, idx) => (
                                                <div key={idx} class="relative w-20 h-20 rounded-xl overflow-hidden border border-stone-200 bg-white shrink-0 group">
                                                    <img src={url} class="w-full h-full object-cover" />
                                                    <button type="button" onClick={() => removeImage(idx)} class="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 hover:bg-red-600 shadow opacity-0 group-hover:opacity-100 transition-opacity"><LucideIcon name="x" className="w-3 h-3" /></button>
                                                    {idx === 0 && <div class="absolute bottom-0 inset-x-0 bg-moriah-brown/90 text-white text-[9px] font-bold text-center py-0.5">PRINCIPAL</div>}
                                                </div>
                                            ))
                                        ) : (
                                            <div class="w-20 h-20 rounded-xl border-2 border-dashed border-stone-300 flex items-center justify-center bg-white text-stone-400 shrink-0">
                                                <LucideIcon name="image" className="w-8 h-8 opacity-40 mb-1" />
                                            </div>
                                        )}
                                    </div>

                                    <div class="bg-white border border-stone-200 rounded-xl p-3 flex flex-col md:flex-row items-center justify-between gap-3 shadow-sm">
                                        <div class="flex items-center gap-3 pl-2">
                                            <div class="bg-stone-50 p-2 rounded-lg text-moriah-brown">
                                                <LucideIcon name="images" className="w-5 h-5" />
                                            </div>
                                            <div>
                                                <p class="text-xs font-bold text-stone-700">Adicionar mais fotos</p>
                                                <p class="text-[10px] text-stone-500">Selecione imagens .JPG, .PNG ou .WEBP</p>
                                            </div>
                                        </div>
                                        <label class="cursor-pointer bg-moriah-brown text-white px-4 py-2 rounded-xl hover:bg-moriah-dark transition-all font-bold text-sm flex items-center gap-2 shadow w-full md:w-auto justify-center">
                                            {isUploading ? <><div className="w-4 h-4 border-2 border-stone-300 border-t-white rounded-full animate-spin"></div> Enviando...</> : <><LucideIcon name="upload-cloud" className="w-4 h-4" /> Selecionar Fotos</>}
                                            <input type="file" accept="image/*" multiple className="hidden" onChange={handleImageUpload} disabled={isUploading} />
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <div class="flex items-center justify-between mb-1">
                                    <label class="block text-sm font-medium text-stone-500">Descrição do Produto (Site)</label>
                                    <button type="button" onClick={() => generateWithAI('description')} class="text-xs bg-indigo-50 text-indigo-600 font-bold px-3 py-1.5 rounded-lg border border-indigo-100 hover:bg-indigo-100 flex items-center gap-1 shadow-sm transition-all hover:scale-105 active:scale-95">
                                        {isGeneratingAI === 'description' ? <span class="animate-pulse">⏳ Escrevendo texto vendedor...</span> : <><LucideIcon name="sparkles" className="w-3.5 h-3.5" /> Escrever com Inteligência Artificial</>}
                                    </button>
                                </div>
                                <textarea name="description" value={formData.description} onChange={handleChange} rows="4" class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl focus:ring-2 focus:ring-moriah-brown/50 outline-none leading-relaxed" placeholder="Descreva os sabores, origem e experiência do café... (Ou clique em Gerar com IA acima)"></textarea>
                            </div>
                            {formData.category === 'Café' ? (
                                <div class="space-y-6 bg-stone-50 p-4 rounded-2xl border border-stone-200">
                                    {/* Tamanho Único pro Café */}
                                    <div>
                                        <label class="block text-sm font-medium text-stone-500 mb-1">Tamanho da Embalagem</label>
                                        <select name="weight_grams" value={formData.weight_grams ?? 250} onChange={handleChange} class="w-full px-4 py-2 bg-white border border-stone-200 rounded-xl outline-none font-bold text-stone-700">
                                            <option value="250">250g</option>
                                            <option value="500">500g</option>
                                            <option value="1000">1kg (1000g)</option>
                                        </select>
                                    </div>

                                    {/* Café Moído */}
                                    <div class="space-y-4 pt-4 border-t border-stone-200">
                                        <h3 class="font-bold text-stone-700">Café Moído (Pó)</h3>
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div>
                                                <label class="block text-sm font-medium text-stone-500 mb-1">Custo (R$)</label>
                                                <input type="number" step="0.01" name="cost_moido" value={formData.cost_moido ?? ''} onChange={handleChange} class="w-full px-4 py-2 bg-white border border-stone-200 rounded-xl outline-none" placeholder="Ex: 15.00" />
                                            </div>
                                            <div>
                                                <label class="block text-sm font-medium text-amber-700 mb-1 font-bold">Preço de Venda (R$)</label>
                                                <input type="number" step="0.01" name="price_moido" value={formData.price_moido ?? ''} onChange={handleChange} class="w-full px-4 py-2 bg-amber-50 border border-amber-200 rounded-xl outline-none text-amber-900 font-bold" placeholder="Ex: 40.00" />
                                            </div>
                                            <div>
                                                <label class="block text-sm font-medium text-stone-500 mb-1">Estoque</label>
                                                <div class="relative">
                                                    <input type="number" name="stock_moido" value={formData.stock_moido ?? ''} onChange={handleChange} class={`w-full px-4 py-2 bg-white border rounded-xl outline-none font-bold ${Number(formData.stock_moido) < 5 && formData.stock_moido !== '' ? 'border-red-400 text-red-600 bg-red-50' : 'border-stone-200 text-stone-800'}`} />
                                                    {Number(formData.stock_moido) < 5 && formData.stock_moido !== '' && <span class="absolute right-3 top-2.5 text-xs text-red-500 font-bold">Estoque Baixo</span>}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Café em Grãos */}
                                    <div class="space-y-4 pt-4 border-t border-stone-200">
                                        <h3 class="font-bold text-stone-700">Café em Grãos</h3>
                                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div>
                                                <label class="block text-sm font-medium text-stone-500 mb-1">Custo (R$)</label>
                                                <input type="number" step="0.01" name="cost" value={formData.cost ?? ''} onChange={handleChange} class="w-full px-4 py-2 bg-white border border-stone-200 rounded-xl outline-none" placeholder="Ex: 15.00" />
                                            </div>
                                            <div>
                                                <label class="block text-sm font-medium text-emerald-700 mb-1 font-bold">Preço de Venda (R$)</label>
                                                <input type="number" step="0.01" name="price" value={formData.price ?? ''} onChange={handleChange} class="w-full px-4 py-2 bg-emerald-50 border border-emerald-200 rounded-xl outline-none text-emerald-900 font-bold" placeholder="Ex: 45.00" />
                                            </div>
                                            <div>
                                                <label class="block text-sm font-medium text-stone-500 mb-1">Estoque</label>
                                                <div class="relative">
                                                    <input type="number" name="stock_grao" value={formData.stock_grao ?? ''} onChange={handleChange} class={`w-full px-4 py-2 bg-white border rounded-xl outline-none font-bold ${Number(formData.stock_grao) < 5 && formData.stock_grao !== '' ? 'border-red-400 text-red-600 bg-red-50' : 'border-stone-200 text-stone-800'}`} />
                                                    {Number(formData.stock_grao) < 5 && formData.stock_grao !== '' && <span class="absolute right-3 top-2.5 text-xs text-red-500 font-bold">Estoque Baixo</span>}

                                            <label class="block text-sm font-medium text-emerald-700 mb-1 font-bold">Preço de Venda (R$)</label>
                                            <input type="number" step="0.01" name="price" value={formData.price ?? ''} onChange={handleChange} required class="w-full px-4 py-2 bg-emerald-50 border border-emerald-200 rounded-xl outline-none text-emerald-900 font-bold" placeholder="Ex: 45.00" />
                                        </div>
                                        <div>
                                            <label class="block text-sm font-medium text-stone-500 mb-1">Estoque</label>
                                            <div class="relative">
                                                <input type="number" name="stock" value={formData.stock ?? ''} onChange={handleChange} required class={`w-full px-4 py-2 bg-white border rounded-xl outline-none font-bold ${Number(formData.stock) < 5 && formData.stock !== '' ? 'border-red-400 text-red-600 bg-red-50' : 'border-stone-200 text-stone-800'}`} />
                                                {Number(formData.stock) < 5 && formData.stock !== '' && <span class="absolute right-3 top-2.5 text-xs text-red-500 font-bold">Estoque Baixo</span>}
                                            </div>
                                        </div>
                                        <div>
                                            <label class="block text-sm font-medium text-stone-500 mb-1">Peso (Gramas)</label>
                                            <input type="number" name="weight_grams" placeholder="Ex: 250" value={formData.weight_grams ?? ''} onChange={handleChange} class="w-full px-4 py-2 bg-white border border-stone-200 rounded-xl outline-none" />
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div class="flex items-center mt-4 text-left">
                                <label class="flex items-center gap-3 cursor-pointer p-2 bg-stone-50 border border-stone-100 rounded-xl w-full">
                                    <input type="checkbox" name="sell_online" checked={formData.sell_online === 1} onChange={handleChange} class="w-5 h-5 text-moriah-brown bg-white border-stone-300 rounded focus:ring-moriah-brown" />
                                    <span class="text-sm font-bold text-stone-700">Vender no E-commerce? <br /><span class="text-[10px] font-normal text-stone-400">Ative para aparecer na loja online</span></span>
                                </label>
                            </div>
                            <div class="flex gap-4 pt-4">
                                <button type="button" onClick={() => { setEditingProduct(null); setView('inventory'); }} class="flex-1 py-3 text-stone-500 font-bold hover:bg-stone-50 rounded-2xl transition-all border border-stone-200">Cancelar</button>
                                <button type="submit" class="flex-1 py-3 bg-moriah-brown text-white font-bold rounded-2xl shadow-lg hover:shadow-xl transition-all">{isEdit ? 'Salvar' : 'Cadastrar'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState(() => {
                try { return JSON.parse(localStorage.getItem('moriah_current_user')); } catch { return null; }
            });
            const [view, setView] = useState('pos');
            const [products, setProducts] = useState([]);
            // Carrega produtos da API quando o usuário logar
            useEffect(() => {
                if (!currentUser) return; // Só busca se estiver logado
                const fetchProducts = async () => {
                    try {
                        const res = await apiFetch('/api/products');
                        if (res.ok) {
                            const data = await res.json();
                            setProducts(data);
                        }
                    } catch (err) {
                        console.error("Erro ao carregar produtos:", err);
                    }
                };
                fetchProducts();
            }, [currentUser]);

            // SSE: sincronização de estoque em tempo real
            // Quando outra aba (PDV) ou o e-commerce faz uma venda,
            // o servidor emite stock-update e o estado local é atualizado sem reload.
            useEffect(() => {
                let es;
                try {
                    es = new EventSource('/api/sse/stock');
                    es.addEventListener('stock-update', (e) => {
                        const { items } = JSON.parse(e.data);
                        setProducts(prev =>
                            prev.map(p => {
                                const deltaArr = items.filter(i => i.product_id === p.id);
                                if (!deltaArr.length) return p;

                                let newP = { ...p };
                                deltaArr.forEach(delta => {
                                    if (delta.grind === 'Pó/Moído') {
                                        newP.stock_moido = Math.max(0, (newP.stock_moido || 0) - delta.quantity);
                                        if (newP.stock_moido < (newP.minStock || 5)) {
                                            addNotification('Estoque Baixo', `${newP.name} (Pó) está com apenas ${newP.stock_moido} un.`, 'warning');
                                        }
                                    } else if (delta.grind === 'Em Grão') {
                                        newP.stock_grao = Math.max(0, (newP.stock_grao || 0) - delta.quantity);
                                        if (newP.stock_grao < (newP.minStock || 5)) {
                                            addNotification('Estoque Baixo', `${newP.name} (Grão) está com apenas ${newP.stock_grao} un.`, 'warning');
                                        }
                                    } else {
                                        newP.stock = Math.max(0, (newP.stock || 0) - delta.quantity);
                                        if (newP.stock < (newP.minStock || 5)) {
                                            addNotification('Estoque Baixo', `${newP.name} está com apenas ${newP.stock} un.`, 'warning');
                                        }
                                    }
                                });
                                return newP;
                            })
                        );
                        // Se houver itens na venda (remoto), notifica
                        if (items.length > 0) {
                            addNotification('Nova Venda', `Uma venda de ${items.length} itens foi processada.`, 'success');
                        }
                    });
                    es.onerror = () => { /* reconexão automática pelo browser */ };
                } catch (_) { /* SSE não disponível offline */ }
                return () => es && es.close();
            }, []);
            const [sales, setSales] = useState([]);
            const [isLoadingSales, setIsLoadingSales] = useState(false);

            const fetchSales = async () => {
                setIsLoadingSales(true);
                try {
                    const res = await apiFetch('/api/sales');
                    if (res.ok) {
                        const data = await res.json();
                        setSales(data);
                    }
                } catch (err) {
                    console.error('Erro ao carregar vendas:', err);
                } finally {
                    setIsLoadingSales(false);
                }
            };
            const [loginLoading, setLoginLoading] = useState(false);
            const [loginError, setLoginError] = useState('');
            const [cart, setCart] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [isLoadingCustomers, setIsLoadingCustomers] = useState(false);

            const fetchCustomers = async () => {
                if (!currentUser) return;
                setIsLoadingCustomers(true);
                try {
                    const res = await apiFetch('/api/customers');
                    if (res.ok) {
                        const data = await res.json();
                        setCustomers(Array.isArray(data) ? data : []);
                    }
                } catch (err) { console.error("Erro ao buscar clientes:", err); }
                finally { setIsLoadingCustomers(false); }
            };

            useEffect(() => {
                if (view === 'customers') fetchCustomers();
            }, [view]);

            const [searchTerm, setSearchTerm] = useState('');
            const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
            const [isPixModalOpen, setIsPixModalOpen] = useState(false);
            const [isSuccessModalOpen, setIsSuccessModalOpen] = useState(false);
            const [discount, setDiscount] = useState(0);
            const [currentPixData, setCurrentPixData] = useState({ payload: '', total: 0 });
            const [lastSale, setLastSale] = useState(null);
            const [customerPhone, setCustomerPhone] = useState('');
            const [editingProduct, setEditingProduct] = useState(null);
            const [periodFilter, setPeriodFilter] = useState('always');
            const [infiniteInstallments, setInfiniteInstallments] = useState(1);
            const [originFilter, setOriginFilter] = useState('all'); // all, fisico, online
            const [isMobileCartOpen, setIsMobileCartOpen] = useState(false);
            const [grindPickerProduct, setGrindPickerProduct] = useState(null);
            const [dashData, setDashData] = useState(null);
            const [dashLoading, setDashLoading] = useState(false);
            const [isAsaasModalOpen, setIsAsaasModalOpen] = useState(false);
            const [currentAsaasCharge, setCurrentAsaasCharge] = useState(null); // { payment_id, invoiceUrl, total, label }
            const [asaasPolling, setAsaasPolling] = useState(null); // interval ref
            const [asaasPaid, setAsaasPaid] = useState(false);
            const [showMachineSubmenu, setShowMachineSubmenu] = useState(false);
            const [ipWaiting, setIpWaiting] = useState(null); // { sale_id, method }
            const [isManualConfirmOpen, setIsManualConfirmOpen] = useState(false);
            const ipPollingRef = React.useRef(null);
            const [siteSettings, setSiteSettings] = useState({
                hero_title: '', hero_subtitle: '', hero_text: '', hero_video: '',
                about_title: '', about_subtitle: '', about_text_1: '', about_text_2: '', about_image: ''
            });
            const [videoFile, setVideoFile] = useState(null);
            const [imageFile, setImageFile] = useState(null);
            const [notifications, setNotifications] = useState(() => {
                const saved = localStorage.getItem('moriah_notifications');
                return saved ? JSON.parse(saved) : [];
            });
            const [isNotificationsOpen, setIsNotificationsOpen] = useState(false);

            const addNotification = (title, message, type = 'info') => {
                const newNotif = {
                    id: Date.now(),
                    title,
                    message,
                    type, // 'success', 'warning', 'info', 'error'
                    read: false,
                    date: new Date().toISOString()
                };
                setNotifications(prev => [newNotif, ...prev].slice(0, 30));
            };

            useEffect(() => {
                localStorage.setItem('moriah_notifications', JSON.stringify(notifications));
            }, [notifications]);

            // Carrega configurações do site ao abrir a aba (ou no início)
            useEffect(() => {
                apiFetch('/api/site-settings')
                    .then(res => res.json())
                    .then(data => {
                        const sanitizedAdminData = {};
                        if (data) {
                            Object.keys(data).forEach(key => {
                                sanitizedAdminData[key] = data[key] || '';
                            });
                            setSiteSettings(sanitizedAdminData);
                        }
                    })
                    .catch(err => console.error("Erro config site:", err));
            }, []);

            // Carrega usuários apenas em settings
            const [users, setUsers] = useState([]);

            // Persiste sessão local (só o objeto do usuário, sem senha)
            useEffect(() => {
                if (currentUser) localStorage.setItem('moriah_current_user', JSON.stringify(currentUser));
                else localStorage.removeItem('moriah_current_user');
            }, [currentUser]);

            // Detecta retorno do InfinitePay (?ip_paid=sale_id na URL) ou retorno nativo do app (?tap_result=1&sale_id=...)
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const paidId = params.get('ip_paid');
                const tapResult = params.get('tap_result');
                const saleId = params.get('sale_id');
                const targetId = saleId || paidId;

                console.log("[PDV] Verificando retorno InfinitePay:", { targetId, tapResult });

                if (targetId) {
                    // Mantém os parâmetros na URL até processar, mas limpa para não entrar em loop se o dev recarregar manualmente
                    // window.history.replaceState({}, '', window.location.pathname); 

                    const pending = JSON.parse(localStorage.getItem('ip_pending') || 'null');

                    apiFetch(`/api/pdv/infinitepay/status/${targetId}`)
                        .then(r => r.json())
                        .then(data => {
                            console.log("[PDV] Status do pagamento:", data);
                            if (data.paid) {
                                setCart([]);
                                setDiscount(0);
                                if (pending) {
                                    setLastSale({ total: pending.total, method: pending.method, items: pending.cart });
                                }
                                setIsSuccessModalOpen(true);
                                // Agora sim limpamos o estado pendente e a URL
                                localStorage.removeItem('ip_pending');
                                window.history.replaceState({}, '', window.location.pathname);
                            } else {
                                // Se for tap_result=1 mas não deu pago, o usuário pode ter cancelado no app
                                if (tapResult) {
                                    alert('Pagamento cancelado ou não aprovado na maquininha.');
                                    if (pending && pending.cart) {
                                        setCart(pending.cart);
                                    }
                                    // Limpa para permitir nova tentativa
                                    localStorage.removeItem('ip_pending');
                                    window.history.replaceState({}, '', window.location.pathname);
                                }
                            }
                        })
                        .catch(err => {
                            console.error("[PDV] Erro ao verificar status:", err);
                            // Em caso de erro de rede, não limpamos o pending para tentar novamente se recarregar
                        });
                }
            }, [currentUser]); // Adiciona currentUser para garantir que roda quando a sessão estabilizar

            // Busca vendas do banco de dados ao abrir a aba de vendas
            // Auto-refresh a cada 30s para capturar pedidos online automaticamente
            useEffect(() => {
                if (view === 'sales') {
                    fetchSales();
                    const interval = setInterval(() => fetchSales(), 30000);
                    return () => clearInterval(interval);
                }
            }, [view]);

            // Busca usuários do banco ao abrir as configurações
            useEffect(() => {
                if (view !== 'settings') return;
                apiFetch('/api/users').then(r => r.json()).then(data => setUsers(Array.isArray(data) ? data : [])).catch(() => { });
            }, [view]);

            // Busca dados do dashboard ao abrir o painel
            useEffect(() => {
                if (view !== 'dashboard') return;
                setDashLoading(true);
                apiFetch('/api/dashboard')
                    .then(r => r.json())
                    .then(d => { setDashData(d); setDashLoading(false); })
                    .catch(() => setDashLoading(false));
            }, [view]);

            const logoUrl = 'Verde.png';

            const stats = useMemo(() => {
                const today = new Date().toLocaleDateString();
                const todaySales = sales.filter(s => new Date(s.created_at || s.date).toLocaleDateString() === today);
                const revenue = todaySales.reduce((acc, curr) => acc + curr.total, 0);
                const lowStock = products.filter(p => p.stock < p.minStock);
                return { revenue, lowStockCount: lowStock.length };
            }, [sales, products]);

            const addToCart = (product, grind = null) => {
                let available = product.stock;
                if (grind === 'moido') available = product.stock_moido || 0;
                else if (grind === 'grao') available = product.stock_grao || 0;

                if (available <= 0) {
                    alert('Estoque insuficiente para esta variação.');
                    return;
                }

                const price = grind === 'moido' && parseFloat(product.price_moido) > 0
                    ? parseFloat(product.price_moido)
                    : parseFloat(product.price);
                const cartKey = grind ? `${product.id}-${grind}` : String(product.id);
                const displayName = grind === 'moido'
                    ? `${product.name} (Pó/Moído)`
                    : grind === 'grao'
                        ? `${product.name} (Grão)`
                        : product.name;

                const grindLabel = grind === 'moido' ? 'Pó/Moído' : grind === 'grao' ? 'Em Grão' : null;

                setCart(curr => {
                    const existing = curr.find(i => i.cartKey === cartKey);
                    if (existing) return curr.map(i => i.cartKey === cartKey ? { ...i, quantity: i.quantity + 1 } : i);
                    return [...curr, { ...product, cartKey, price, name: displayName, quantity: 1, grind: grindLabel }];
                });
            };

            const removeFromCart = (cartKey) => setCart(curr => curr.filter(i => i.cartKey !== cartKey));
            const updateCartQuantity = (cartKey, delta) => {
                setCart(curr => curr.map(i => {
                    if (i.cartKey === cartKey) {
                        const newQty = Math.max(1, i.quantity + delta);
                        return { ...i, quantity: newQty };
                    }
                    return i;
                }));
            };

            const generatePixPayload = (amount) => {
                const pad = (n) => n.toString().padStart(2, '0');
                const key = "63644739000156";
                const name = "MORIAH CAFE";
                const city = "SAO PAULO";

                let payload = "000201";
                let merchantInfo = "0014br.gov.bcb.pix" + "0114" + key;
                payload += "26" + pad(merchantInfo.length) + merchantInfo;
                payload += "520400005303986";
                let amtStr = amount.toFixed(2);
                payload += "54" + pad(amtStr.length) + amtStr;
                payload += "5802BR";
                payload += "59" + pad(name.length) + name;
                payload += "60" + pad(city.length) + city;
                payload += "62070503***6304";

                let crc = 0xFFFF;
                for (let i = 0; i < payload.length; i++) {
                    crc ^= (payload.charCodeAt(i) << 8);
                    for (let j = 0; j < 8; j++) {
                        crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : (crc << 1);
                    }
                }
                const crcHex = (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
                return payload + crcHex;
            };

            const finalizeSale = async (method) => {
                const subtotal = cart.reduce((acc, curr) => acc + (curr.price * curr.quantity), 0);
                const total = parseFloat((subtotal * (1 - (discount / 100))).toFixed(2));

                if (method === 'PIX' && !isPixModalOpen) {
                    const payload = generatePixPayload(total);
                    setCurrentPixData({ payload, total });
                    setIsPixModalOpen(true);
                    return;
                }

                try {
                    const res = await apiFetch('/api/sales', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            seller: currentUser?.name || currentUser?.username || 'PDV',
                            items: cart.map(i => ({ id: i.id, name: i.name, quantity: i.quantity, price: i.price, grind: i.grind })),
                            subtotal,
                            discount,
                            total,
                            method,
                            origin: 'Físico'
                        })
                    });

                    if (!res.ok) {
                        const err = await res.json();
                        alert('Erro ao salvar venda: ' + (err.error || 'Tente novamente'));
                        return;
                    }

                    // Atualiza o estoque localmente para feedback imediato
                    setProducts(curr => curr.map(p => {
                        const items = cart.filter(ci => ci.id === p.id);
                        if (!items.length) return p;

                        let newP = { ...p };
                        items.forEach(ci => {
                            if (ci.grind === 'Pó/Moído') {
                                newP.stock_moido = Math.max(0, (newP.stock_moido || 0) - ci.quantity);
                            } else if (ci.grind === 'Em Grão') {
                                newP.stock_grao = Math.max(0, (newP.stock_grao || 0) - ci.quantity);
                            } else {
                                newP.stock = Math.max(0, (newP.stock || 0) - ci.quantity);
                            }
                        });
                        return newP;
                    }));

                    setCart([]);
                    setDiscount(0);
                    setIsCheckoutOpen(false);
                    setIsPixModalOpen(false);
                    setLastSale({ total, method, items: cart });
                    addNotification('Venda Finalizada', `Venda de R$ ${total.toFixed(2)} confirmada em ${method}.`, 'success');
                    setIsSuccessModalOpen(true);

                } catch (error) {
                    console.error('Erro ao finalizar venda:', error);
                    alert('Falha de conexão com o servidor. Verifique sua rede.');
                }
            };

            // ─── InfinitePay: abre checkout + polling de confirmação ──────────────
            const handleInfinitePay = async (cardType) => {
                const subtotal = cart.reduce((acc, curr) => acc + (curr.price * curr.quantity), 0);
                let total = parseFloat((subtotal * (1 - (discount / 100))).toFixed(2));
                // Repasse obrigatório de taxa InfinitePay padrão (1 Dia Útil - Até 20k)
                // Usando cálculo "Por dentro" para o cliente pagar a taxa exata e o lojista receber o "total" bruto
                // Fórmula: Valor a Cobrar = Valor Liquido / (1 - Taxa)
                let appliedRate = 0;
                let finalInstallments = '1';

                if (cardType === 'debit') {
                    appliedRate = 0.0137; // 1.37% (Débito - 1 Dia Útil)
                } else if (cardType === 'credit') {
                    finalInstallments = String(infiniteInstallments);
                    // Tabela de juros InfinitePay (Tap to Pay - 1 Dia Útil - Faturamento até 20k)
                    const creditRates = {
                        1: 0.0315, // 3.15% à vista
                        2: 0.0539, 3: 0.0612, 4: 0.0685,
                        5: 0.0757, 6: 0.0828, 7: 0.0899,
                        8: 0.0969, 9: 0.1038, 10: 0.1106,
                        11: 0.1174, 12: 0.1240
                    };
                    appliedRate = creditRates[infiniteInstallments] || 0.0315;
                }
                total = parseFloat((total / (1 - appliedRate)).toFixed(2));

                try {
                    const res = await apiFetch('/api/pdv/infinitepay/tap', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            total,
                            cardType,
                            items: cart.map(i => ({ id: i.id, name: i.name, quantity: i.quantity, price: i.price, grind: i.grind }))
                        })
                    });

                    if (!res.ok) {
                        const err = await res.json();
                        alert('Erro: ' + (err.error || 'Tente novamente'));
                        return;
                    }

                    const { sale_id } = await res.json();
                    const methodLabel = cardType === 'debit' ? 'Cartão Débito' : 'Cartão Crédito';

                    // Parâmetros do Deep Link nativo (InfiniteTap) repassados pela InfinitePay
                    const amountCents = Math.round(total * 100);
                    const infinitePayMethod = cardType; // 'credit' ou 'debit'
                    const installments = finalInstallments;
                    const orderId = `moriah-pdv-${sale_id}`;
                    const resultUrl = encodeURIComponent(`${window.location.origin}/?tap_result=1&sale_id=${sale_id}`);
                    const appClientReferrer = 'MoriahPDV';
                    const afForceDeeplink = 'true';

                    const checkout_url = `infinitepaydash://infinitetap-app?amount=${amountCents}&payment_method=${infinitePayMethod}&installments=${installments}&order_id=${orderId}&result_url=${resultUrl}&app_client_referrer=${appClientReferrer}&af_force_deeplink=${afForceDeeplink}`;

                    // Salva o carrinho provisoriamente para caso o iOS/Android recarregue a página ao voltar do deep link
                    localStorage.setItem('ip_pending', JSON.stringify({ total, method: methodLabel, cart }));

                    // Em vez de navegar direto (bloqueado pelo android em alguns casos e abre web), 
                    // mostramos um modal onde o operador tem que clicar explicitamente para abrir a maquininha
                    setIpWaiting({ sale_id, method: methodLabel, total, checkout_url });
                    setIsCheckoutOpen(false);

                    ipPollingRef.current = setInterval(async () => {
                        try {
                            const statusRes = await apiFetch(`/api/pdv/infinitepay/status/${sale_id}`);
                            const data = await statusRes.json();
                            if (data.paid) {
                                clearInterval(ipPollingRef.current);
                                setIpWaiting(null);
                                setCart([]);
                                setDiscount(0);
                                setLastSale({ id: sale_id, total, method: methodLabel, items: cart });
                                addNotification('Venda Confirmada', `InfinitePay: R$ ${total.toFixed(2)} recebido.`, 'success');
                                setIsSuccessModalOpen(true);
                            }
                        } catch (_) { }
                    }, 3000);

                } catch (error) {
                    alert('Falha de conexão. Verifique sua rede.');
                }
            };

            const cancelInfinitePay = () => {
                clearInterval(ipPollingRef.current);
                if (ipWaiting) {
                    setIsManualConfirmOpen(true);
                } else {
                    setIpWaiting(null);
                }
            };

            const confirmManualPayment = async () => {
                if (!ipWaiting) {
                    setIsManualConfirmOpen(false);
                    return;
                }
                try {
                    await apiFetch(`/api/pdv/sales/${ipWaiting.sale_id}/confirm`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ method: ipWaiting.method })
                    });
                    setCart([]);
                    setDiscount(0);
                    setLastSale({ id: ipWaiting.sale_id, total: ipWaiting.total, method: ipWaiting.method, items: cart });
                    addNotification('Venda Confirmada (Manual)', `Venda de R$ ${ipWaiting.total.toFixed(2)} confirmada manualmente.`, 'info');
                    setIsSuccessModalOpen(true);
                } catch (err) {
                    console.error("Erro confirmação manual:", err);
                    alert("Erro ao confirmar manual");
                } finally {
                    setIsManualConfirmOpen(false);
                    setIpWaiting(null);
                }
            };

            const sendWhatsAppReceipt = async () => {
                if (!customerPhone || !lastSale) return;
                const cleanPhone = customerPhone.replace(/\D/g, '');

                try {
                    const res = await apiFetch('/api/pdv/send-receipt', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            phone: cleanPhone,
                            sale_id: lastSale.id,
                            message: null // O backend gera o padrão Moriah
                        })
                    });

                    if (res.ok) {
                        alert('✅ Recibo enviado via WhatsApp!');
                        setIsSuccessModalOpen(false);
                        setCustomerPhone('');
                        setView('pos');
                    } else {
                        const err = await res.json();
                        alert('Falha no WhatsApp: ' + (err.error || 'Verifique a API'));
                        // Fallback para link manual se a API falhar (opcional)
                        const url = `https://wa.me/55${cleanPhone}?text=${encodeURIComponent(`Recibo Moriah: ${window.location.origin}/api/pdv/receipt/${lastSale.id}`)}`;
                        window.open(url, '_blank');
                    }
                } catch (err) {
                    console.error("Erro zap:", err);
                    alert('Erro ao conectar com a API de WhatsApp.');
                }
            };

            const triggerMarketing = async () => {
                const message = prompt('Digite a mensagem de marketing:', 'Olá! Passando para lembrar que seu Café Moriah deve estar acabando. Que tal garantir um pacote novo hoje? ☕✨');
                if (!message) return;

                if (!confirm('Deseja disparar esta mensagem para todos os clientes elegíveis (regra de 15 dias)?')) return;

                try {
                    const res = await apiFetch('/api/customers/bulk-marketing', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message })
                    });
                    const data = await res.json();
                    alert(data.message);
                    fetchCustomers();
                } catch (err) { alert('Erro ao disparar marketing.'); }
            };

            const deleteProduct = async (id) => {
                if (confirm('Tem certeza que deseja excluir este produto?')) {
                    try {
                        const res = await apiFetch(`/api/products/${id}`, { method: 'DELETE' });
                        if (res.ok) {
                            setProducts(curr => curr.filter(p => p.id !== id));
                        }
                    } catch (error) {
                        console.error('Erro ao excluir:', error);
                        alert('Erro ao excluir produto.');
                    }
                }
            };

            const generateLabel = async (sale_id) => {
                if (!confirm('Confirmar Geração de Etiqueta Logística? As taxas poderão ser cobradas do Saldo da Conta de Envios.')) return;
                try {
                    const res = await apiFetch('/api/shipping/generate-label', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sale_id })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        const msg = data.simulated
                            ? `Etiqueta SIMULADA (sem endereço completo ou token ME).\nRastreio: ${data.tracking_code}\n\nPara etiqueta real: configure MELHORENVIO_TOKEN e garanta que o cliente preencheu o endereço completo.`
                            : `✅ Etiqueta Melhor Envio gerada!\nRastreio: ${data.tracking_code}\n\nA etiqueta será baixada agora.`;
                        alert(msg);
                        if (data.label_url) window.open(data.label_url, '_blank');
                        // Força a atualização da lista para exibir as vendas da DB SQLite real, incluindo status de envio novo
                        const reload = await apiFetch('/api/sales');
                        const salesData = await reload.json();
                        setSales(salesData);
                    } else {
                        alert('Logística (' + data.error + ')');
                    }
                } catch (err) {
                    alert('Falha de Integração com Gateway Logístico.');
                }
            };

            const finalizeAsaasCharge = async (billingType) => {
                const subtotal = cart.reduce((acc, curr) => acc + (curr.price * curr.quantity), 0);
                const total = parseFloat((subtotal * (1 - (discount / 100))).toFixed(2));
                const label = billingType === 'CREDIT_CARD' ? 'Crédito Asaas' : billingType === 'DEBIT_CARD' ? 'Débito Asaas' : 'Cartão Asaas';
                setIsCheckoutOpen(false);
                setAsaasPaid(false);
                try {
                    const res = await apiFetch('/api/pdv/charge', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ customerName: 'Cliente PDV', total, billingType })
                    });
                    const data = await res.json();
                    if (!res.ok) { alert(data.error || 'Erro ao criar cobrança.'); setIsCheckoutOpen(true); return; }
                    setCurrentAsaasCharge({ payment_id: data.payment_id, invoiceUrl: data.invoiceUrl, total, label });
                    setIsAsaasModalOpen(true);
                    // Polling a cada 5s por até 10 minutos
                    let attempts = 0;
                    const maxAttempts = 120;
                    const interval = setInterval(async () => {
                        attempts++;
                        if (attempts > maxAttempts) {
                            clearInterval(interval);
                            setAsaasPolling(null);
                            alert('Tempo esgotado. Confirme manualmente se o cliente pagou.');
                            return;
                        }
                        try {
                            const sr = await apiFetch(`/api/pdv/payment-status/${data.payment_id}`);
                            const sd = await sr.json();
                            if (sd.paid) {
                                clearInterval(interval);
                                setAsaasPolling(null);
                                setAsaasPaid(true);
                            }
                        } catch (e) { /* ignora erro de rede no polling */ }
                    }, 5000);
                    setAsaasPolling(interval);
                } catch (err) {
                    alert('Falha ao conectar com servidor.');
                    setIsCheckoutOpen(true);
                }
            };

            const confirmAsaasPayment = async (label) => {
                if (asaasPolling) { clearInterval(asaasPolling); setAsaasPolling(null); }
                setIsAsaasModalOpen(false);
                await finalizeSale(label || currentAsaasCharge?.label || 'Cartão Asaas');
            };

            const renderView = (overrideView) => {
                const currentView = overrideView || view;
                const fmtR = v => `R$ ${parseFloat(v || 0).toFixed(2).replace('.', ',')}`;

                                            <div class="bg-white rounded-[32px] p-6 shadow-xl shadow-stone-100 border border-stone-100 relative overflow-hidden group">

                                                                <div class="text-right shrink-0">

                                                    </div>

                                                <div class="bg-white rounded-[32px] shadow-xl shadow-stone-100 border border-stone-100 overflow-hidden">
                                                    <div class="px-8 py-6 border-b border-stone-50 flex items-center justify-between">
                                                        <div class="flex items-center gap-3">
                                                            <div class="w-10 h-10 rounded-2xl bg-red-50 flex items-center justify-center text-red-500"><LucideIcon name="alert-triangle" className="w-5 h-5" /></div>
                                                            <h3 class="font-black text-stone-800">Reposição Urgente</h3>
                                                        </div>
                                                    </div>
                                                    <div class="divide-y divide-stone-50">
                                                        {(dashData?.lowStock || []).length > 0 ? (dashData.lowStock).map(p => (
                                                            <div key={p.id} class="px-8 py-4 flex items-center justify-between hover:bg-stone-50/50 transition-colors">
                                                                <div class="min-w-0">
                                                                    <p class="font-bold text-stone-800 truncate">{p.name}</p>
                                                                    <p class="text-[10px] text-stone-400 font-bold uppercase tracking-tighter">{p.category}</p>
                                                                </div>
                                                                <div class="px-4 py-2 bg-red-50 rounded-2xl text-red-600 font-black text-xs">
                                                                    {p.stock === 0 ? 'SEM ESTOQUE' : `${p.stock} un.`}
                                                                </div>
                                                            </div>
                                                        )) : (
                                                            <div class="px-8 py-10 text-center text-stone-300 italic text-sm">Estoque saudável</div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Column 2: Recent Sales */}
                                            <div class="bg-white rounded-[40px] shadow-xl shadow-stone-100 border border-stone-100 overflow-hidden flex flex-col">
                                                <div class="px-8 py-8 border-b border-stone-50">
                                                    <div class="flex items-center gap-4">
                                                        <div class="w-12 h-12 rounded-2xl bg-emerald-50 flex items-center justify-center text-emerald-500 shadow-inner"><LucideIcon name="check-circle" className="w-6 h-6" /></div>
                                                        <div>
                                                            <h3 class="font-black text-xl text-stone-900 leading-none">Vendas Recentes</h3>
                                                            <p class="text-stone-400 text-xs font-medium mt-1">Últimas transações aprovadas</p>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="flex-1 divide-y divide-stone-50 overflow-y-auto max-h-[600px]">
                                                    {(dashData?.recentSales || []).length > 0 ? (dashData.recentSales).map(s => (
                                                        <div key={s.id} class="px-8 py-6 flex items-center justify-between hover:bg-emerald-50/30 transition-all group">
                                                            <div class="min-w-0">
                                                                <p class="font-black text-stone-800 group-hover:text-emerald-700 transition-colors truncate">{s.customer_name || 'Cliente Moriah'}</p>
                                                                <div class="flex items-center gap-2 mt-1">
                                                                    <span class="text-[10px] font-bold text-stone-400">{fmtDt(s.created_at)}</span>
                                                                    <span class="w-1 h-1 bg-stone-200 rounded-full"></span>
                                                                    <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">{s.method || 'PIX/Cartão'}</span>
                                                                </div>
                                                            </div>
                                                            <div class="text-right">
                                                                <p class="font-black text-lg text-emerald-600 leading-none mb-1">{fmtR(s.total)}</p>
                                                                <p class="text-[9px] font-bold text-stone-300 uppercase">{s.origin || 'Físico'}</p>
                                                            </div>
                                                        </div>
                                                    )) : (
                                                        <div class="flex flex-col items-center justify-center py-20 opacity-20 filter grayscale">
                                                            <LucideIcon name="shopping-bag" className="w-16 h-16 mb-4" />
                                                            <p class="font-black uppercase tracking-[0.2em] text-sm">Sem vendas recentes</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        );
                    }

                    case 'pos': return (
                        <div class="flex flex-col lg:flex-row gap-6 h-[calc(100dvh-180px)] md:h-[calc(100dvh-96px)] animate-in fade-in duration-500 relative">
                            {cart.length > 0 && (
                                <button onClick={() => setIsMobileCartOpen(true)} class="lg:hidden fixed bottom-24 right-6 z-40 bg-moriah-brown text-white p-4 rounded-full shadow-2xl flex items-center gap-2 animate-bounce">
                                    <LucideIcon name="shopping-cart" className="w-6 h-6" />
                                    <span class="font-bold">{cart.reduce((acc, curr) => acc + curr.quantity, 0)}</span>
                                </button>
                            )}
                            <div class="flex-1 space-y-4 overflow-y-auto pr-2">
                                <div class="relative">
                                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"><LucideIcon name="search" className="w-5 h-5" /></div>
                                    <input type="text" placeholder="Buscar produto por nome ou SKU..." class="w-full pl-12 pr-4 py-3 bg-white border border-stone-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                </div>
                                <div class="product-grid">
                                    {products.filter(p => (['Café', 'Acessórios'].includes(p.category)) && (p.name.toLowerCase().includes(searchTerm.toLowerCase()) || p.sku.toLowerCase().includes(searchTerm.toLowerCase()))).map(p => {
                                        const isCoffee = p.category === 'Café';
                                        const hasTwoGrinds = isCoffee && parseFloat(p.price_moido) > 0;
                                        
                                        // Verifica se há qualquer tipo de estoque disponível
                                        const hasStock = isCoffee 
                                            ? (Number(p.stock_grao) > 0 || Number(p.stock_moido) > 0)
                                            : Number(p.stock) > 0;

                                        const handleTap = () => {
                                            if (!hasStock) return;
                                            if (hasTwoGrinds) setGrindPickerProduct(p);
                                            else addToCart(p);
                                        };
                                        return (
                                            <div key={p.id}
                                                role="button"
                                                onPointerUp={handleTap}
                                                class={`flex flex-col bg-white rounded-[32px] shadow-sm border border-stone-100 active:ring-2 active:ring-moriah-brown/30 active:bg-stone-50 transition-all select-none overflow-hidden ${!hasStock ? 'opacity-40 pointer-events-none' : 'cursor-pointer'}`}
                                            >
                                                {/* Header do Card: Nome e Peso */}
                                                <div class="p-4 pb-2">
                                                    <div class="flex justify-between items-start gap-2 mb-1">
                                                        <h4 class="font-black text-xs md:text-sm text-stone-900 leading-tight line-clamp-2 uppercase tracking-tight">{p.name}</h4>
                                                        {isCoffee && <LucideIcon name="coffee" className="w-4 h-4 text-moriah-brown/40 shrink-0" />}

                                                                    <div class={`w-1 h-1 rounded-full ${p.stock_moido < 5 ? 'bg-red-500' : 'bg-emerald-500'}`}></div>
                                                                    Stock: {p.stock_moido || 0}

                            <div class={`fixed lg:static inset-0 lg:inset-auto z-[60] lg:z-0 w-full lg:w-96 bg-white ${isMobileCartOpen ? 'translate-y-0' : 'translate-y-full lg:translate-y-0'} transition-transform duration-300 ease-in-out rounded-t-3xl lg:rounded-3xl shadow-2xl lg:shadow-lg border-t lg:border border-stone-100 flex flex-col overflow-hidden text-stone-900`}>

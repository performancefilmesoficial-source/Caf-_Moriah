                                        </div>
                                    </div>

                                    <button type="submit" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-2xl transition-all shadow-lg flex justify-center items-center gap-2">
                                        <LucideIcon name="globe" className="w-5 h-5" /> Atualizar Loja Virtual
                                    </button>

                                </form>
                            </div>
                        );
                    }
                    case 'settings': {
                        const reloadUsers = () => apiFetch('/api/users').then(r => r.json()).then(d => setUsers(Array.isArray(d) ? d : [])).catch(() => { });
                        return (
                            <div class="max-w-4xl mx-auto space-y-6 animate-in fade-in duration-500 text-stone-900">
                                <div class="flex justify-between items-center"><h2 class="text-xl md:text-2xl font-bold">Configurações do Sistema</h2></div>
                                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    {/* Painel esquerdo: criar + trocar senha */}
                                    <div class="lg:col-span-1 space-y-4">
                                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                                            <h3 class="font-bold mb-4 flex items-center gap-2 text-stone-900"><LucideIcon name="user-plus" className="w-5 h-5 text-moriah-brown" />Novo Usuário</h3>
                                            <form class="space-y-3" onSubmit={async (e) => {
                                                e.preventDefault();
                                                const fd = new FormData(e.target);
                                                const res = await apiFetch('/api/users', {
                                                    method: 'POST',
                                                    headers: { 'Content-Type': 'application/json' },
                                                    body: JSON.stringify({ name: fd.get('name'), username: fd.get('username'), password: fd.get('password') })
                                                });
                                                const data = await res.json();
                                                if (!res.ok) { alert(data.error); return; }
                                                e.target.reset();
                                                alert('Usuário criado com sucesso!');
                                                reloadUsers();
                                            }}>
                                                <div><label class="text-[10px] uppercase font-bold text-stone-400 ml-2 mb-1 block">Nome</label><input name="name" required class="w-full px-4 py-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" /></div>
                                                <div><label class="text-[10px] uppercase font-bold text-stone-400 ml-2 mb-1 block">Usuário</label><input name="username" required autoCapitalize="none" class="w-full px-4 py-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" /></div>
                                                <div><label class="text-[10px] uppercase font-bold text-stone-400 ml-2 mb-1 block">Senha</label><input name="password" type="password" required class="w-full px-4 py-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" /></div>
                                                <button type="submit" class="w-full py-3 bg-moriah-brown text-white rounded-xl font-bold hover:bg-moriah-dark transition-all flex items-center justify-center gap-2 shadow-md"><LucideIcon name="save" className="w-4 h-4" />Criar Usuário</button>
                                            </form>
                                        </div>
                                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                                            <h3 class="font-bold mb-4 flex items-center gap-2 text-stone-900"><LucideIcon name="lock" className="w-5 h-5 text-moriah-brown" />Minha Senha</h3>
                                            <form class="space-y-3" onSubmit={async (e) => {
                                                e.preventDefault();
                                                const fd = new FormData(e.target);
                                                const nova = fd.get('nova');
                                                const conf = fd.get('confirma');
                                                if (nova !== conf) { alert('As senhas não coincidem.'); return; }
                                                const res = await apiFetch(`/api/users/${currentUser.id}/password`, {
                                                    method: 'PUT',
                                                    headers: { 'Content-Type': 'application/json' },
                                                    body: JSON.stringify({ password: nova })
                                                });
                                                const data = await res.json();
                                                if (!res.ok) { alert(data.error); return; }
                                                e.target.reset();
                                                alert('Senha alterada! Faça login novamente.');
                                                { localStorage.removeItem('moriah_jwt'); setCurrentUser(null); };
                                            }}>
                                                <div><label class="text-[10px] uppercase font-bold text-stone-400 ml-2 mb-1 block">Nova Senha</label><input name="nova" type="password" required minLength="4" class="w-full px-4 py-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" /></div>
                                                <div><label class="text-[10px] uppercase font-bold text-stone-400 ml-2 mb-1 block">Confirmar</label><input name="confirma" type="password" required minLength="4" class="w-full px-4 py-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" /></div>
                                                <button type="submit" class="w-full py-3 bg-stone-800 text-white rounded-xl font-bold hover:bg-stone-900 transition-all flex items-center justify-center gap-2"><LucideIcon name="key" className="w-4 h-4" />Alterar Senha</button>
                                            </form>
                                        </div>
                                    </div>
                                    {/* Lista de usuários */}
                                    <div class="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-stone-100 overflow-hidden h-fit">
                                        <div class="px-6 py-4 border-b border-stone-50 flex items-center justify-between">
                                            <h3 class="font-bold">Usuários Cadastrados</h3>
                                            <span class="text-xs text-stone-400">{users.length} usuário{users.length !== 1 ? 's' : ''}</span>
                                        </div>
                                        <table class="w-full text-left">
                                            <tbody class="divide-y divide-stone-50">
                                                {users.map(u => (
                                                    <tr key={u.id} class="hover:bg-stone-50 transition-colors">
                                                        <td class="px-6 py-4">
                                                            <p class="font-bold text-stone-900">{u.name}</p>
                                                            <p class="text-xs text-stone-400">@{u.username} · <span class={`font-semibold ${u.role === 'admin' ? 'text-moriah-brown' : 'text-stone-400'}`}>{u.role === 'admin' ? 'Admin' : 'Operador'}</span></p>
                                                        </td>
                                                        <td class="px-6 py-4 text-right">
                                                            {u.id === currentUser.id
                                                                ? <span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-full">VOCÊ</span>
                                                                : <button onClick={async () => {
                                                                    if (!confirm(`Remover acesso de "${u.name}"?`)) return;
                                                                    await apiFetch(`/api/users/${u.id}`, { method: 'DELETE' });
                                                                    reloadUsers();
                                                                }} class="p-2 text-stone-300 hover:text-red-500 transition-colors rounded-lg hover:bg-red-50"><LucideIcon name="user-minus" className="w-4 h-4" /></button>
                                                            }
                                                        </td>
                                                    </tr>
                                                ))}
                                                {users.length === 0 && <tr><td colSpan="2" class="px-6 py-8 text-center text-stone-300 italic">Carregando usuários...</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        );
                    }
                    case 'customers': {
                        return (
                            <div class="space-y-6 animate-in fade-in duration-500 text-stone-900">
                                <div class="flex justify-between items-center text-stone-900"><h2 class="text-2xl font-bold">Base de Clientes</h2></div>
                                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div class="lg:col-span-1 bg-white p-6 rounded-3xl shadow-sm border border-stone-100 h-fit text-stone-900">
                                        <h3 class="font-bold mb-4 flex items-center gap-2 text-moriah-brown"><LucideIcon name="user-plus" className="w-5 h-5" />Novo Cliente</h3>
                                        <form class="space-y-4" onSubmit={(e) => {
                                            e.preventDefault();
                                            const formData = new FormData(e.target);
                                            const newCustomer = { id: Date.now(), name: formData.get('name'), whatsapp: formData.get('whatsapp'), email: formData.get('email'), created: new Date().toISOString() };
                                            setCustomers([...customers, newCustomer]);
                                            e.target.reset();
                                            alert('Cliente cadastrado com sucesso!');
                                        }}>
                                            <div><label class="text-[10px] uppercase font-bold text-stone-400 ml-2 mb-1 block">Nome Completo</label><input name="name" required class="w-full px-4 py-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" /></div>
                                            <div><label class="text-[10px] uppercase font-bold text-stone-400 ml-2 mb-1 block">WhatsApp</label><input name="whatsapp" required placeholder="5511999999999" class="w-full px-4 py-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" /></div>
                                            <div><label class="text-[10px] uppercase font-bold text-stone-400 ml-2 mb-1 block">E-mail</label><input name="email" type="email" required class="w-full px-4 py-3 bg-stone-50 border border-stone-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" /></div>
                                            <button type="submit" class="w-full py-4 bg-moriah-brown text-white rounded-xl font-bold hover:bg-moriah-dark transition-all mt-2 flex items-center justify-center gap-2 shadow-lg"><LucideIcon name="save" className="w-5 h-5" />Salvar Cliente</button>
                                        </form>
                                    </div>
                                    <div class="lg:col-span-2 space-y-4">
                                        <div class="bg-white rounded-3xl shadow-sm border border-stone-100 overflow-hidden">
                                            <div class="px-6 py-4 border-b border-stone-50 bg-stone-50/50 flex justify-between items-center text-stone-900">
                                                <h3 class="font-bold">Clientes Cadastrados ({customers.length})</h3>
                                                <div class="relative w-48"><div class="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400"><LucideIcon name="search" className="w-3 h-3" /></div><input placeholder="Buscar..." class="w-full pl-8 pr-3 py-1.5 text-xs bg-white border border-stone-200 rounded-lg outline-none focus:ring-1 focus:ring-moriah-brown/30" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} /></div>
                                            </div>
                                            <table class="w-full text-left">
                                                <thead class="bg-stone-50/50 text-[10px] uppercase font-bold text-stone-400 border-b border-stone-100"><tr><th class="px-6 py-3">Cliente</th><th class="px-6 py-3 text-right">Ações</th></tr></thead>
                                                <tbody class="divide-y divide-stone-50">
                                                    {customers.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()) || c.whatsapp.includes(searchTerm)).map(c => (
                                                        <tr key={c.id} class="hover:bg-stone-50 transition-colors">
                                                            <td class="px-6 py-4"><p class="font-bold">{c.name}</p><div class="flex gap-4 mt-1 text-xs text-stone-400"><span class="flex items-center gap-1"><LucideIcon name="phone" className="w-3 h-3" /> {c.whatsapp}</span><span class="flex items-center gap-1"><LucideIcon name="mail" className="w-3 h-3" /> {c.email}</span></div></td>
                                                            <td class="px-6 py-4 text-right">
                                                                <div class="flex justify-end gap-2">
                                                                    <a href={`https://wa.me/${c.whatsapp.replace(/\D/g, '')}`} target="_blank" class="p-2 text-emerald-500 hover:bg-emerald-50 rounded-lg transition-colors" title="Falar no WhatsApp"><LucideIcon name="message-circle" className="w-4 h-4" /></a>
                                                                    <button onClick={() => { if (confirm('Excluir este cliente?')) setCustomers(curr => curr.filter(cust => cust.id !== c.id)); }} class="p-2 text-stone-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"><LucideIcon name="trash-2" className="w-4 h-4" /></button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {customers.length === 0 && (<tr><td colspan="2" class="px-6 py-12 text-center text-stone-300 italic">Sua base de clientes está vazia. Comece a cadastrar agora!</td></tr>)}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    }
                }
            };

            if (!currentUser) return renderView('login');

            // Primeiro login: força troca de senha
            if (currentUser.must_change_password) {
                const handleFirstPassword = async (e) => {
                    e.preventDefault();
                    const fd = new FormData(e.target);
                    const nova = fd.get('nova');
                    const conf = fd.get('confirma');
                    if (nova !== conf) { alert('As senhas não coincidem.'); return; }
                    if (nova.length < 4) { alert('A senha deve ter ao menos 4 caracteres.'); return; }
                    const res = await apiFetch(`/api/users/${currentUser.id}/first-password`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: nova })
                    });
                    if (res.ok) {
                        const updated = { ...currentUser, must_change_password: 0 };
                        setCurrentUser(updated);
                    } else {
                        const d = await res.json();
                        alert(d.error || 'Erro ao alterar senha.');
                    }
                };
                return (
                    <div class="fixed inset-0 bg-stone-50 flex items-center justify-center p-4">
                        <div class="bg-white w-full max-w-md rounded-[40px] shadow-2xl overflow-hidden p-10 flex flex-col items-center">
                            <img src={logoUrl} class="h-14 w-auto mb-8" />
                            <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mb-4 text-amber-600"><LucideIcon name="lock" className="w-8 h-8" /></div>
                            <h2 class="text-2xl font-black text-stone-900 mb-1">Bem-vindo, {currentUser.name}!</h2>
                            <p class="text-stone-400 text-sm mb-8 text-center">Por segurança, defina uma senha pessoal antes de continuar.</p>
                            <form class="w-full space-y-4" onSubmit={handleFirstPassword}>
                                <div>
                                    <label class="text-[10px] uppercase font-bold text-stone-400 ml-4 mb-1 block">Nova Senha</label>
                                    <input name="nova" type="password" required minLength="4" class="w-full px-6 py-4 bg-stone-50 border border-stone-100 rounded-2xl font-bold focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" placeholder="Mínimo 4 caracteres" />
                                </div>
                                <div>
                                    <label class="text-[10px] uppercase font-bold text-stone-400 ml-4 mb-1 block">Confirmar Senha</label>
                                    <input name="confirma" type="password" required minLength="4" class="w-full px-6 py-4 bg-stone-50 border border-stone-100 rounded-2xl font-bold focus:outline-none focus:ring-2 focus:ring-moriah-brown/50" placeholder="Repita a senha" />
                                </div>
                                <button type="submit" class="w-full py-5 bg-moriah-brown text-white rounded-2xl font-black text-xl hover:bg-moriah-dark transition-all shadow-xl shadow-stone-200 mt-4 flex items-center justify-center gap-3">
                                    <LucideIcon name="check-circle" className="w-6 h-6" />Definir Senha e Entrar
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const MobileNavItem = ({ icon, label, active, onClick }) => (
                <button onClick={onClick} class={`flex flex-col items-center justify-center flex-1 py-2 transition-all ${active ? 'text-white' : 'text-stone-400/80 hover:text-stone-300'}`}>
                    <LucideIcon name={icon} className={`w-5 h-5 ${active ? 'fill-white/10 text-white' : ''}`} />
                    <span class={`text-[10px] font-bold mt-1 uppercase tracking-tighter ${active ? 'text-white' : 'text-stone-400'}`}>{label}</span>
                </button>
            );

            return (
                <div class="flex flex-col md:flex-row h-screen overflow-hidden bg-stone-50 w-full">
                    <aside class="hidden md:flex w-72 bg-white border-r border-stone-100 flex-col p-6 space-y-8 no-print">
                        <div class="flex items-center justify-center py-2 mb-2"><img src={logoUrl} class="h-9 w-auto max-w-[160px] object-contain" /></div>
                        <nav class="flex-1 space-y-2">
                            <SidebarItem onClick={() => setView('dashboard')} active={view === 'dashboard'} icon="layout-dashboard" label="Dashboard" />
                            <SidebarItem onClick={() => setView('pos')} active={view === 'pos'} icon="shopping-bag" label="Ponto de Venda" />
                            <SidebarItem onClick={() => setView('inventory')} active={view === 'inventory'} icon="package" label="Inventário" />
                            <SidebarItem onClick={() => setView('customers')} active={view === 'customers'} icon="users-round" label="Clientes" />
                            <SidebarItem onClick={() => setView('sales')} active={view === 'sales'} icon="file-text" label="Relatórios" />
                            <SidebarItem onClick={() => setView('site_settings')} active={view === 'site_settings'} icon="store" label="Ecommerce CMS" />
                            <SidebarItem onClick={() => setView('settings')} active={view === 'settings'} icon="settings" label="Sistema" />
                        </nav>
                        <div class="space-y-4">
                            <div class="p-4 bg-stone-50 rounded-2xl border border-stone-100">
                                <p class="text-[10px] font-bold text-stone-400 mb-1 uppercase">Logado como</p>
                                <p class="text-sm font-black text-stone-900 truncate">{currentUser.name || currentUser.username}</p>
                                <button onClick={() => { localStorage.removeItem('moriah_jwt'); setCurrentUser(null); }} class="text-[10px] text-moriah-brown font-bold mt-2 hover:underline">Sair do Sistema</button>
                            </div>
                            <div class="p-4 bg-moriah-brown/5 rounded-2xl border border-moriah-brown/10">
                                <p class="text-[10px] font-bold text-moriah-brown mb-1 uppercase tracking-wider">Status do Sistema</p>
                                <div class="flex items-center gap-2">
                                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div><span class="text-xs font-medium text-stone-600">Operando Localmente</span>
                                </div>
                            </div>
                        </div>
                    </aside>
                    <header class="md:hidden sticky top-0 z-40 bg-white border-b border-stone-100 px-4 py-3 flex items-center justify-between no-print w-full">
                        <img src={logoUrl} class="h-8 w-auto" />
                        <div class="flex items-center gap-3">
                            <div class="text-right"><p class="text-[8px] font-bold text-stone-400 uppercase leading-none">Vendedor</p><p class="text-xs font-black text-stone-900 leading-none mt-0.5">{currentUser.username}</p></div>
                            <button onClick={() => { localStorage.removeItem('moriah_jwt'); setCurrentUser(null); }} class="p-2 bg-stone-50 rounded-lg text-moriah-brown p-2"><LucideIcon name="log-out" className="w-4 h-4" /></button>
                        </div>
                    </header>
                    <main class="flex-1 p-4 md:p-8 overflow-y-auto pb-32 md:pb-8">{renderView()}</main>
                    <nav class="md:hidden fixed bottom-0 left-0 right-0 w-full h-[72px] bg-moriah-black border-t border-white/5 flex items-center px-0 no-print z-60 shadow-[0_-8px_30px_rgb(0,0,0,0.4)] pb-safe">
                        <MobileNavItem onClick={() => setView('dashboard')} active={view === 'dashboard'} icon="layout-dashboard" label="Painel" />
                        <MobileNavItem onClick={() => setView('pos')} active={view === 'pos'} icon="shopping-bag" label="Venda" />
                        <MobileNavItem onClick={() => setView('inventory')} active={view === 'inventory'} icon="package" label="Estoque" />
                        <MobileNavItem onClick={() => setView('customers')} active={view === 'customers'} icon="users-round" label="Clientes" />
                        <MobileNavItem onClick={() => setView('sales')} active={view === 'sales' || view === 'settings'} icon="more-horizontal" label="Mais" />
                    </nav>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>

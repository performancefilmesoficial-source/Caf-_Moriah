<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moriah Café</title>
    <link rel="icon" id="favicon-link" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" id="apple-favicon-link" href="favicon.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        moriah: {
                            brown: '#38220f',    // Marrom Profundo
                            sand: '#ecdcc2',     // Bege Areia
                            gold: '#d4af37',     // Dourado CTA
                            black: '#1f1b18',    // Preto Fosco
                            bg: '#faf8f5',       // Fundo Clean
                            green: '#123930',    // Verde Profundo da Logo
                            orange: '#f26e3d',   // Laranja do Ícone 04.png
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(56,34,15,0.08)',
                        'gold': '0 4px 14px 0 rgba(212,175,55,0.39)',
                    }
                }
            }
        }
    </script>
    <style>
        html {
            scroll-behavior: smooth;
            scroll-padding-top: 5rem;
            overflow-x: hidden;
            /* Impede arraste horizontal */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf8f5;
            color: #1f1b18;
            overflow-x: hidden;
            /* Impede arraste horizontal */
            margin: 0;
            padding: 0;
            max-width: 100vw;
        }

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .pt-safe {
            padding-top: env(safe-area-inset-top, 0);
        }

        .mobile-nav-shadow {
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.04);
        }

        /* Garante que nenhum elemento vaze para fora da tela */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        /* Previne overflow em inputs no iOS (fonte >= 16px evita zoom automático) */
        input,
        select,
        textarea {
            font-size: max(16px, 1em);
        }
    </style>
</head>

<body>
    <div id="root">
        <div className="flex items-center justify-center h-screen bg-[#faf8f5]" id="inicio">
            <div class="text-center">
                <div
                    class="w-12 h-12 border-4 border-[#38220f] border-t-transparent rounded-full animate-spin mx-auto mb-4">
                </div>
                <p class="text-[#d4af37] font-sans italic text-xl animate-pulse">Preparando seu café...</p>
            </div>
        </div>
    </div>
    <script type="text/babel">
        function App() {
            const [cart, setCart] = React.useState([]);
            const [isCartOpen, setIsCartOpen] = React.useState(false);
            const [isMenuOpen, setIsMenuOpen] = React.useState(false);
            const [isCheckingOut, setIsCheckingOut] = React.useState(false);
            const [isTrackingOpen, setIsTrackingOpen] = React.useState(false);
            const [trackingCode, setTrackingCode] = React.useState('');
            const [shippingCep, setShippingCep] = React.useState('');
            const [shippingCost, setShippingCost] = React.useState(0);
            const [shippingService, setShippingService] = React.useState('');
            const [shippingServiceId, setShippingServiceId] = React.useState(null);
            const [selectedProduct, setSelectedProduct] = React.useState(null);
            const [view, setView] = React.useState('home');

            // Helper genérico para Imagens vindas do Backend (String comum ou Array JSON)
            const getProductImages = (urlData) => {
                if (!urlData) return ['https://images.unsplash.com/photo-1559525839-b184a4d698c7?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'];
                try {
                    const parsed = JSON.parse(urlData);
                    if (Array.isArray(parsed) && parsed.length > 0) return parsed;
                    return [urlData];
                } catch (e) {
                    return [urlData];
                }
            };

            const addToCart = (product, grind = null) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id && item.grind === grind);
                    if (existing) {
                        return prev.map(item => item.id === product.id && item.grind === grind ? { ...item, quantity: item.quantity + 1 } : item);
                    }
                    return [...prev, { ...product, quantity: 1, grind }];
                });
                setIsCartOpen(true);
            };

            const removeFromCart = (productId, grind = null) => {
                setCart(prev => prev.filter(item => !(item.id === productId && item.grind === grind)));
                if (cart.length === 1) { setShippingCost(0); setShippingService(''); }
            };

            const updateQuantity = (productId, grind, amount) => {
                setCart(prev => prev.map(item => {
                    if (item.id === productId && item.grind === grind) {
                        const newQ = item.quantity + amount;
                        return newQ > 0 ? { ...item, quantity: newQ } : item;
                    }
                    return item;
                }));
            };

            const cartTotal = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
            const finalTotal = cartTotal + shippingCost;



            // Wrapper seguro para renderizar ícones Lucide no React
            const LucideIcon = ({ name, className }) => {
                const spanRef = React.useRef(null);
                React.useEffect(() => {
                    if (spanRef.current) {
                        spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
                        lucide.createIcons({ root: spanRef.current });
                    }
                }, [name, className]);
                return <span ref={spanRef} style={{ display: 'contents' }}></span>;
            };


            const [cafes, setCafes] = React.useState([]);
            const [acessorios, setAcessorios] = React.useState([]);
            const [isLoading, setIsLoading] = React.useState(true);
            const [globalSearch, setGlobalSearch] = React.useState('');

            // Escuta o evento de busca disparado pelo Header
            React.useEffect(() => {
                const handler = (e) => setGlobalSearch(e.detail.query || '');
                window.addEventListener('moriah-search', handler);
                return () => window.removeEventListener('moriah-search', handler);
            }, []);

            React.useEffect(() => {
                const fetchProducts = async () => {
                    try {
                        const res = await fetch('/api/products/online');
                        const data = await res.json();

                        // Separa Bebidas/Grãos de Acessórios
                        const cafeItems = data.filter(p => p.category.toLowerCase().includes('café') || p.category.toLowerCase().includes('grao') || p.category.toLowerCase().includes('grão'));
                        const accItems = data.filter(p => !p.category.toLowerCase().includes('café') && !p.category.toLowerCase().includes('grao') && !p.category.toLowerCase().includes('grão'));

                        setCafes(cafeItems);
                        setAcessorios(accItems);
                    } catch (error) {
                        console.error("Erro ao carregar a vitrine:", error);
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchProducts();
            }, []);

            const [siteSettings, setSiteSettings] = React.useState({
                site_title: 'Moriah Café - Especial & Luxuoso',
                logo_url: 'logo.png',
                favicon_url: 'favicon.png',
                hero_title: 'O Café dos Seus Sonhos',
                hero_text: 'Grãos selecionados das melhores origens do Brasil...',
                hero_video: '',
                hero_banners: '[]',
                about_title: 'Descubra Nossa História',
                about_text_1: 'Nascida do amor profundo...',
                about_text_2: 'Trabalhamos lado a lado...',
                about_image: 'https://images.unsplash.com/photo-1611162458324-aae1eb4129a4',
                whatsapp_number: '5575992073245',
                instagram_url: 'https://instagram.com/cafemoriah__',
                contact_email: '',
                cnpj: '63.644.379/0001-56',
                address: 'Bahia / BA',
                footer_text: 'Moriah Café. Todos os direitos reservados.'
            });

            React.useEffect(() => {
                fetch('/api/site-settings', { cache: 'no-store' })
                    .then(r => r.json())
                    .then(data => {
                        if (data) {
                            // Sanitiza chaves nulas do BD para strings vazias evitando crash de métodos React
                            const sanitizedData = {};
                            Object.keys(data).forEach(key => {
                                sanitizedData[key] = data[key] || '';
                            });
                            
                            const newSettings = { ...siteSettings, ...sanitizedData };
                            setSiteSettings(newSettings);

                            // Atualiza Meta Tags Dinâmicas
                            if (sanitizedData.site_title) {
                                document.title = sanitizedData.site_title;
                            }
                            if (sanitizedData.favicon_url) {
                                document.getElementById('favicon-link').href = sanitizedData.favicon_url;
                                document.getElementById('apple-favicon-link').href = sanitizedData.favicon_url;
                            }
                        }
                    })
                    .catch(err => console.error("Sem CMS configurado!", err));
            }, []);

            const Header = () => {
                const [searchOpen, setSearchOpen] = React.useState(false);
                const [searchQuery, setSearchQuery] = React.useState('');
                const inputRef = React.useRef(null);

                const scrollToSection = (e, id) => {
                    e.preventDefault();
                    const element = document.getElementById(id);
                    if (element) {
                        const offset = 80;
                        const bodyRect = document.body.getBoundingClientRect().top;
                        const elementRect = element.getBoundingClientRect().top;
                        const elementPosition = elementRect - bodyRect;
                        const offsetPosition = elementPosition - offset;
                        window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                    }
                };

                const handleSearchToggle = () => {
                    setSearchOpen(prev => {
                        const next = !prev;
                        if (next) setTimeout(() => inputRef.current?.focus(), 50);
                        else setSearchQuery('');
                        return next;
                    });
                };

                const handleSearchChange = (e) => {
                    const q = e.target.value;
                    setSearchQuery(q);
                    if (q.trim()) {
                        // Rola até os produtos ao digitar
                        const el = document.getElementById('produtos');
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                    // Dispara evento customizado para filtrar produtos
                    window.dispatchEvent(new CustomEvent('moriah-search', { detail: { query: q } }));
                };

                return (
                    <header className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-moriah-sand border-opacity-50">
                        <div className="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between gap-3">
                            <div className="flex items-center cursor-pointer flex-shrink-0 max-w-[140px] md:max-w-[180px]" onClick={(e) => scrollToSection(e, 'inicio')}>
                                <img src={siteSettings.logo_url || "logo.png"} alt={siteSettings.site_title} className="h-9 md:h-11 w-auto object-contain max-w-full" />
                            </div>
                            <div className="hidden md:flex gap-8 text-sm font-medium">
                                <a href="#inicio" onClick={(e) => scrollToSection(e, 'inicio')} className="hover:text-moriah-gold transition-colors">Home</a>
                                <a href="#produtos" onClick={(e) => scrollToSection(e, 'produtos')} className="hover:text-moriah-gold transition-colors">Cafés</a>
                                <a href="#acessorios" onClick={(e) => scrollToSection(e, 'acessorios')} className="hover:text-moriah-gold transition-colors">Acessórios</a>
                                <a href="#nossahistoria" onClick={(e) => scrollToSection(e, 'nossahistoria')} className="hover:text-moriah-gold transition-colors">Nossa História</a>
                                <button onClick={() => setIsTrackingOpen(true)} className="flex items-center gap-2 hover:text-moriah-gold transition-colors"><LucideIcon name="package" className="w-4 h-4" />Rastreio</button>
                            </div>
                            <div className="flex items-center gap-2">
                                {/* Barra de busca expansível */}
                                <div className={`flex items-center gap-2 transition-all duration-300 overflow-hidden ${searchOpen ? 'w-36 md:w-64 bg-stone-50 border border-stone-200 rounded-full px-3' : 'w-9'}`}>
                                    <button onClick={handleSearchToggle} className="p-1.5 hover:bg-moriah-sand/20 rounded-full transition flex-shrink-0" title="Buscar produtos">
                                        <LucideIcon name={searchOpen ? 'x' : 'search'} className="w-5 h-5" />
                                    </button>
                                    {searchOpen && (
                                        <input
                                            ref={inputRef}
                                            type="text"
                                            placeholder="Buscar produtos..."
                                            value={searchQuery}
                                            onChange={handleSearchChange}
                                            onKeyDown={(e) => e.key === 'Escape' && handleSearchToggle()}
                                            className="w-full bg-transparent outline-none text-sm text-moriah-black placeholder-stone-400 py-1.5"
                                        />
                                    )}
                                </div>
                                {/* Carrinho */}
                                <button className="p-2 hover:bg-moriah-sand/20 rounded-full transition relative" onClick={() => setIsCartOpen(true)}>
                                    <LucideIcon name="shopping-bag" className="w-5 h-5" />
                                    {cart.length > 0 && <span className="absolute top-0 right-0 bg-moriah-gold text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">{cart.reduce((a, b) => a + b.quantity, 0)}</span>}
                                </button>
                            </div>
                        </div>
                    </header>
                );
            };

            const Hero = () => {
                const [currentIndex, setCurrentIndex] = React.useState(0);
                const banners = React.useMemo(() => {
                    try {
                        const parsed = JSON.parse(siteSettings.hero_banners || '[]');
                        return parsed.length > 0 ? parsed : ['https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1920&q=80'];
                    } catch (e) {
                        return ['https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1920&q=80'];
                    }
                }, [siteSettings.hero_banners]);

                React.useEffect(() => {
                    if (banners.length <= 1) return;
                    const interval = setInterval(() => {
                        setCurrentIndex(prev => (prev + 1) % banners.length);
                    }, 5000); // 5 segundos
                    return () => clearInterval(interval);
                }, [banners]);

                const scrollToSection = (e, id) => {
                    e.preventDefault();
                    const element = document.getElementById(id);
                    if (element) {
                        const offset = 80;
                        const bodyRect = document.body.getBoundingClientRect().top;
                        const elementRect = element.getBoundingClientRect().top;
                        window.scrollTo({ top: elementRect - bodyRect - offset, behavior: 'smooth' });
                    }
                };

                return (
                    <section className="relative bg-moriah-black text-white overflow-hidden flex items-center justify-center min-h-[50vh] md:min-h-[70vh] py-12 md:py-20" id="inicio">
                        {/* Carrossel de Imagens */}
                        <div className="absolute inset-0 z-0">
                            {banners.map((url, idx) => (
                                <div 
                                    key={idx}
                                    className={`absolute inset-0 transition-opacity duration-1000 ease-in-out ${idx === currentIndex ? 'opacity-100' : 'opacity-0'}`}
                                >
                                    <img 
                                        src={url} 
                                        className="w-full h-full object-cover" 
                                        alt={`Banner ${idx + 1}`}
                                    />
                                    {/* Overlay escuro dinâmico */}
                                    <div
                                        className="absolute inset-0 bg-moriah-black"
                                        style={{ opacity: siteSettings.hero_video_opacity || 0 }}
                                    ></div>
                                </div>
                            ))}
                            <div className="absolute inset-0 bg-gradient-to-t from-moriah-black via-transparent to-transparent opacity-60"></div>
                        </div>

                        <div className={`relative z-10 ${siteSettings.hero_text_align || 'text-center'} max-w-4xl mx-auto px-4 mt-8`}>
                            {siteSettings.hero_title && (
                                <h1 className="font-sans text-4xl md:text-6xl lg:text-8xl mb-6 font-bold leading-tight drop-shadow-2xl whitespace-pre-line animate-in fade-in slide-in-from-bottom-4 duration-1000">
                                    {siteSettings.hero_title}
                                </h1>
                            )}
                            {siteSettings.hero_text && (
                                <p className="text-stone-200 md:text-xl font-light max-w-2xl mx-auto mb-10 drop-shadow-lg leading-relaxed whitespace-pre-line animate-in fade-in slide-in-from-bottom-6 duration-1000 delay-300">
                                    {siteSettings.hero_text}
                                </p>
                            )}

                        </div>
                        
                        {/* Indicadores do Carrossel */}
                        {banners.length > 1 && (
                            <div className="absolute bottom-8 left-1/2 -translate-x-1/2 z-20 flex gap-2">
                                {banners.map((_, idx) => (
                                    <button 
                                        key={idx}
                                        onClick={() => setCurrentIndex(idx)}
                                        className={`w-2 h-2 rounded-full transition-all duration-300 ${idx === currentIndex ? 'bg-moriah-gold w-8' : 'bg-white/40 hover:bg-white/60'}`}
                                    ></button>
                                ))}
                            </div>
                        )}
                    </section>
                );
            };

            const ProductCard = ({ product }) => {
                const isCoffee = product.category.toLowerCase().includes('grão') || product.category.toLowerCase().includes('café') || product.category.toLowerCase().includes('cafe') || product.name.toLowerCase().includes('café');

                // Lógica de estoque inicial para café
                const hasGrao = !isCoffee || (product.stock_grao > 0);
                const hasMoido = isCoffee && (product.stock_moido > 0);
                const isOutOfStock = isCoffee ? (!hasGrao && !hasMoido) : (product.stock <= 0);

                const [grind, setGrind] = React.useState(hasGrao ? 'grao' : 'moido');
                const images = getProductImages(product.image_url);
                const mainImage = images[0];
                const FALLBACK = 'https://images.unsplash.com/photo-1559525839-b184a4d698c7?auto=format&fit=crop&w=600&q=80';

                // Preco varia por moagem
                const priceMoido = product.price_moido && product.price_moido > 0 ? product.price_moido : product.price;
                const currentPrice = (isCoffee && grind === 'moido') ? priceMoido : product.price;

                return (
                    <div className={`group bg-white rounded-3xl overflow-hidden shadow-soft flex flex-col h-full border border-stone-100 relative cursor-pointer ${isOutOfStock ? 'opacity-60 grayscale-[0.5]' : ''}`} onClick={() => !isOutOfStock && setSelectedProduct(product)}>
                        <div className="relative aspect-[4/3] overflow-hidden bg-stone-50">
                            <img
                                src={mainImage}
                                className="w-full h-full object-cover group-hover:scale-105 transition duration-700"
                                alt={product.name}
                                onError={(e) => { e.target.onerror = null; e.target.src = FALLBACK; }}
                            />
                            {isOutOfStock && (
                                <div className="absolute inset-0 bg-moriah-black/40 flex items-center justify-center">
                                    <span className="bg-white text-moriah-brown font-black px-4 py-2 rounded-full text-xs uppercase tracking-widest">Esgotado</span>
                                </div>
                            )}
                        </div>
                        <div className="p-6 flex flex-col flex-1">
                            <span className="text-[10px] text-stone-400 mb-2 font-bold uppercase tracking-wider">{product.category}</span>
                            <h3 className="font-sans text-xl font-bold text-moriah-green mb-2 leading-tight">{product.name}</h3>
                            {product.description && <p className="text-sm text-stone-500 line-clamp-2 mb-4 h-10">{product.description}</p>}

                            {isCoffee && !isOutOfStock && (
                                <div className="mt-auto mb-4 bg-stone-50 rounded-2xl p-3 border border-stone-100" onClick={e => e.stopPropagation()}>
                                    <div className="flex items-center gap-1">
                                        <label className={`flex flex-1 items-center justify-center gap-1.5 py-2 px-3 rounded-xl cursor-not-allowed transition-all text-sm font-bold border ${!hasGrao ? 'bg-stone-100 text-stone-300 border-stone-100' : grind === 'grao' ? 'bg-moriah-orange text-white border-moriah-orange shadow-sm cursor-pointer' : 'bg-white text-stone-500 border-stone-200 hover:border-moriah-orange cursor-pointer'}`}>
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="12" rx="5" ry="8" transform="rotate(-30 12 12)" /><path d="M12 4c1 2 1 8-1 12" /></svg>
                                            <span>Gr&#xE3;o</span>
                                            <input disabled={!hasGrao} type="radio" name={`grind-${product.id}`} value="grao" className="hidden" onChange={() => setGrind('grao')} checked={grind === 'grao'} />
                                        </label>
                                        <label className={`flex flex-1 items-center justify-center gap-1.5 py-2 px-3 rounded-xl cursor-not-allowed transition-all text-sm font-bold border ${!hasMoido ? 'bg-stone-100 text-stone-300 border-stone-100' : grind === 'moido' ? 'bg-moriah-orange text-white border-moriah-orange shadow-sm cursor-pointer' : 'bg-white text-stone-500 border-stone-200 hover:border-moriah-orange cursor-pointer'}`}>
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 21h10" /><path d="M10 21V8l-3 2.5" /><path d="M14 21V8l3 2.5" /><rect x="8" y="5" width="8" height="3" rx="1" /><circle cx="10" cy="2.5" r="1" /><circle cx="14" cy="2.5" r="1" /></svg>
                                            <span>Mo&#xED;do</span>
                                            <input disabled={!hasMoido} type="radio" name={`grind-${product.id}`} value="moido" className="hidden" onChange={() => setGrind('moido')} checked={grind === 'moido'} />
                                        </label>
                                    </div>
                                    {!hasGrao && <p className="text-[9px] text-red-400 mt-1 text-center font-bold uppercase">Gr&#xE3;o Esgotado</p>}
                                    {!hasMoido && hasGrao && <p className="text-[9px] text-red-400 mt-1 text-center font-bold uppercase">Mo&#xED;do Esgotado</p>}
                                </div>
                            )}

                            <div className={`mt-${(isCoffee && !isOutOfStock) ? '0' : 'auto'} pt-4 flex items-center justify-between border-t border-stone-100`}>
                                <div>
                                    <span className="text-2xl font-bold text-moriah-brown transition-all duration-200">
                                        {isOutOfStock ? '---' : `R$ ${currentPrice.toFixed(2).replace('.', ',')}`}
                                    </span>
                                </div>
                                <button
                                    disabled={isOutOfStock}
                                    onClick={(e) => { e.stopPropagation(); addToCart({ ...product, price: currentPrice }, isCoffee ? grind : null); }}
                                    className={`w-12 h-12 rounded-xl flex items-center justify-center transition-colors ${isOutOfStock ? 'bg-stone-100 text-stone-300 cursor-not-allowed' : 'bg-moriah-orange/10 text-moriah-orange hover:bg-moriah-orange hover:text-white'}`}
                                >
                                    <LucideIcon name="shopping-bag" className="w-5 h-5" />
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const OurStory = () => {
                if (!siteSettings.about_title && !siteSettings.about_text_1 && !siteSettings.about_text_2) return null;

                return (
                    <section className="bg-moriah-sand/10 py-24 px-4 overflow-hidden relative" id="nossahistoria">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 lg:gap-20 items-center relative z-10">
                            <div className="relative aspect-[4/5] md:aspect-square lg:aspect-[4/5] rounded-[2rem] overflow-hidden shadow-2xl group">

                const [shippingCep, setShippingCep] = React.useState('');
                const [shippingOptions, setShippingOptions] = React.useState([]);
                const [isCalculatingShipping, setIsCalculatingShipping] = React.useState(false);
                const [isLocalDelivery, setIsLocalDelivery] = React.useState(false);
                // shippingCost e shippingService vêm do App (via props implícitas de closure)

                const handleCalculateShipping = async (e) => {
                    e.preventDefault();
                    if (!shippingCep) return;
                    const cleanCep = shippingCep.replace(/\D/g, '');
                    if (cleanCep.length < 8) return;

                    setIsCalculatingShipping(true);
                    setShippingOptions([]);
                    setShippingCost(0);
                    setShippingService('');
                    setIsLocalDelivery(false);

                    try {
                        const res = await fetch('/api/shipping/calculate', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ destinationCep: cleanCep, cartItems: cart })
                        });

                        const data = await res.json();

                        if (data.success && data.services && data.services.length > 0) {
                            setShippingOptions(data.services);
                            setIsLocalDelivery(data.localDelivery || false);
                        } else {
                            alert('Nao ha transportadoras disponiveis para este CEP no momento.');
                            setShippingCost(0);
                        }
                    } catch (error) {
                        alert('Erro ao calcular frete.');
                        setShippingCost(0);
                    } finally {
                        setIsCalculatingShipping(false);
                    }
                };

                const handleSelectShipping = (opt) => {
                    setShippingCost(parseFloat(opt.price));
                    setShippingService(opt.name);
                };

                                <button onClick={() => setIsCartOpen(false)} className="p-2 hover:bg-stone-100 rounded-full transition-colors text-stone-500">

                                    </div>

                                                                {isFree ? 'GRÁTIS' : `R$ ${String(opt.price).replace('.', ',')}`}
                                                            </span>
                                                        </label>
                                                    );

                                            </div>

                                        {/* Opções Correios/Melhor Envio (CEP fora de Feira) */}
                                        {!isLocalDelivery && shippingOptions.length > 0 && (
                                            <div className="space-y-2 pt-2 border-t border-stone-200">
                                                {shippingOptions.map(opt => {
                                                    const isSelected = shippingService === opt.name;
                                                    return (
                                                        <label key={opt.id} onClick={() => { setShippingCost(parseFloat(opt.price)); setShippingService(opt.name); setShippingServiceId(opt.id); }}
                                                            className={`flex items-center justify-between p-3 border rounded-xl cursor-pointer transition-colors ${isSelected ? 'border-moriah-orange bg-moriah-orange/5' : 'border-stone-200 hover:border-moriah-gold'}`}>

            const ProductModal = () => {
                if (!selectedProduct) return null;
                const images = getProductImages(selectedProduct.image_url);
                const [currentImageIdx, setCurrentImageIdx] = React.useState(0);
                const [quantity, setQuantity] = React.useState(1);
                const [grind, setGrind] = React.useState('grao');
                const isCoffee = selectedProduct.category.toLowerCase().includes('grão') || selectedProduct.category.toLowerCase().includes('café') || selectedProduct.category.toLowerCase().includes('cafe') || selectedProduct.name.toLowerCase().includes('café');

                // Preco varia por moagem
                const priceMoido = selectedProduct.price_moido && selectedProduct.price_moido > 0 ? selectedProduct.price_moido : selectedProduct.price;
                const currentPrice = (isCoffee && grind === 'moido') ? priceMoido : selectedProduct.price;
                const hasPriceDiff = isCoffee && priceMoido !== selectedProduct.price;

                const handleAddToCart = () => {
                    for (let i = 0; i < quantity; i++) {
                        addToCart({ ...selectedProduct, price: currentPrice }, isCoffee ? grind : null);

                    setSelectedProduct(null);

                return (
                    <div className="fixed inset-0 z-[110] flex items-center justify-center p-4">

                            <button onClick={() => setSelectedProduct(null)} className="absolute top-4 right-4 z-20 bg-white/80 backdrop-blur text-stone-600 p-2 rounded-full hover:bg-stone-100 transition shadow-sm">

                            <div className="w-full md:w-1/2 bg-stone-50 flex flex-col">

                                        className="w-full h-full object-cover"
                                        alt={selectedProduct.name}
                                        onError={(e) => { e.target.onerror = null; e.target.src = 'https://images.unsplash.com/photo-1559525839-b184a4d698c7?auto=format&fit=crop&w=800&q=80'; }}
                                    />
                                    {images.length > 1 && (
                                        <>
                                            <button onClick={() => setCurrentImageIdx(prev => prev === 0 ? images.length - 1 : prev - 1)} className="absolute left-4 top-1/2 -translate-y-1/2 bg-white/80 p-2 rounded-full shadow hover:bg-white text-stone-700 transition">
                                                <LucideIcon name="chevron-left" className="w-5 h-5" />
                                            </button>
                                            <button onClick={() => setCurrentImageIdx(prev => prev === images.length - 1 ? 0 : prev + 1)} className="absolute right-4 top-1/2 -translate-y-1/2 bg-white/80 p-2 rounded-full shadow hover:bg-white text-stone-700 transition">
                                                <LucideIcon name="chevron-right" className="w-5 h-5" />
                                            </button>
                                        </>
                                    )}
                                </div>
                                {images.length > 1 && (
                                    <div className="flex gap-2 p-4 overflow-x-auto bg-stone-100 border-t border-stone-200">
                                        {images.map((img, idx) => (
                                            <button key={idx} onClick={() => setCurrentImageIdx(idx)} className={`w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 border-2 transition-all ${currentImageIdx === idx ? 'border-moriah-orange opacity-100 shadow-md' : 'border-transparent opacity-60 hover:opacity-100'}`}>
                                                <img src={img} className="w-full h-full object-cover" />
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Detalhes Lado Direito */}
                            <div className="w-full md:w-1/2 p-6 md:p-10 flex flex-col overflow-y-auto">
                                <span className="text-xs text-moriah-orange font-bold uppercase tracking-widest mb-2 block">{selectedProduct.category}</span>
                                <h2 className="text-3xl font-sans font-bold text-moriah-green mb-2">{selectedProduct.name}</h2>
                                <span className="text-xs text-stone-400 font-mono tracking-widest mb-6 block">SKU: {selectedProduct.sku}</span>

                                <div className="text-3xl font-bold text-moriah-brown mb-2 pb-2 border-b border-stone-100 flex items-baseline gap-3">
                                    <span className="transition-all duration-200">R$ {currentPrice.toFixed(2).replace('.', ',')}</span>
                                </div>
                                {hasPriceDiff && (
                                    <p className="text-xs text-moriah-orange font-bold uppercase tracking-wider mb-6">
                                        {grind === 'grao' ? `+ Moído por R$ ${priceMoido.toFixed(2).replace('.', ',')}` : `Em Grão por R$ ${selectedProduct.price.toFixed(2).replace('.', ',')}`}
                                    </p>
                                )}
                                {!hasPriceDiff && <div className="mb-6"></div>}

                                {selectedProduct.description && (
                                    <div className="mb-8">
                                        <h4 className="font-bold text-stone-800 mb-3 flex items-center gap-2"><LucideIcon name="book-open" className="w-4 h-4 text-moriah-gold" /> Notas e Detalhes</h4>
                                        <p className="text-stone-600 font-light leading-relaxed whitespace-pre-wrap text-sm">{selectedProduct.description}</p>
                                    </div>
                                )}

                                {isCoffee && (
                                    <div className="mb-8 p-4 bg-stone-50 rounded-2xl border border-stone-100">
                                        <h4 className="font-bold text-sm text-stone-700 mb-3 block cursor-default">Qual a moagem preferida?</h4>
                                        <div className="flex gap-3">
                                            <label className={`flex flex-1 flex-col items-center gap-1 py-3 px-4 rounded-xl cursor-pointer transition-all border-2 ${grind === 'grao' ? 'border-moriah-orange bg-moriah-orange/5' : 'border-stone-200 hover:border-moriah-orange/50'}`}>
                                                <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6 text-moriah-brown" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="12" rx="5" ry="8" transform="rotate(-30 12 12)" /><path d="M12 4c1 2 1 8-1 12" /></svg>
                                                <span className="text-sm font-bold text-stone-700">Grão</span>
                                                <input type="radio" value="grao" className="hidden" onChange={() => setGrind('grao')} checked={grind === 'grao'} />
                                            </label>
                                            <label className={`flex flex-1 flex-col items-center gap-1 py-3 px-4 rounded-xl cursor-pointer transition-all border-2 ${grind === 'moido' ? 'border-moriah-orange bg-moriah-orange/5' : 'border-stone-200 hover:border-moriah-orange/50'}`}>
                                                <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6 text-moriah-brown" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M7 21h10" /><path d="M10 21V8l-3 2.5" /><path d="M14 21V8l3 2.5" /><rect x="8" y="5" width="8" height="3" rx="1" /><circle cx="10" cy="2.5" r="1" /><circle cx="14" cy="2.5" r="1" /></svg>
                                                <span className="text-sm font-bold text-stone-700">Moído</span>
                                                <input type="radio" value="moido" className="hidden" onChange={() => setGrind('moido')} checked={grind === 'moido'} />
                                            </label>
                                        </div>
                                    </div>

                                    </div>

                                        <LucideIcon name="shopping-cart" className="w-5 h-5" /> Adicionar — R$ {(currentPrice * quantity).toFixed(2).replace('.', ',')}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };



            const CheckoutModal = () => {
                if (!isCheckingOut) return null;

                const [step, setStep] = React.useState(1); // 1: Info & Pagamento, 2: PIX Checkout/Loading, 3: Sucesso
                const [customerData, setCustomerData] = React.useState({ name: '', email: '', cpf: '', phone: '', postalCode: '', addressNumber: '', street: '', neighborhood: '', complement: '', city: '', state: '' });

                // Auto-preenche endereço via ViaCEP quando o CEP tiver 8 dígitos
                React.useEffect(() => {
                    const cep = customerData.postalCode.replace(/\D/g, '');
                    if (cep.length !== 8) return;
                    fetch(`https://viacep.com.br/ws/${cep}/json/`)
                        .then(r => r.json())
                        .then(d => {
                            if (!d.erro) setCustomerData(prev => ({
                                ...prev,
                                street: d.logradouro || prev.street,
                                neighborhood: d.bairro || prev.neighborhood,
                                city: d.localidade || prev.city,
                                state: d.uf || prev.state
                            }));
                        })
                        .catch(() => { });
                }, [customerData.postalCode]);
                const [paymentMethod, setPaymentMethod] = React.useState('PIX');
                const [cardData, setCardData] = React.useState({ holderName: '', number: '', expiryMonth: '', expiryYear: '', ccv: '' });
                const [pixData, setPixData] = React.useState(null);
                const [errorMsg, setErrorMsg] = React.useState('');

                const handlePayment = async (e) => {
                    e.preventDefault();
                    setErrorMsg('');

                    // Validações front-end para cartão
                    if (paymentMethod === 'CREDIT_CARD') {
                        const cardNum = cardData.number.replace(/\s/g, '');
                        if (cardNum.length < 13 || cardNum.length > 19) {
                            setErrorMsg('Número do cartão inválido. Verifique os dígitos.');
                            return;
                        }
                        const month = parseInt(cardData.expiryMonth, 10);
                        if (!month || month < 1 || month > 12) {
                            setErrorMsg('Mês de vencimento inválido (01-12).');
                            return;
                        }
                        const year = parseInt(cardData.expiryYear, 10);
                        const currentYear = new Date().getFullYear();
                        if (!year || year < currentYear || year > currentYear + 20) {
                            setErrorMsg(`Ano de vencimento inválido. Use 4 dígitos (ex: ${currentYear}).`);
                            return;
                        }
                        if (!cardData.ccv || cardData.ccv.length < 3) {
                            setErrorMsg('CVV inválido.');
                            return;
                        }
                        if (!cardData.holderName.trim()) {
                            setErrorMsg('Informe o nome impresso no cartão.');
                            return;
                        }
                    }

                    setStep('loading');

                    try {
                        const response = await fetch('/api/checkout', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                customerName: customerData.name,
                                customerEmail: customerData.email,
                                customerCpf: customerData.cpf,
                                customerPhone: customerData.phone,
                                customerCep: customerData.postalCode,
                                customerAddressNumber: customerData.addressNumber,
                                customerStreet: customerData.street,
                                customerNeighborhood: customerData.neighborhood,
                                customerCity: customerData.city,
                                customerState: customerData.state,
                                customerComplement: customerData.complement,
                                cartItems: cart.map(item => ({
                                    ...item,
                                    name: item.grind ? `${item.name} (${item.grind === 'moido' ? 'Pó/Moído' : 'Grão'})` : item.name
                                })),
                                totalAmount: parseFloat(finalTotal.toFixed(2)),
                                billingType: paymentMethod,
                                cardData: paymentMethod === 'CREDIT_CARD' ? {
                                    ...cardData,
                                    number: cardData.number.replace(/\s/g, '')
                                } : null,
                                shippingCost: shippingCost,
                                shippingService: shippingService || 'CORREIOS',
                                shippingServiceId: shippingServiceId
                            })
                        });

                        const data = await response.json();

                        if (response.ok && data.success) {
                            if (paymentMethod === 'PIX') {
                                setPixData({ payload: data.pixPayload, encodedImage: data.encodedImage, invoiceUrl: data.invoiceUrl });
                                setStep('pix');
                            } else {
                                setStep(3); // Sucesso direto no Cartão
                            }
                            // Nota: setCart([]) foi removido daqui para não causar re-render do App,
                            // que desmontaria o CheckoutModal (definido dentro do App) antes de mostrar
                            // a tela de sucesso. O reload() nas telas de confirmação limpa o estado.
                        } else {
                            const msg = data.error || 'Verifique seus dados e tente novamente.';
                            setErrorMsg(msg);
                            setStep(1);
                        }
                    } catch (error) {
                        setErrorMsg('Erro de conexão durante o pagamento. Tente novamente.');
                        setStep(1);
                    }
                };

                return (
                    <div className="fixed inset-0 z-[200] flex items-start justify-center p-0 md:p-4 bg-moriah-black/80 backdrop-blur-md overflow-y-auto pt-safe">
                        <div className="bg-white rounded-t-3xl md:rounded-3xl w-full max-w-2xl shadow-2xl relative mt-auto md:my-auto border-x border-t md:border border-stone-200 min-h-[80vh] md:min-h-0">

                                    <h2 className="font-sans text-2xl font-bold text-moriah-green">Finalizar Compra</h2>
                                    <p className="text-sm text-stone-500">Checkout Transparente Seguro</p>
                                </div>
                                {step !== 3 && step !== 'loading' && (
                                    <button onClick={() => setIsCheckingOut(false)} className="p-2 hover:bg-stone-200 rounded-full transition-colors text-stone-500">
                                        <LucideIcon name="x" className="w-6 h-6" />
                                    </button>
                                )}
                            </div>

                            <div className="p-6 md:p-8">
                                {step === 1 && (
                                    <form onSubmit={handlePayment} className="space-y-6">
                                        <div>
                                            <h3 className="font-bold text-lg text-moriah-brown mb-4 flex items-center gap-2"><LucideIcon name="user" className="w-5 h-5" /> Seus Dados</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <input required type="text" placeholder="Nome Completo" value={customerData.name} onChange={e => setCustomerData({ ...customerData, name: e.target.value })} className="col-span-1 md:col-span-2 px-4 py-3 bg-white border border-stone-200 rounded-xl outline-none focus:border-moriah-gold text-sm" />
                                                <input required type="email" placeholder="E-mail" value={customerData.email} onChange={e => setCustomerData({ ...customerData, email: e.target.value })} className="px-4 py-3 bg-white border border-stone-200 rounded-xl outline-none focus:border-moriah-gold text-sm" />
                                                <input required type="text" placeholder="CPF/CNPJ numérico" value={customerData.cpf} onChange={e => setCustomerData({ ...customerData, cpf: e.target.value.replace(/\D/g, '') })} className="px-4 py-3 bg-white border border-stone-200 rounded-xl outline-none focus:border-moriah-gold text-sm" maxLength="14" />
                                                <input required type="text" placeholder="Telefone ex: 11999999999" value={customerData.phone} onChange={e => setCustomerData({ ...customerData, phone: e.target.value.replace(/\D/g, '') })} className="col-span-1 md:col-span-2 px-4 py-3 bg-white border border-stone-200 rounded-xl outline-none focus:border-moriah-gold text-sm" maxLength="11" />
                                            </div>
                                        </div>

                                        <div className="animate-in fade-in zoom-in-95">
                                            <h3 className="font-bold text-lg text-moriah-brown mb-4 flex items-center gap-2 mt-2"><LucideIcon name="map-pin" className="w-5 h-5" /> Endereço de Entrega / Faturação</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                                <input required type="text" placeholder="CEP (8 dígitos)" value={customerData.postalCode} onChange={e => setCustomerData({ ...customerData, postalCode: e.target.value.replace(/\D/g, '') })} className="px-4 py-3 bg-white border border-stone-200 rounded-xl outline-none focus:border-moriah-gold text-sm" maxLength="8" />
                                                <input required type="text" placeholder="Número" value={customerData.addressNumber} onChange={e => setCustomerData({ ...customerData, addressNumber: e.target.value })} className="px-4 py-3 bg-white border border-stone-200 rounded-xl outline-none focus:border-moriah-gold text-sm" />
                                                <input type="text" placeholder="Complemento (apto, bloco...)" value={customerData.complement} onChange={e => setCustomerData({ ...customerData, complement: e.target.value })} className="col-span-2 md:col-span-1 px-4 py-3 bg-white border border-stone-200 rounded-xl outline-none focus:border-moriah-gold text-sm" />
                                            </div>
                                            {shippingService !== 'RETIRADA' && (
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
                                                    <input required type="text" placeholder="Rua / Logradouro" value={customerData.street} onChange={e => setCustomerData({ ...customerData, street: e.target.value })} className="px-4 py-3 bg-white border border-stone-200 rounded-xl outline-none focus:border-moriah-gold text-sm" />
                                                    <input required type="text" placeholder="Bairro" value={customerData.neighborhood} onChange={e => setCustomerData({ ...customerData, neighborhood: e.target.value })} className="px-4 py-3 bg-white border border-stone-200 rounded-xl outline-none focus:border-moriah-gold text-sm" />
                                                    <input type="text" placeholder="Cidade (preenchida pelo CEP)" readOnly value={customerData.city} className="px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl text-sm text-stone-500 cursor-not-allowed" />
                                                    <input type="text" placeholder="Estado (preenchido pelo CEP)" readOnly value={customerData.state} className="px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl text-sm text-stone-500 cursor-not-allowed" />
                                                </div>
                                            )}
                                            {customerData.postalCode.length > 0 && customerData.postalCode.length < 8 && (
                                                <p className="text-xs text-moriah-orange mt-2 flex items-center gap-1"><LucideIcon name="info" className="w-3 h-3" /> Digite os 8 dígitos para preencher o endereço automaticamente.</p>
                                            )}
                                        </div>

                                        <div>
                                            <h3 className="font-bold text-lg text-moriah-brown mt-2 mb-4 flex items-center gap-2"><LucideIcon name="credit-card" className="w-5 h-5" /> Condição de Pagamento</h3>
                                            <div className="flex gap-4 mb-4">
                                                <label className={`flex-1 p-4 border rounded-xl cursor-pointer transition-all flex flex-col items-center justify-center gap-2 ${paymentMethod === 'PIX' ? 'border-moriah-green bg-moriah-green/5 text-moriah-green' : 'border-stone-200 text-stone-500 hover:border-moriah-gold'}`}>
                                                    <input type="radio" className="hidden" name="paymentMethod" value="PIX" checked={paymentMethod === 'PIX'} onChange={() => setPaymentMethod('PIX')} />
                                                    <LucideIcon name="qr-code" className="w-6 h-6" />
                                                    <span className="font-bold text-sm">Transferência PIX</span>
                                                </label>
                                                <label className={`flex-1 p-4 border rounded-xl cursor-pointer transition-all flex flex-col items-center justify-center gap-2 ${paymentMethod === 'CREDIT_CARD' ? 'border-moriah-green bg-moriah-green/5 text-moriah-green' : 'border-stone-200 text-stone-500 hover:border-moriah-gold'}`}>
                                                    <input type="radio" className="hidden" name="paymentMethod" value="CREDIT_CARD" checked={paymentMethod === 'CREDIT_CARD'} onChange={() => setPaymentMethod('CREDIT_CARD')} />
                                                    <LucideIcon name="credit-card" className="w-6 h-6" />
                                                    <span className="font-bold text-sm">Cartão de Crédito</span>
                                                </label>
                                            </div>

                                            {paymentMethod === 'CREDIT_CARD' && (
                                                <div className="p-5 bg-stone-50 rounded-xl border border-stone-200 space-y-4 animate-in fade-in duration-300">
                                                    <input required type="text" placeholder="Nome Impresso no Cartão" value={cardData.holderName} onChange={e => setCardData({ ...cardData, holderName: e.target.value.toUpperCase() })} className="w-full px-4 py-3 bg-white border border-stone-200 rounded-lg outline-none focus:border-moriah-gold text-sm" />
                                                    <input required type="text" placeholder="Número do Cartão" value={cardData.number} onChange={e => {
                                                        // Formata com espaços a cada 4 dígitos para facilitar leitura
                                                        const raw = e.target.value.replace(/\D/g, '').slice(0, 16);
                                                        const formatted = raw.replace(/(\d{4})(?=\d)/g, '$1 ');
                                                        setCardData({ ...cardData, number: formatted });
                                                    }} className="w-full px-4 py-3 bg-white border border-stone-200 rounded-lg outline-none focus:border-moriah-gold text-sm font-mono tracking-widest" maxLength="19" />
                                                    <div className="flex gap-2 min-w-0">
                                                        <input required type="text" placeholder="Mês (01)" maxLength="2" value={cardData.expiryMonth} onChange={e => setCardData({ ...cardData, expiryMonth: e.target.value.replace(/\D/g, '') })} className="flex-1 min-w-0 px-2 py-3 bg-white border border-stone-200 rounded-lg outline-none focus:border-moriah-gold text-sm text-center" />
                                                        <span className="flex items-center text-stone-300 font-bold text-xl flex-shrink-0">/</span>
                                                        <input required type="text" placeholder="Ano (2029)" maxLength="4" value={cardData.expiryYear} onChange={e => setCardData({ ...cardData, expiryYear: e.target.value.replace(/\D/g, '') })} className="flex-1 min-w-0 px-2 py-3 bg-white border border-stone-200 rounded-lg outline-none focus:border-moriah-gold text-sm text-center" />
                                                        <input required type="text" placeholder="CVV" maxLength="4" value={cardData.ccv} onChange={e => setCardData({ ...cardData, ccv: e.target.value.replace(/\D/g, '') })} className="w-16 flex-shrink-0 px-2 py-3 bg-white border border-stone-200 rounded-lg outline-none focus:border-moriah-gold text-sm text-center" />
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        {errorMsg && (
                                            <div className="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm flex items-start gap-2 mt-2">
                                                <LucideIcon name="alert-circle" className="w-4 h-4 mt-0.5 flex-shrink-0" />
                                                <span>{errorMsg}</span>
                                            </div>
                                        )}
                                        <button type="submit" className="w-full mt-4 bg-moriah-green text-moriah-sand font-bold py-4 rounded-xl shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2 text-lg">
                                            <LucideIcon name="lock" className="w-4 h-4" />
                                            Concluir Pagamento (R$ {finalTotal.toFixed(2).replace('.', ',')})
                                        </button>
                                    </form>
                                )}

                                {step === 'pix' && pixData && (
                                    <div className="space-y-6 text-center animate-in fade-in">
                                        <div className="flex flex-col items-center justify-center border-b border-stone-100 pb-6">
                                            <div className="w-16 h-16 bg-moriah-green/10 text-moriah-green rounded-full flex items-center justify-center mb-4"><LucideIcon name="check-circle" className="w-8 h-8" /></div>
                                            <h3 className="font-bold text-2xl text-moriah-brown mb-2">Pedido Registrado!</h3>
                                            <p className="text-stone-500 max-w-sm mx-auto">Seu pedido foi recebido. Finalize o pagamento abaixo.</p>
                                        </div>

                                        {pixData.encodedImage ? (
                                            <>
                                                <div className="flex justify-center my-6">
                                                    <div className="p-4 bg-white border-2 border-stone-100 rounded-3xl shadow-sm inline-block"><img src={`data:image/jpeg;base64,${pixData.encodedImage}`} alt="QR Code PIX" className="w-48 h-48 md:w-56 md:h-56 object-contain" /></div>
                                                </div>
                                                <div className="bg-stone-50 p-4 rounded-xl border border-stone-200">
                                                    <p className="text-xs font-bold uppercase text-stone-400 mb-2">PIX Copia e Cola</p>
                                                    <div className="flex items-center gap-2">
                                                        <input readOnly type="text" value={pixData.payload} className="flex-1 bg-white border border-stone-200 px-3 py-2 rounded-lg text-sm text-stone-600 outline-none" />
                                                        <button onClick={() => { navigator.clipboard.writeText(pixData.payload); alert('Código copiado!'); }} className="bg-moriah-gold text-white p-2.5 rounded-lg hover:bg-yellow-500 transition shadow-sm"><LucideIcon name="copy" className="w-4 h-4" /></button>
                                                    </div>
                                                </div>
                                            </>
                                        ) : (
                                            <div className="bg-green-50 border border-green-200 rounded-2xl p-6 text-left space-y-4">
                                                <p className="font-bold text-moriah-green text-lg flex items-center gap-2"><LucideIcon name="smartphone" className="w-5 h-5" /> Como pagar via PIX:</p>
                                                <ol className="list-decimal list-inside space-y-2 text-stone-600 text-sm">
                                                    <li>Abra o app do seu banco</li>
                                                    <li>Selecione <strong>PIX → Pagar → Chave</strong></li>
                                                    <li>Use a chave: <strong className="text-moriah-green select-all">75992073245</strong> (celular)</li>
                                                    <li>Nome: <strong>Moriah Café</strong> — Valor: <strong>R$ {finalTotal.toFixed(2).replace('.', ',')}</strong></li>
                                                    <li>Envie o comprovante pelo WhatsApp</li>
                                                </ol>
                                                <a href={pixData.invoiceUrl} target="_blank" className="flex items-center justify-center gap-2 bg-green-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-green-700 transition w-full mt-2">
                                                    <LucideIcon name="message-circle" className="w-5 h-5" /> Confirmar via WhatsApp
                                                </a>
                                            </div>
                                        )}

                                        <div className="pt-4 flex flex-col gap-3">
                                            <button onClick={() => { setIsCheckingOut(false); window.location.reload(); }} className="w-full bg-moriah-green text-moriah-sand font-bold py-4 rounded-xl shadow-lg hover:-translate-y-1 hover:shadow-xl transition-all">✅ Já Realizei o Pagamento</button>
                                        </div>
                                    </div>
                                )}


                                {step === 'loading' && (
                                    <div className="text-center py-12 flex flex-col items-center">
                                        <div className="w-16 h-16 border-4 border-moriah-green border-t-moriah-gold rounded-full animate-spin mb-6"></div>
                                        <h3 className="font-bold text-xl text-moriah-brown">Processando Pagamento...</h3>
                                        <p className="text-stone-500 mt-2">Comunicando com a operadora do seu cartão 100% Criptografado.</p>
                                    </div>
                                )}

                                {step === 3 && (
                                    <div className="text-center py-8 flex flex-col items-center animate-in zoom-in-95">
                                        <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6 shadow-sm border-4 border-white outline outline-4 outline-green-50">
                                            <LucideIcon name="check" className="w-10 h-10" />
                                        </div>
                                        <h3 className="font-bold text-3xl text-moriah-brown mb-2">Pagamento Aprovado!</h3>
                                        <p className="text-stone-500 mb-8 max-w-md mx-auto">Seu pedido foi debitado no cartão com sucesso. Um email com os detalhes foi enviado para <strong>{customerData.email}</strong>.</p>
                                        <button onClick={() => { setIsCheckingOut(false); window.location.reload(); }} className="bg-moriah-green text-moriah-sand font-bold px-8 py-4 rounded-xl hover:-translate-y-1 hover:shadow-xl transition-all w-full">Voltar para a Loja</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div >
                );
            };

            const TrackingModal = () => {
                if (!isTrackingOpen) return null;

                const handleTrack = (e) => {
                    e.preventDefault();
                    if (!trackingCode.trim()) return;

                    // Redireciona para o site de rastreio dos Correios via URL com o código colado
                    const correiosUrl = `https://rastreamento.correios.com.br/app/index.php?codigo=${trackingCode.trim().toUpperCase()}`;
                    window.open(correiosUrl, '_blank');
                    setIsTrackingOpen(false);
                    setTrackingCode('');
                };

                return (
                    <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-moriah-black/80 backdrop-blur-md">
                        <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden border border-stone-200">
                            <div className="p-6 border-b border-stone-100 flex items-center justify-between bg-stone-50">
                                <div>
                                    <h2 className="font-sans text-xl font-bold text-moriah-green flex items-center gap-2"><LucideIcon name="package-search" className="w-5 h-5" /> Rastrear Pedido</h2>
                                    <p className="text-sm text-stone-500">Acompanhe a sua entrega (Correios)</p>
                                </div>
                                <button onClick={() => setIsTrackingOpen(false)} className="p-2 hover:bg-stone-200 rounded-full transition-colors text-stone-500">
                                    <LucideIcon name="x" className="w-6 h-6" />
                                </button>
                            </div>

                            <form onSubmit={handleTrack} className="p-6 md:p-8 space-y-6">
                                <div>
                                    <label className="text-sm font-bold text-stone-500 mb-2 block">Código de Rastreamento</label>
                                    <input
                                        type="text"
                                        required
                                        placeholder="Ex: QA123456789BR"
                                        value={trackingCode}
                                        onChange={(e) => setTrackingCode(e.target.value)}
                                        className="w-full px-4 py-4 bg-stone-50 border border-stone-200 rounded-xl focus:outline-none focus:border-moriah-gold uppercase placeholder-stone-300 font-mono text-center tracking-widest font-bold"
                                    />
                                    <p className="text-xs text-stone-400 mt-3 text-center">Você recebe o código por email após o despacho dos grãos.</p>
                                </div>

                                <button type="submit" className="w-full bg-moriah-green text-moriah-sand font-bold py-4 rounded-xl shadow-lg hover:-translate-y-1 hover:shadow-xl transition-all flex items-center justify-center gap-2">
                                    Buscar Pacote <LucideIcon name="external-link" className="w-4 h-4" />
                                </button>
                            </form>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col font-sans bg-moriah-bg selection:bg-moriah-gold selection:text-white overflow-x-hidden w-full">
                    <Header />
                    <Main />
                    <Footer />
                    <MobileNav />
                    <CartDrawer />
                    <CheckoutModal />
                    <ProductModal />
                    <TrackingModal />
                </div>
            );
        }


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
